<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GYC Deals - Offline</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    background: #0A1E21;
    color: #E8EDE9;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    text-align: center;
  }
  .container { max-width: 360px; }
  .icon {
    width: 80px; height: 80px;
    margin: 0 auto 24px;
    border-radius: 20px;
    background: #14333A;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }
  h1 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 24px;
    margin-bottom: 12px;
    color: #FFFFFF;
  }
  p {
    color: #9DB0B5;
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .retry-btn {
    display: inline-block;
    padding: 12px 32px;
    background: #51BE7B;
    color: #FFFFFF;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .retry-btn:hover { background: #45A86C; }
  .pulse {
    width: 12px; height: 12px;
    background: #CF7A30;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .status { margin-top: 32px; font-size: 13px; color: #607179; }
</style>
</head>
<body>
<div class="container">
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>GYC Deals requires an internet connection to load the latest deals and investment data. Please check your connection and try again.</p>
  <button class="retry-btn" onclick="window.location.reload()">Retry Connection</button>
  <div class="status"><span class="pulse"></span>Waiting for connection…</div>
</div>
<script>window.addEventListener('online', () => window.location.reload());</script>
</body>
</html>
