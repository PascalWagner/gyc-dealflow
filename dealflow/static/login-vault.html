<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GYC - Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #51BE7B;
  --green-hover: #45A86C;
  --teal: #1F5159;
  --midnight: #0B1215;
}

body {
  font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
  background: var(--midnight);
  color: #fff;
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* Subtle gradient overlay */
.bg {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 120%, rgba(31,81,89,0.35) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 20% 0%, rgba(81,190,123,0.06) 0%, transparent 60%);
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}

/* Logo */
.logo {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 28px;
  letter-spacing: -0.5px;
  color: #fff;
  margin-bottom: 8px;
  opacity: 0;
  animation: fadeUp 0.8s ease forwards;
}

.subtitle {
  font-size: 15px;
  font-weight: 400;
  color: rgba(255,255,255,0.4);
  margin-bottom: 48px;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.1s forwards;
}

/* Form */
.form-group {
  width: 100%;
  max-width: 360px;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.2s forwards;
}

.input-wrap {
  position: relative;
  margin-bottom: 16px;
}

.email-input {
  width: 100%;
  padding: 18px 20px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 16px;
  font-weight: 400;
  color: #fff;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  outline: none;
  transition: all 0.3s ease;
  -webkit-appearance: none;
}
.email-input::placeholder { color: rgba(255,255,255,0.25); }
.email-input:focus {
  border-color: rgba(81,190,123,0.5);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 0 4px rgba(81,190,123,0.08);
}

.submit-btn {
  width: 100%;
  padding: 18px 24px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.2px;
  color: #fff;
  background: var(--green);
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}
.submit-btn:hover { background: var(--green-hover); transform: translateY(-1px); }
.submit-btn:active { transform: scale(0.985); }

.helper-text {
  text-align: center;
  font-size: 13px;
  color: rgba(255,255,255,0.3);
  margin-top: 20px;
  line-height: 1.5;
}

/* Success state */
.success-state {
  display: none;
  text-align: center;
  width: 100%;
  max-width: 360px;
}
.success-state.show { display: block; }
.success-state .check-circle {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: rgba(81,190,123,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.success-state .check-circle svg {
  width: 28px;
  height: 28px;
  color: var(--green);
}
.success-state h2 {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 24px;
  font-weight: 400;
  margin-bottom: 12px;
}
.success-state p {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  line-height: 1.6;
}
.success-state .sent-email {
  color: #fff;
  font-weight: 600;
}
.success-state .retry-link {
  color: var(--green);
  text-decoration: none;
  font-weight: 500;
  cursor: pointer;
  font-size: 13px;
  display: inline-block;
  margin-top: 24px;
}
.success-state .retry-link:hover { text-decoration: underline; }

/* Error */
.error-msg {
  font-size: 13px;
  color: #E05555;
  margin-bottom: 12px;
  display: none;
  text-align: center;
}
.error-msg.show { display: block; }

/* Footer */
.page-footer {
  position: fixed;
  bottom: 24px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 12px;
  color: rgba(255,255,255,0.15);
  z-index: 1;
}
.page-footer a { color: rgba(255,255,255,0.25); text-decoration: none; }
.page-footer a:hover { color: rgba(255,255,255,0.4); }

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}

/* Loading state */
.submit-btn.loading {
  pointer-events: none;
  opacity: 0.7;
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="container">
  <div class="logo">Grow Your Cashflow</div>
  <div class="subtitle">Your deal room</div>

  <div class="form-group" id="formGroup">
    <div class="input-wrap">
      <input type="email" class="email-input" id="emailInput" placeholder="Email address" autocomplete="email" autofocus>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Continue</button>
    <div class="helper-text">
      We'll send you a secure link — no password needed.
    </div>
  </div>

  <div class="success-state" id="successState">
    <div class="check-circle">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <h2>Check your email</h2>
    <p>We sent a login link to<br><span class="sent-email" id="sentEmail"></span></p>
    <a class="retry-link" onclick="resetForm()">Use a different email</a>
  </div>
</div>

<div class="page-footer">
  <a href="privacy.html">Privacy</a>
</div>

<script>
const emailInput = document.getElementById('emailInput');
emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });

function handleSubmit() {
  const email = emailInput.value.trim();
  const errorMsg = document.getElementById('errorMsg');
  const btn = document.getElementById('submitBtn');

  errorMsg.classList.remove('show');

  if (!email || !email.includes('@')) {
    errorMsg.textContent = 'Please enter a valid email address.';
    errorMsg.classList.add('show');
    return;
  }

  btn.classList.add('loading');
  btn.textContent = 'Sending...';

  // Simulate sending magic link
  setTimeout(() => {
    document.getElementById('formGroup').style.display = 'none';
    document.getElementById('sentEmail').textContent = email;
    const success = document.getElementById('successState');
    success.classList.add('show');
    success.style.animation = 'fadeUp 0.5s ease forwards';
  }, 1200);
}

function resetForm() {
  document.getElementById('successState').classList.remove('show');
  document.getElementById('formGroup').style.display = 'block';
  document.getElementById('submitBtn').classList.remove('loading');
  document.getElementById('submitBtn').textContent = 'Continue';
  emailInput.value = '';
  emailInput.focus();
}
</script>
</body>
</html>
