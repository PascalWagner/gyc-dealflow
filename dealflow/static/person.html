<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Person Profile - GYC Dealflow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #51BE7B;
  --primary-hover: #45A86C;
  --primary-light: #32C583;
  --bg-cream: #FAF9F5;
  --bg-card: #FFFFFF;
  --bg-sidebar: #0A1E21;
  --bg-sidebar-hover: #14333A;
  --bg-sidebar-active: #1F5159;
  --text-dark: #141413;
  --text-secondary: #607179;
  --text-muted: #8A9AA0;
  --text-sidebar: rgba(255,255,255,0.55);
  --text-sidebar-active: #FFFFFF;
  --border: #DDE5E8;
  --border-light: #EDF1F2;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-card-hover: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --radius: 12px;
  --radius-sm: 8px;
  --sidebar-width: 240px;
  --green: #51BE7B;
  --green-bg: #E7F5F0;
  --orange: #CF7A30;
  --orange-bg: #FFF3E6;
  --red: #D04040;
  --blue: #2563EB;
  --blue-bg: #EFF6FF;
  --teal-deep: #1F5159;
  --teal-midnight: #0A1E21;
  --accent-green: #40E47F;
  --mint-bg: #E7F5F0;
  --off-white: #FAF9F5;
  --charcoal: #141413;
  --slate: #607179;
  --transition: 0.2s ease;
  --font-headline: 'DM Serif Display', Georgia, serif;
  --font-ui: 'Plus Jakarta Sans', -apple-system, sans-serif;
  --font-body: 'Source Sans 3', 'Source Sans Pro', sans-serif;
}

body {
  font-family: var(--font-body);
  background: var(--bg-cream);
  color: var(--text-dark);
  line-height: 1.5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ====== SIDEBAR ====== */
.sidebar {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: var(--sidebar-width);
  background: var(--bg-sidebar);
  display: flex;
  flex-direction: column;
  z-index: 100;
  transition: transform 0.3s ease;
}
.sidebar-logo {
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.sidebar-logo-icon {
  width: 36px; height: 36px;
  background: var(--primary);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-ui);
  font-weight: 700;
  color: #fff;
  font-size: 12px;
  letter-spacing: -0.5px;
}
.sidebar-logo-text {
  font-family: var(--font-headline);
  font-size: 18px;
  font-weight: 400;
  color: #fff;
  letter-spacing: -0.3px;
}
.sidebar-nav {
  flex: 1;
  padding: 12px 0;
  overflow-y: auto;
}
.nav-section-label {
  padding: 16px 24px 8px;
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: rgba(255,255,255,0.3);
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 24px;
  color: var(--text-sidebar);
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
}
.nav-item:hover { background: var(--bg-sidebar-hover); color: #fff; }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; }
.nav-item:hover svg { opacity: 1; }
.sidebar-user {
  padding: 16px 24px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  gap: 10px;
}
.sidebar-user-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--teal-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent-green);
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 12px;
  flex-shrink: 0;
}
.sidebar-user-info { flex: 1; min-width: 0; }
.sidebar-user-name {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-logout {
  background: none;
  border: none;
  color: rgba(255,255,255,0.3);
  cursor: pointer;
  padding: 4px;
  transition: color 0.2s;
}
.sidebar-logout:hover { color: #fff; }
.sidebar-logout svg { width: 16px; height: 16px; }
.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.theme-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  color: var(--text-sidebar);
  font-size: 13px;
  font-weight: 500;
  transition: color var(--transition);
}
.theme-toggle:hover { color: #fff; }
.toggle-track {
  width: 40px; height: 22px;
  background: #444;
  border-radius: 11px;
  position: relative;
  transition: background var(--transition);
}
.toggle-track.on { background: var(--teal-deep); }
.toggle-thumb {
  width: 18px; height: 18px;
  background: #fff;
  border-radius: 50%;
  position: absolute;
  top: 2px; left: 2px;
  transition: transform var(--transition);
}
.toggle-track.on .toggle-thumb { transform: translateX(18px); }

/* ====== MAIN CONTENT ====== */
.main {
  margin-left: var(--sidebar-width);
  min-height: 100vh;
  transition: margin-left 0.3s ease;
}
.mobile-menu-btn {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-dark);
  padding: 4px;
}
.mobile-menu-btn svg { width: 24px; height: 24px; }
.mobile-topbar {
  display: none;
  position: sticky;
  top: 0;
  height: 56px;
  background: var(--bg-cream);
  border-bottom: 1px solid var(--border);
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  z-index: 50;
}
.mobile-topbar-title {
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 700;
  color: var(--text-dark);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 99;
}

/* ====== CONTENT AREA ====== */
.content-wrap {
  max-width: 1200px;
  padding: 32px 40px 64px;
  margin: 0 auto;
}

/* ====== LOADING SKELETON ====== */
.skeleton {
  position: relative;
  overflow: hidden;
  background: var(--border-light);
  border-radius: var(--radius-sm);
}
.skeleton::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.6) 50%, transparent 100%);
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
.skeleton-header { height: 180px; margin-bottom: 24px; }
.skeleton-stats { height: 80px; margin-bottom: 24px; }
.skeleton-card { height: 200px; margin-bottom: 20px; }
.loading-wrap { display: block; }
.loaded-wrap { display: none; }
.page-loaded .loading-wrap { display: none; }
.page-loaded .loaded-wrap { display: block; }

/* ====== PERSON HEADER ====== */
.person-header {
  background: linear-gradient(145deg, var(--teal-midnight) 0%, var(--teal-deep) 100%);
  border-radius: var(--radius);
  padding: 36px 40px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.person-header::after {
  content: '';
  position: absolute;
  top: -60%; right: -10%;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(81,190,123,0.1) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.person-header-inner {
  display: flex;
  align-items: flex-start;
  gap: 28px;
  position: relative;
  z-index: 1;
}
.person-header-photo {
  width: 96px; height: 96px;
  border-radius: 50%;
  background: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-ui);
  font-weight: 800;
  color: #fff;
  font-size: 28px;
  flex-shrink: 0;
  letter-spacing: -0.5px;
  overflow: hidden;
  border: 3px solid rgba(255,255,255,0.15);
}
.person-header-photo img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.person-header-info { flex: 1; }
.person-header-name {
  font-family: var(--font-headline);
  font-size: 32px;
  color: #fff;
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.person-header-role {
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 500;
  color: rgba(255,255,255,0.6);
  margin-bottom: 12px;
}
.person-header-role a {
  color: var(--accent-green);
  text-decoration: none;
}
.person-header-role a:hover { text-decoration: underline; }
.person-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.person-tag {
  display: inline-flex;
  align-items: center;
  padding: 4px 12px;
  border-radius: 20px;
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.person-tag.asset-class {
  background: rgba(81,190,123,0.2);
  color: var(--accent-green);
}
.person-tag.type-tag {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.7);
}
.person-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.btn-person {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.3px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none;
  text-align: center;
  border: none;
}
.btn-person svg { width: 15px; height: 15px; }
.btn-person-outline {
  background: none;
  border: 1px solid rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.8);
}
.btn-person-outline:hover {
  border-color: rgba(255,255,255,0.5);
  color: #fff;
  background: rgba(255,255,255,0.05);
}
.btn-person-primary {
  background: var(--primary);
  color: #fff;
  border: 1px solid var(--primary);
}
.btn-person-primary:hover {
  background: var(--primary-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(81,190,123,0.4);
}

/* ====== STATS BAR ====== */
.stats-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 18px;
  text-align: center;
  box-shadow: var(--shadow-card);
}
.stat-card-value {
  font-family: var(--font-headline);
  font-size: 26px;
  color: var(--teal-deep);
  line-height: 1;
  margin-bottom: 4px;
}
.stat-card-label {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
}

/* ====== SECTION CARDS ====== */
.section-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  margin-bottom: 24px;
  overflow: hidden;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 28px;
  border-bottom: 1px solid var(--border-light);
}
.section-title {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--primary);
}
.section-badge {
  background: var(--green-bg);
  color: var(--green);
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 10px;
}
.section-body {
  padding: 24px 28px;
}

/* ====== FIRMS GRID ====== */
.firms-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
.firm-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px;
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none;
  color: inherit;
}
.firm-card:hover {
  border-color: var(--primary);
  background: var(--off-white);
  transform: translateY(-1px);
  box-shadow: var(--shadow-card-hover);
}
.firm-avatar {
  width: 48px; height: 48px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--teal-midnight), var(--teal-deep));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-ui);
  font-weight: 700;
  color: var(--accent-green);
  font-size: 14px;
  flex-shrink: 0;
}
.firm-info { flex: 1; min-width: 0; }
.firm-name {
  font-family: var(--font-ui);
  font-size: 15px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 2px;
}
.firm-meta {
  font-family: var(--font-ui);
  font-size: 12px;
  color: var(--text-muted);
}
.firm-stats {
  display: flex;
  gap: 16px;
  margin-top: 8px;
}
.firm-stat {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
}
.firm-stat strong {
  color: var(--text-dark);
}

/* ====== DEALS GRID ====== */
.deals-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}
.deal-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  flex-direction: column;
  text-decoration: none;
  color: inherit;
}
.deal-card:hover {
  box-shadow: var(--shadow-card-hover);
  transform: translateY(-2px);
  border-color: #D4C9AD;
}
.deal-card-header {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border-light);
}
.deal-card-badges {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.deal-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.deal-badge.green { background: var(--green-bg); color: var(--green); }
.deal-badge.blue { background: var(--blue-bg); color: var(--blue); }
.deal-badge.orange { background: var(--orange-bg); color: var(--orange); }
.deal-card-title {
  font-family: var(--font-ui);
  font-size: 15px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 4px;
  line-height: 1.3;
  letter-spacing: -0.2px;
}
.deal-card-subtitle {
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
}
.deal-card-metrics {
  padding: 14px 18px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px 16px;
  flex: 1;
}
.deal-metric-label {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.deal-metric-value {
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 700;
  color: var(--text-dark);
}
.deal-card-footer {
  padding: 12px 18px;
  border-top: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.deal-footer-tag {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
}
.deal-footer-link {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ====== RESEARCH LINKS ====== */
.research-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
}
.research-tile {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  text-decoration: none;
  color: var(--text-dark);
  transition: all var(--transition);
}
.research-tile:hover {
  border-color: var(--primary);
  background: var(--off-white);
  transform: translateY(-1px);
  box-shadow: var(--shadow-card-hover);
}
.research-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.research-icon.linkedin { background: var(--blue-bg); color: var(--blue); }
.research-icon.sec { background: #F3E8FF; color: #7C3AED; }
.research-icon.website { background: var(--green-bg); color: var(--green); }
.research-icon svg { width: 20px; height: 20px; }
.research-label {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
}
.research-url {
  font-family: var(--font-body);
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 160px;
}

/* ====== NOTES ====== */
.notes-textarea {
  width: 100%;
  min-height: 140px;
  padding: 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-dark);
  background: var(--off-white);
  resize: vertical;
  outline: none;
  transition: border-color var(--transition);
}
.notes-textarea:focus { border-color: var(--primary); }
.notes-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 14px;
}
.notes-timestamp {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text-muted);
}
.btn-save {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 24px;
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.3px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
  background: var(--primary);
  color: #fff;
  border: none;
}
.btn-save:hover { background: var(--primary-hover); }
.btn-save svg { width: 14px; height: 14px; }

/* ====== EMPTY STATE ====== */
.empty-inline {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}
.empty-inline p {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
}

/* ====== RESPONSIVE ====== */
@media (max-width: 1024px) {
  .stats-strip { grid-template-columns: repeat(2, 1fr); }
  .deals-grid { grid-template-columns: 1fr; }
  .firms-grid { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
  .mobile-topbar { display: flex; }
  .main { margin-left: 0; }
  .content-wrap { padding: 20px 16px 48px; }
  .person-header { padding: 24px 20px; }
  .person-header-inner {
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 16px;
  }
  .person-tags { justify-content: center; }
  .person-actions { justify-content: center; }
  .person-header-name { font-size: 24px; }
  .section-body { padding: 20px 18px; }
  .section-header { padding: 16px 18px; }
  .research-grid { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .stats-strip { grid-template-columns: 1fr 1fr; }
  .person-actions { flex-direction: column; width: 100%; }
  .btn-person { justify-content: center; width: 100%; }
}
</style>
</head>
<body>

<div id="sidebar-root"></div>
<script>
(function(){var s=document.createElement('script');s.src='js/sidebar.js?v='+Date.now();s.dataset.page='person';document.currentScript.parentNode.insertBefore(s,document.currentScript);})();
</script>

<!-- Mobile top bar -->
<div class="mobile-topbar">
  <button class="mobile-menu-btn" onclick="toggleSidebar()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="mobile-topbar-title" id="mobileTitle">Person Profile</div>
  <a href="index.html" style="font-family:var(--font-ui);font-size:12px;font-weight:600;color:var(--primary);text-decoration:none;">Deals</a>
</div>

<!-- Main Content -->
<div class="main">
  <div class="content-wrap">

    <!-- Loading Skeleton -->
    <div class="loading-wrap" id="loadingSkeleton">
      <div class="skeleton skeleton-header"></div>
      <div class="skeleton skeleton-stats"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>

    <!-- Loaded Content -->
    <div class="loaded-wrap" id="loadedContent">

      <!-- Person Header -->
      <div class="person-header">
        <div class="person-header-inner">
          <div class="person-header-photo" id="personPhoto">GC</div>
          <div class="person-header-info">
            <h1 class="person-header-name" id="personName">Loading...</h1>
            <p class="person-header-role" id="personRole"></p>
            <div class="person-tags" id="personTags"></div>
            <div class="person-actions" id="personActions"></div>
          </div>
        </div>
      </div>

      <!-- Stats Strip -->
      <div class="stats-strip" id="statsStrip"></div>

      <!-- Firms Section -->
      <div class="section-card">
        <div class="section-header">
          <div class="section-title">Firms</div>
          <span class="section-badge" id="firmsCount">0</span>
        </div>
        <div class="section-body">
          <div class="firms-grid" id="firmsGrid"></div>
        </div>
      </div>

      <!-- Deals Section -->
      <div class="section-card">
        <div class="section-header">
          <div class="section-title">Deals</div>
          <span class="section-badge" id="dealsCount">0</span>
        </div>
        <div class="section-body">
          <div class="deals-grid" id="dealsGrid"></div>
          <div class="empty-inline" id="dealsEmpty" style="display:none;">
            <p>No deals found for this person.</p>
          </div>
        </div>
      </div>

      <!-- Research -->
      <div class="section-card">
        <div class="section-header">
          <div class="section-title">Research</div>
        </div>
        <div class="section-body">
          <div class="research-grid" id="researchGrid"></div>
        </div>
      </div>


    </div><!-- /loaded-wrap -->
  </div><!-- /content-wrap -->
</div><!-- /main -->

<script>
// ========== AUTH GATE ==========
(function enforceAuth() {
  var user = JSON.parse(localStorage.getItem('gycUser') || 'null');
  if (!user || !user.token || user.token === 'local-session') {
    localStorage.removeItem('gycUser');
    window.location.href = 'deal-login.html';
  }
})();


// ========== FALLBACK DATA ==========
var FALLBACK_DATA = {
  person: {
    name: "Grant Cardone",
    linkedIn: "https://www.linkedin.com/in/grantcardone/",
    companies: [
      {
        id: "fallback-cc",
        name: "Cardone Capital",
        role: "CEO",
        website: "https://cardonecapital.com",
        linkedinCeo: "https://www.linkedin.com/in/grantcardone/",
        foundingYear: 2017,
        type: "Fund Manager",
        assetClasses: ["Multi Family"],
        totalInvestors: null,
        dealCount: 3
      }
    ],
    deals: [
      {
        id: "fallback-deal-1",
        name: "Cardone Capital Fund 10X",
        companyName: "Cardone Capital",
        assetClass: "Multi Family",
        dealType: "Fund",
        targetIRR: 0.12,
        equityMultiple: 1.8,
        prefReturn: 0.06,
        minInvestment: 5000,
        holdPeriod: 7,
        status: "Closed",
        strategy: "Core Plus",
        addedDate: "2024-01-15"
      }
    ],
    stats: {
      totalDeals: 3,
      totalFirms: 1,
      avgIRR: 0.12,
      avgEquityMultiple: 1.8,
      avgPrefReturn: 0.06,
      totalAUM: null,
      avgMinInvestment: 5000
    }
  }
};

var PERSON_API_URL = '/api/person';

// ========== GET PARAMS ==========
function getPersonParams() {
  var params = new URLSearchParams(window.location.search);
  return { name: params.get('name') };
}

// ========== FETCH DATA ==========
function fetchPersonData(params) {
  return fetch(PERSON_API_URL + '?name=' + encodeURIComponent(params.name))
    .then(function(resp) {
      if (!resp.ok) throw new Error('API returned ' + resp.status);
      return resp.json();
    })
    .then(function(data) {
      if (data && data.person) return data;
      throw new Error('Invalid response');
    })
    .catch(function(e) {
      console.warn('Person API unavailable, using fallback data:', e.message);
      return FALLBACK_DATA;
    });
}

// ========== HELPERS ==========
function pct(val) {
  if (val == null) return '--';
  return (val * 100).toFixed(1) + '%';
}
function multiple(val) {
  if (val == null) return '--';
  return val.toFixed(1) + 'x';
}
function currency(val) {
  if (val == null) return '--';
  return '$' + val.toLocaleString();
}
function getInitials(name) {
  if (!name) return '?';
  return name.split(' ').map(function(n) { return n[0]; }).join('').toUpperCase().slice(0, 3);
}
function statusClass(status) {
  if (!status) return 'green';
  var s = status.toLowerCase();
  if (s.includes('open')) return 'green';
  if (s.includes('evergreen')) return 'blue';
  if (s.includes('closed')) return 'orange';
  return 'green';
}
function escHtml(str) {
  var el = document.createElement('span');
  el.textContent = str;
  return el.innerHTML;
}
function escAttr(str) {
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ========== RENDER ==========
function renderPerson(data) {
  var p = data.person;
  var companies = p.companies || [];
  var deals = p.deals || [];

  // Update page title
  document.title = p.name + ' - GYC Dealflow';
  document.getElementById('mobileTitle').textContent = p.name;

  // Photo — check for known photo URLs or fall back to initials
  var photoEl = document.getElementById('personPhoto');
  var photoUrl = getPersonPhotoUrl(p.name);
  if (photoUrl) {
    photoEl.innerHTML = '<img src="' + escAttr(photoUrl) + '" alt="' + escAttr(p.name) + '" onerror="this.parentElement.textContent=\'' + escHtml(getInitials(p.name)) + '\';" />';
  } else {
    photoEl.textContent = getInitials(p.name);
  }

  // Name
  document.getElementById('personName').textContent = p.name;

  // Role — show primary company
  var roleEl = document.getElementById('personRole');
  if (companies.length > 0) {
    var primary = companies[0];
    roleEl.innerHTML = primary.role + ', <a href="sponsor.html?company=' + encodeURIComponent(primary.name) + '">' + escHtml(primary.name) + '</a>';
  }

  // Tags — collect all asset classes across firms
  var tagsEl = document.getElementById('personTags');
  var allAssetClasses = [];
  companies.forEach(function(c) {
    (c.assetClasses || []).forEach(function(ac) {
      if (allAssetClasses.indexOf(ac) === -1) allAssetClasses.push(ac);
    });
  });
  var tagsHtml = '';
  allAssetClasses.forEach(function(ac) {
    tagsHtml += '<span class="person-tag asset-class">' + escHtml(ac) + '</span>';
  });
  companies.forEach(function(c) {
    if (c.type) {
      tagsHtml += '<span class="person-tag type-tag">' + escHtml(c.type) + '</span>';
    }
  });
  tagsEl.innerHTML = tagsHtml;

  // Actions
  var actionsEl = document.getElementById('personActions');
  var actionsHtml = '';
  if (p.linkedIn) {
    actionsHtml += '<a href="' + escAttr(p.linkedIn) + '" target="_blank" rel="noopener" class="btn-person btn-person-outline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>LinkedIn</a>';
  }
  if (companies.length > 0 && companies[0].website) {
    actionsHtml += '<a href="' + escAttr(companies[0].website) + '" target="_blank" rel="noopener" class="btn-person btn-person-outline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>Website</a>';
  }
  actionsEl.innerHTML = actionsHtml;

  // Stats strip
  var stats = p.stats || {};
  var statsEl = document.getElementById('statsStrip');
  var statCards = [
    { label: 'Firms', value: stats.totalFirms || companies.length },
    { label: 'Total Deals', value: stats.totalDeals || deals.length },
    { label: 'Avg Target IRR', value: stats.avgIRR != null ? pct(stats.avgIRR) : '--' },
    { label: 'Avg Pref Return', value: stats.avgPrefReturn != null ? pct(stats.avgPrefReturn) : '--' }
  ];
  statsEl.innerHTML = statCards.map(function(st) {
    return '<div class="stat-card"><div class="stat-card-value">' + st.value + '</div><div class="stat-card-label">' + st.label + '</div></div>';
  }).join('');

  // Firms
  document.getElementById('firmsCount').textContent = companies.length;
  var firmsGrid = document.getElementById('firmsGrid');
  firmsGrid.innerHTML = companies.map(function(c) {
    return '<a href="sponsor.html?company=' + encodeURIComponent(c.name) + '" class="firm-card">' +
      '<div class="firm-avatar">' + escHtml(getInitials(c.name)) + '</div>' +
      '<div class="firm-info">' +
        '<div class="firm-name">' + escHtml(c.name) + '</div>' +
        '<div class="firm-meta">' + escHtml(c.role || 'CEO') + (c.foundingYear ? ' &middot; Founded ' + c.foundingYear : '') + '</div>' +
        '<div class="firm-stats">' +
          '<span class="firm-stat"><strong>' + c.dealCount + '</strong> deals</span>' +
          (c.assetClasses && c.assetClasses.length ? '<span class="firm-stat">' + escHtml(c.assetClasses.join(', ')) + '</span>' : '') +
        '</div>' +
      '</div>' +
    '</a>';
  }).join('');

  // Deals
  document.getElementById('dealsCount').textContent = deals.length;
  var dealsGrid = document.getElementById('dealsGrid');
  var dealsEmpty = document.getElementById('dealsEmpty');

  if (deals.length === 0) {
    dealsGrid.style.display = 'none';
    dealsEmpty.style.display = 'block';
  } else {
    dealsGrid.innerHTML = deals.map(function(d) {
      var sc = statusClass(d.status);
      return '<a href="deal.html?id=' + escAttr(d.id) + '" class="deal-card">' +
        '<div class="deal-card-header">' +
          '<div class="deal-card-badges">' +
            '<span class="deal-badge ' + sc + '">' + escHtml(d.status || 'Open') + '</span>' +
            (d.strategy ? '<span class="deal-badge orange">' + escHtml(d.strategy) + '</span>' : '') +
          '</div>' +
          '<div class="deal-card-title">' + escHtml(d.name) + '</div>' +
          '<div class="deal-card-subtitle">' + escHtml(d.companyName || '') + (d.assetClass ? ' &middot; ' + escHtml(d.assetClass) : '') + (d.dealType ? ' &middot; ' + escHtml(d.dealType) : '') + '</div>' +
        '</div>' +
        '<div class="deal-card-metrics">' +
          '<div><div class="deal-metric-label">Target IRR</div><div class="deal-metric-value">' + pct(d.targetIRR) + '</div></div>' +
          '<div><div class="deal-metric-label">Equity Multiple</div><div class="deal-metric-value">' + multiple(d.equityMultiple) + '</div></div>' +
          '<div><div class="deal-metric-label">Pref Return</div><div class="deal-metric-value">' + pct(d.prefReturn) + '</div></div>' +
          '<div><div class="deal-metric-label">Min Investment</div><div class="deal-metric-value">' + currency(d.minInvestment) + '</div></div>' +
        '</div>' +
        '<div class="deal-card-footer">' +
          '<span class="deal-footer-tag">' + (d.holdPeriod ? d.holdPeriod + ' yr hold' : '') + '</span>' +
          '<span class="deal-footer-link">View Deal &rarr;</span>' +
        '</div>' +
      '</a>';
    }).join('');
  }

  // Research grid
  var researchGrid = document.getElementById('researchGrid');
  var researchHtml = '';

  if (p.linkedIn) {
    researchHtml += '<a href="' + escAttr(p.linkedIn) + '" target="_blank" rel="noopener" class="research-tile">' +
      '<div class="research-icon linkedin"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg></div>' +
      '<div><div class="research-label">LinkedIn</div><div class="research-url">Personal Profile</div></div>' +
    '</a>';
  }

  // SEC search by person name
  var secUrl = 'https://www.sec.gov/cgi-bin/browse-edgar?company=&CIK=' + encodeURIComponent(p.name) + '&type=D&dateb=&owner=include&count=40&search_text=&action=getcompany';
  researchHtml += '<a href="' + escAttr(secUrl) + '" target="_blank" rel="noopener" class="research-tile">' +
    '<div class="research-icon sec"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>' +
    '<div><div class="research-label">SEC EDGAR</div><div class="research-url">Search filings</div></div>' +
  '</a>';

  // Company websites
  companies.forEach(function(c) {
    if (c.website) {
      researchHtml += '<a href="' + escAttr(c.website) + '" target="_blank" rel="noopener" class="research-tile">' +
        '<div class="research-icon website"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div>' +
        '<div><div class="research-label">' + escHtml(c.name) + '</div><div class="research-url">' + escHtml(c.website.replace(/^https?:\/\//, '')) + '</div></div>' +
      '</a>';
    }
  });

  researchGrid.innerHTML = researchHtml;

  // Show content
  document.body.classList.add('page-loaded');
}

// ========== PERSON PHOTOS ==========
// Known photo URLs for people in the system
var PERSON_PHOTOS = {
  'grant cardone': 'https://cardonecapital.com/wp-content/uploads/2024/05/gc-new-headshot.jpg'
};

function getPersonPhotoUrl(name) {
  if (!name) return null;
  return PERSON_PHOTOS[name.toLowerCase()] || null;
}

// ========== INIT ==========
(function init() {
  var params = getPersonParams();
  if (!params.name) {
    document.body.classList.add('page-loaded');
    document.getElementById('personName').textContent = 'Person Not Found';
    return;
  }
  fetchPersonData(params).then(renderPerson);
})();
</script>
</body>
</html>
