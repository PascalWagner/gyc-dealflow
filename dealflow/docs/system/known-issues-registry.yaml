  - issue_id: DEAL-003
    title: Deployed sandbox canonical review deal still returns empty normalized riskTags
    status: open
    severity: medium
    category: data_integrity
    feature_area: deal_review
    root_cause: The live sandbox code path still returns empty risk_tags for the canonical lending-fund review deal, even though the branch now falls back from empty arrays to inferred review tags.
    symptoms:
      - npm run qa:sandbox:live fails on missing riskTags after auth and lifecycle checks pass.
      - Browser and API review surfaces can load while the canonical review payload still omits normalized risk tags.
    source_of_truth: Live sandbox payload inspection plus branch-side transform regression coverage on 2026-04-04.
    related_files:
      - scripts/qa-sandbox-live.mjs
      - api/member/deals/transform.js
      - api/deals/[id].js
    related_tables:
      - opportunities
    related_endpoints:
      - GET /api/deals/:id
    first_detected_at: 2026-04-04
    last_seen_at: 2026-04-04
    resolution_notes: Branch code now falls back from empty risk_tags, investing_states, and underlying_exposure_types arrays to inferred values, and local regression tests cover that path. The issue remains open because the deployed sandbox still returns empty riskTags as of April 4, 2026.
    validation_steps:
      - Run node --test tests/deal-transform-lending.test.mjs
      - Re-run npm run qa:sandbox:live
      - Inspect GET /api/deals/:id payload for riskTags, sourceRiskFactors, and highlightedRisks
    regression_test_required: true
    regression_test_path: scripts/qa-sandbox-live.mjs
    readme_updated: true
