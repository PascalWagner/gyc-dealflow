    source_of_truth: LegacyOnboardingFlow.svelte and auth store audit on 2026-04-04.
    related_files:
      - src/lib/components/onboarding/LegacyOnboardingFlow.svelte
      - src/lib/stores/auth.js
    related_tables: []
    related_endpoints:
      - GET /api/gp-onboarding
      - POST /api/buybox
      - POST /api/gp-onboarding
      - POST /api/network?action=avatar
    first_detected_at: 2026-04-04
    last_seen_at: 2026-04-04
    resolution_notes: Deferred for a follow-up because it requires a broader pass over onboarding request helpers and token refresh semantics.
    validation_steps:
      - Exercise long-lived onboarding sessions and token refresh behavior in sandbox after a follow-up patch
    regression_test_required: true
    regression_test_path: scripts/qa-plan-wizard.mjs
    readme_updated: true

  - issue_id: ONB-004
    title: Buy-box completion can disagree between onboarding and buy-box APIs
    status: open
    severity: high
    category: data_integrity
    feature_area: onboarding
    root_cause: GET /api/buybox can synthesize _completedAt from GHL tags and fallback fields, while GET /api/gp-onboarding only treats user_buy_box.completed_at as canonical hasBuyBox state.
    symptoms:
      - The same sandbox identity can receive buyBox._completedAt from /api/buybox while /api/gp-onboarding returns hasBuyBox false.
      - Browser and API onboarding resume behavior can disagree with buy-box hydration for fallback-only users.
    source_of_truth: Side-by-side sandbox GET /api/buybox and GET /api/gp-onboarding comparison on 2026-04-04.
    related_files:
      - api/buybox.js
      - api/gp-onboarding.js
      - src/lib/components/onboarding/LegacyOnboardingFlow.svelte
    related_tables:
      - user_buy_box
      - user_profiles
    related_endpoints:
      - GET /api/buybox
      - GET /api/gp-onboarding
    first_detected_at: 2026-04-04
    last_seen_at: 2026-04-04
    resolution_notes: Branch code now labels fallback buy-box completion separately and preserves _completedAt for canonical user_buy_box completion only, with regression coverage in tests/buybox-completion-contract.test.mjs. The issue remains open because the deployed sandbox on 2026-04-04 still returned canonical-looking _completedAt from /api/buybox while /api/gp-onboarding reported hasBuyBox false.
    validation_steps:
      - Run node --test tests/buybox-completion-contract.test.mjs
      - Compare GET /api/buybox and GET /api/gp-onboarding for the same sandbox identity
      - Verify whether buyBox._completedAt comes from user_buy_box.completed_at or from GHL fallback tags
    regression_test_required: true
    regression_test_path: scripts/qa-sandbox-live.mjs
    readme_updated: true

