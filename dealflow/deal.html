    showShareToast('You\'ve already requested an intro for this deal.');
    return;
  }

  // Rate limit: 3 intros per day
  var todayKey = 'gycIntroCount_' + new Date().toISOString().split('T')[0];
  var todayCount = parseInt(localStorage.getItem(todayKey) || '0', 10);
  if (todayCount >= 3) {
    showShareToast('You\'ve reached the daily limit of 3 introduction requests. Try again tomorrow.');
    return;
  }

  // Remove existing modal
  var existing = document.getElementById('introConfirmOverlay');
  if (existing) existing.remove();

  // Get operator info
  var sponsors = deal.sponsors || [];
  var op = sponsors.find(function(s) { return s.role === 'operator'; });
  if (!op && deal.managementCompany) {
    op = { name: deal.managementCompany, ceo: deal.ceo, foundingYear: deal.mcFoundingYear, website: deal.mcWebsite };
  }
  var opName = op ? op.name : (deal.managementCompany || 'the operator');
  var opCeo = op ? (op.ceo || '') : (deal.ceo || '');
  var opWebsite = op ? (op.website || '') : (deal.mcWebsite || '');
  var opInitials = getInitials(opName);
  var opYears = op && op.foundingYear ? ((new Date().getFullYear()) - op.foundingYear) + '+ years' : '';
  var introsLeft = 3 - todayCount;

  // Build modal
  var modalHtml = '<div class="intro-confirm-modal" style="position:relative;">'
    + '<button class="intro-confirm-close" onclick="document.getElementById(\'introConfirmOverlay\').remove()">&times;</button>'

    + '<div style="font-family:var(--font-ui);font-size:20px;font-weight:800;color:var(--text-dark);margin-bottom:4px;">' + esc(opName) + '</div>'
    + '<div style="font-family:var(--font-body);font-size:13px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;">'
    + (opCeo ? '<span>' + esc(opCeo) + '</span>' : '')
    + (opCeo && opYears ? '<span>&middot;</span>' : '')
    + (opYears ? '<span>' + opYears + '</span>' : '')
    + (opWebsite ? ((opCeo || opYears ? '<span>&middot;</span>' : '') + '<a href="' + esc(opWebsite) + '" target="_blank" rel="noopener" style="color:var(--primary);text-decoration:none;font-weight:600;">Website</a>') : '')
    + '</div>'
    + '</div>'
    // Message
    + '<div style="padding:24px 36px 0;text-align:center;">'
    + '<div style="font-family:var(--font-body);font-size:14px;color:var(--text-secondary);line-height:1.6;">'
    + 'We\'ll connect you with ' + esc(opName) + ' for <strong style="color:var(--text-dark);">' + esc(deal.investmentName) + '</strong>. Pascal will make a personal email introduction on your behalf.'
    + '</div>'
    + '</div>'

    + '<button onclick="document.getElementById(\'introConfirmOverlay\').remove()" style="padding:14px 24px;background:none;border:1px solid var(--border);border-radius:12px;font-family:var(--font-ui);font-size:14px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all 0.15s;white-space:nowrap;" onmouseover="this.style.borderColor=\'var(--text-muted)\'" onmouseout="this.style.borderColor=\'var(--border)\'">Cancel</button>'

  document.body.appendChild(overlay);
  requestAnimationFrame(function() { overlay.classList.add('visible'); });

function submitIntroConfirmation() {

  var btn = document.getElementById('introConfirmBtn');
  if (btn) {
    btn.disabled = true;
    btn.style.opacity = '0.7';
    btn.innerHTML = 'Requesting...';
  }

  var user = {};
  try { user = JSON.parse(localStorage.getItem('gycUser') || '{}'); } catch(e) {}
  var token = user.token || '';

  var sponsors = deal.sponsors || [];
  var op = sponsors.find(function(s) { return s.role === 'operator'; });
  var opName = op ? op.name : (deal.managementCompany || '');
  var opCeo = op ? (op.ceo || '') : (deal.ceo || '');

  fetch('/api/intro-request', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({
      dealId: deal.id,
      dealName: deal.investmentName,
      operatorName: opName,
      operatorCeo: opCeo,
      managementCompanyId: deal.managementCompanyId || ''
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success) {
      // Store in localStorage for dedup
      localStorage.setItem('gycIntroRequested_' + deal.id, Date.now().toString());
      // Increment daily intro counter

      localStorage.setItem(_todayKey, (parseInt(localStorage.getItem(_todayKey) || '0', 10) + 1).toString());
      // Also store in gycIntroRequests array

        var intros = JSON.parse(localStorage.getItem('gycIntroRequests') || '[]');
        if (!Array.isArray(intros)) intros = [];
        var userEmail = '';
        try { userEmail = JSON.parse(localStorage.getItem('gycUser') || '{}').email || ''; } catch(e2) {}
        intros.push({ dealId: deal.id, deal: deal.investmentName, company: opName, userEmail: userEmail, timestamp: Date.now() });

          + '<div style="font-family:var(--font-body);font-size:14px;color:var(--text-secondary);line-height:1.6;max-width:320px;margin:0 auto;">Pascal will personally introduce you to ' + esc(opName) + '. Check your email — you\'ll be CC\'d on the intro.</div>'
          + '<button onclick="document.getElementById(\'introConfirmOverlay\').remove()" style="margin-top:28px;padding:12px 32px;background:var(--text-dark);color:#fff;border:none;border-radius:12px;font-family:var(--font-ui);font-size:14px;font-weight:700;cursor:pointer;transition:opacity 0.15s;" onmouseover="this.style.opacity=\'0.85\'" onmouseout="this.style.opacity=\'1\'">Back to Deal</button>'
          + '</div>';
      }

      // Update hero button
      var heroIntroBtn = document.querySelector('button[onclick*="requestIntroduction"]');
      if (heroIntroBtn) {
        heroIntroBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg>Introduction Requested';
        heroIntroBtn.style.background = 'rgba(81,190,123,0.15)';
        heroIntroBtn.style.color = 'var(--primary)';
        heroIntroBtn.style.border = '1px solid var(--primary)';
        heroIntroBtn.disabled = true;
      }
    } else {
      if (btn) {
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.innerHTML = 'Request Introduction';
      }
      alert('Something went wrong. Please try again.');
    }
  })
  .catch(function() {
    if (btn) {
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.innerHTML = 'Request Introduction';
    }
    alert('Something went wrong. Please try again.');
  });

  if (typeof gtag === 'function') {
    gtag('event', 'request_introduction', { company: opName, person: opCeo, deal: deal.investmentName });
  }
}

// File upload state
var _deckFile = null;
var _deckFileBase64 = null;

function handleDeckFileSelect(input) {
  if (input.files && input.files[0]) {
    processDeckFile(input.files[0]);
  }
}

function handleDeckFileDrop(event) {
  var files = event.dataTransfer.files;
  if (files && files[0]) {
    processDeckFile(files[0]);
  }
}

function processDeckFile(file) {
  if (file.size > 25 * 1024 * 1024) {
    alert('File is too large. Maximum size is 25MB.');
    return;
  }
  _deckFile = file;
  var reader = new FileReader();
  reader.onload = function(e) {
    // Strip the data URL prefix to get pure base64
    _deckFileBase64 = e.target.result.split(',')[1];
    // Update UI
    var uploadText = document.getElementById('deckUploadText');
    var uploadArea = document.getElementById('deckUploadArea');
    if (uploadText) uploadText.innerHTML = '<span style="color:var(--primary);font-weight:700;">✓ ' + file.name + '</span><br><span style="font-size:11px;color:var(--text-muted);">' + (file.size / 1024 / 1024).toFixed(1) + ' MB — click to change</span>';
    if (uploadArea) uploadArea.style.borderColor = 'var(--primary)';
  };
  reader.readAsDataURL(file);
}

async function submitDeck(dealId, dealName) {
  var urlInput = document.getElementById('deckUrlInput');
  var notesInput = document.getElementById('deckNotesInput');
  var submitBtn = document.getElementById('deckSubmitBtn');
  var docTypeSelect = document.getElementById('deckDocType');
  var docType = docTypeSelect ? docTypeSelect.value : 'deck';
  var docLabel = docType === 'ppm' ? 'PPM' : 'Deck';

  var deckUrl = (urlInput.value || '').trim();
  var hasFile = _deckFile && _deckFileBase64;

  if (!deckUrl && !hasFile) {
    if (urlInput) urlInput.style.borderColor = '#e74c3c';
    var uploadArea = document.getElementById('deckUploadArea');
    if (uploadArea) uploadArea.style.borderColor = '#e74c3c';
    return;
  }

  submitBtn.disabled = true;
  var isPpm = docType === 'ppm';
  submitBtn.textContent = hasFile ? (isPpm ? 'Uploading & analyzing PPM...' : 'Uploading...') : 'Submitting...';

  var userEmail = '';
  var userName = '';
  try {
    var userData = JSON.parse(localStorage.getItem('gycUser') || '{}');
    userEmail = userData.email || '';
    userName = userData.name || userData.firstName || '';
  } catch(e) {}

  try {
    if (hasFile) {
      var resp = await fetch('/api/deck-upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          dealId: dealId,
          dealName: docType === 'ppm' ? dealName + ' - PPM' : dealName,
          filedata: _deckFileBase64,
          filename: _deckFile.name,
          notes: (notesInput.value || '').trim() + (docType === 'ppm' ? ' [PPM document]' : ''),
          userEmail: userEmail,
          userName: userName,
          docType: docType
        })
      });

      if (resp.ok) {
        var data = await resp.json();

        // If a local-only deal was promoted to Supabase, redirect to the real deal
        if (data.newDealId) {
          // Remove from localStorage user deals
          try {
            var userDeals = JSON.parse(localStorage.getItem('gycUserDeals') || '[]');
            localStorage.setItem('gycUserDeals', JSON.stringify(userDeals.filter(function(d) { return d.id !== dealId; })));
          } catch(e) {}
          // Invalidate caches and redirect to real deal page
          try { sessionStorage.removeItem('gycDealsCache'); } catch(e) {}
          window.location.href = 'deal.html?id=' + data.newDealId;
          return;
        }

        // Update local deal objects so Documents card reflects the upload immediately
        var localDeal = DEALS.find(function(d) { return d.id === dealId; });
        if (localDeal && data.driveUrl) {
          if (docType === 'ppm') localDeal.ppmUrl = data.driveUrl;
          else localDeal.deckUrl = data.driveUrl;
        }
        // Also update the active deal reference used by renderDeal()
        if (window._currentDeal && window._currentDeal.id === dealId && data.driveUrl) {
          if (docType === 'ppm') window._currentDeal.ppmUrl = data.driveUrl;
          else window._currentDeal.deckUrl = data.driveUrl;
        }
        // Invalidate session cache so re-render fetches fresh data
        try { sessionStorage.removeItem('gycDealsCache'); } catch(e) {}
        document.getElementById('deckModalForm').style.display = 'none';

        // If deal record wasn't updated, warn and log
        if (!data.dealUpdated) {
          console.error('PPM/Deck uploaded to storage but deal record not updated:', data.dealUpdateError || 'unknown');
        }

        // If enrichment extracted data, show confirmation wizard
        if (data.enriched && data.extractedData) {
          showEnrichmentWizard(dealId, data.extractedData, data.driveUrl, docLabel, userEmail);
        } else {
          var successMsg = document.getElementById('deckSuccessMsg');
          var saveNote = data.dealUpdated ? '' : '<br><span style="color:#f59e0b;font-size:12px;">⚠ Deal record not saved.' + (data.dealUpdateError ? ' (' + data.dealUpdateError + ')' : '') + '</span>';
          if (successMsg) successMsg.innerHTML = docLabel + ' uploaded successfully!' + (data.driveUrl ? '<br><a href="' + data.driveUrl + '" target="_blank" style="color:var(--primary);font-size:13px;">View file →</a>' : '') + saveNote;
          document.getElementById('deckModalSuccess').style.display = 'block';
        }
      } else {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit';
        alert('Upload failed. Please try again.');
      }
    } else {
      var resp = await fetch('/api/deck-submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          dealId: dealId,
          dealName: dealName,
          deckUrl: deckUrl,
          notes: (notesInput.value || '').trim() + (docType === 'ppm' ? ' [PPM document]' : ''),
          userEmail: userEmail,
          userName: userName,
          docType: docType
        })
      });

      if (resp.ok) {
        document.getElementById('deckModalForm').style.display = 'none';
        document.getElementById('deckModalSuccess').style.display = 'block';
      } else {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit';
        alert('Something went wrong. Please try again.');
      }
    }
  } catch(e) {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit';
    alert('Network error. Please try again.');
  }

  _deckFile = null;
  _deckFileBase64 = null;
}

function formatEnrichmentValue(key, val) {
  if (val === null || val === undefined) return '';
  if (key === 'targetIRR' || key === 'preferredReturn' || key === 'cashOnCash' || key === 'sponsorCoinvest') {
    return typeof val === 'number' ? (val * 100).toFixed(1) + '%' : val;
  }
  if (key === 'equityMultiple') return typeof val === 'number' ? val.toFixed(2) + 'x' : val;
  if (key === 'investmentMinimum' || key === 'offeringSize' || key === 'purchasePrice' || key === 'fundAUM') {
    return typeof val === 'number' ? '$' + val.toLocaleString() : val;
  }
  return String(val);
}

async function confirmEnrichment(dealId, userEmail) {
  var btn = document.getElementById('enrichConfirmBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }

  // Collect values from inputs
  var inputs = document.querySelectorAll('[data-enrich-key]');
  var confirmed = {};
  for (var i = 0; i < inputs.length; i++) {
    var key = inputs[i].getAttribute('data-enrich-key');
    var val = (inputs[i].value || '').trim();
    if (val) {
      // Convert formatted values back to raw
      if (['targetIRR', 'preferredReturn', 'cashOnCash', 'sponsorCoinvest'].indexOf(key) >= 0) {
        val = val.replace('%', '');
        var num = parseFloat(val);
        if (!isNaN(num)) val = num > 1 ? num / 100 : num;
      } else if (key === 'equityMultiple') {
        val = parseFloat(val.replace('x', ''));
      } else if (['investmentMinimum', 'offeringSize', 'purchasePrice', 'fundAUM'].indexOf(key) >= 0) {
        val = parseFloat(val.replace(/[$,]/g, ''));
      } else if (key === 'holdPeriod') {
        val = parseFloat(val);
      }
      confirmed[key] = val;
    }
  }

  try {
    var resp = await fetch('/api/deal-confirm-enrichment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dealId: dealId, confirmedData: confirmed, userEmail: userEmail })
    });

    if (resp.ok) {
      var data = await resp.json();
      // Update local deal with confirmed fields
      var localDeal = DEALS.find(function(d) { return d.id === dealId; });
      if (localDeal) {
        for (var k in confirmed) {
          localDeal[k] = confirmed[k];
        }
      }
      closeDeckSubmitModal();
      renderDeal();
    } else {
      if (btn) { btn.disabled = false; btn.textContent = 'Confirm & Save to Database'; }
      alert('Failed to save. Please try again.');
    }
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Confirm & Save to Database'; }
    alert('Network error. Please try again.');
  }
}

// ========== STRESS TEST CALCULATOR ==========

function recalcStressTest() {
  var dataEl = document.getElementById('stressTestData');
  if (!dataEl) return;
  var base = JSON.parse(dataEl.textContent);

  var investAmount = parseFloat(document.getElementById('stInvestAmount').value) || 50000;
  var rentGrowth = parseFloat(document.getElementById('stRentGrowth').value) / 100;
  var exitCap = parseFloat(document.getElementById('stExitCap').value) / 100;
  var vacancy = parseFloat(document.getElementById('stVacancy').value) / 100;
  var interest = parseFloat(document.getElementById('stInterest').value) / 100;
  var hold = parseFloat(document.getElementById('stHold').value);

  // Update display labels
  document.getElementById('stInvestDisplay').textContent = '$' + investAmount.toLocaleString();
  document.getElementById('stRentGrowthDisplay').textContent = (rentGrowth * 100).toFixed(1) + '%';
  document.getElementById('stExitCapDisplay').textContent = (exitCap * 100).toFixed(2) + '%';
  document.getElementById('stVacancyDisplay').textContent = (vacancy * 100).toFixed(0) + '%';
  document.getElementById('stInterestDisplay').textContent = (interest * 100).toFixed(2) + '%';
  document.getElementById('stHoldDisplay').textContent = hold + ' yrs';

  var result = calcStressScenario(base, investAmount, rentGrowth, exitCap, vacancy, interest, hold);

  document.getElementById('stOutCashFlow').textContent = '$' + Math.round(result.annualCashFlow).toLocaleString();
  document.getElementById('stOutDistributions').textContent = '$' + Math.round(result.totalDistributions).toLocaleString();
  document.getElementById('stOutSaleProceeds').textContent = '$' + Math.round(result.saleProceeds).toLocaleString();
  document.getElementById('stOutTotalReturn').textContent = '$' + Math.round(result.totalReturn).toLocaleString();

  var irrEl = document.getElementById('stOutIRR');
  irrEl.textContent = (result.projectedIRR * 100).toFixed(1) + '%';
  irrEl.className = 'stress-output-value' + (result.projectedIRR >= base.baseIRR ? ' positive' : result.projectedIRR < base.baseIRR * 0.7 ? ' negative' : '');

  var emEl = document.getElementById('stOutEM');
  emEl.textContent = result.equityMultiple.toFixed(2) + 'x';
  emEl.className = 'stress-output-value' + (result.equityMultiple >= base.baseEM ? ' positive' : result.equityMultiple < 1.0 ? ' negative' : '');

  // Scenario comparison
  var bear = calcStressScenario(base, investAmount, Math.max(0, rentGrowth - 0.02), exitCap + 0.01, Math.min(0.2, vacancy + 0.05), interest, hold);
  var bull = calcStressScenario(base, investAmount, rentGrowth + 0.01, Math.max(0.04, exitCap - 0.005), Math.max(0, vacancy - 0.02), interest, hold);

  var tbody = document.getElementById('scenarioBody');
  if (tbody) {
    tbody.innerHTML =
      '<tr><td>Annual Cash Flow</td><td class="bear">$' + Math.round(bear.annualCashFlow).toLocaleString() + '</td><td class="base">$' + Math.round(result.annualCashFlow).toLocaleString() + '</td><td class="bull">$' + Math.round(bull.annualCashFlow).toLocaleString() + '</td></tr>' +
      '<tr><td>Total Distributions</td><td class="bear">$' + Math.round(bear.totalDistributions).toLocaleString() + '</td><td class="base">$' + Math.round(result.totalDistributions).toLocaleString() + '</td><td class="bull">$' + Math.round(bull.totalDistributions).toLocaleString() + '</td></tr>' +
      '<tr><td>Sale Proceeds</td><td class="bear">$' + Math.round(bear.saleProceeds).toLocaleString() + '</td><td class="base">$' + Math.round(result.saleProceeds).toLocaleString() + '</td><td class="bull">$' + Math.round(bull.saleProceeds).toLocaleString() + '</td></tr>' +
      '<tr><td>Total Return</td><td class="bear">$' + Math.round(bear.totalReturn).toLocaleString() + '</td><td class="base">$' + Math.round(result.totalReturn).toLocaleString() + '</td><td class="bull">$' + Math.round(bull.totalReturn).toLocaleString() + '</td></tr>' +
      '<tr><td>Projected IRR</td><td class="bear">' + (bear.projectedIRR * 100).toFixed(1) + '%</td><td class="base">' + (result.projectedIRR * 100).toFixed(1) + '%</td><td class="bull">' + (bull.projectedIRR * 100).toFixed(1) + '%</td></tr>' +
      '<tr><td>Equity Multiple</td><td class="bear">' + bear.equityMultiple.toFixed(2) + 'x</td><td class="base">' + result.equityMultiple.toFixed(2) + 'x</td><td class="bull">' + bull.equityMultiple.toFixed(2) + 'x</td></tr>';
  }
}

function calcStressScenario(base, investAmount, rentGrowth, exitCap, vacancy, interest, hold) {
  // Adjusted cash-on-cash based on rent growth and vacancy vs base assumptions
  var adjustedCoC = base.baseCoC * (1 + rentGrowth - vacancy) / (1 + base.baseVacancy);
  adjustedCoC = Math.max(0, adjustedCoC);

  var annualCashFlow = investAmount * adjustedCoC;
  var totalDistributions = annualCashFlow * hold;

  // Exit value scales inversely with cap rate change
  var capRateEffect = base.baseExitCap / exitCap;
  var projectedEM = base.baseEM * capRateEffect * (hold / base.baseHold);
  var saleProceeds = investAmount * Math.max(0, projectedEM - 1);

  var totalReturn = totalDistributions + saleProceeds;
  var equityMultiple = (investAmount + totalReturn) / investAmount;

  // Simplified IRR approximation: annualized return
  var projectedIRR = hold > 0 ? (Math.pow(equityMultiple, 1 / hold) - 1) : 0;

  return {
    annualCashFlow: annualCashFlow,
    totalDistributions: totalDistributions,
    saleProceeds: saleProceeds,
    totalReturn: totalReturn,
    equityMultiple: equityMultiple,
    projectedIRR: projectedIRR
  };
}

// ========== GP CALL AGENDA GENERATOR ==========

function generateGPCallAgenda(dealId, dealName) {
  var panel = document.getElementById('gpAgendaPanel');
  if (!panel) return;

  // If already visible, toggle off
  if (panel.innerHTML) {
    panel.innerHTML = '';
    return;
  }

  var deal = DEALS.find(function(d) { return d.id === dealId; });
  if (!deal) return;

  var checklist = getChecklistForDeal(deal);
  var userAnswers = loadDDAnswers(dealId);

  // Sections to exclude from GP call (these are LP's own research)
  var excludeSections = ['External Due Diligence (LP Led)', 'Post-Research Questions'];

  var agendaSections = [];
  var totalQuestions = 0;

  for (var si = 0; si < checklist.sections.length; si++) {
    var sec = checklist.sections[si];
    // Skip excluded sections
    if (excludeSections.indexOf(sec.title) >= 0) continue;

    var unanswered = [];
    for (var qi = 0; qi < sec.questions.length; qi++) {
      var q = sec.questions[qi];
      var key = 's' + si + 'q' + qi;
      var autoVal = q.autoField ? getAutoValue(deal, q.autoField, q.format) : null;
      var userVal = userAnswers[key] || '';

      // Only include questions that are NOT auto-filled and NOT answered
      if (!autoVal && !userVal) {
        unanswered.push(q.q);
      }
    }

    if (unanswered.length > 0) {
      agendaSections.push({ title: sec.title, questions: unanswered });
      totalQuestions += unanswered.length;
    }
  }

  if (totalQuestions === 0) {
    panel.innerHTML = '<div class="gp-agenda-panel"><div class="gp-agenda-empty">All questions have been answered. No agenda items needed for a GP call.</div></div>';
    return;
  }

  var today = new Date();
  var dateStr = today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

  var html = '<div class="gp-agenda-panel">';
  html += '<div class="gp-agenda-header"><div><div class="gp-agenda-title">GP Call Agenda &mdash; ' + esc(dealName) + '</div><div class="gp-agenda-date">Generated ' + esc(dateStr) + ' &middot; ' + totalQuestions + ' questions</div></div>';
  html += '<button class="gp-agenda-copy" onclick="copyGPAgenda(\'' + escAttr(dealId) + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy to Clipboard</button>';
  html += '</div>';

  for (var i = 0; i < agendaSections.length; i++) {
    html += '<div class="gp-agenda-section-title">' + esc(agendaSections[i].title) + '</div>';
    for (var j = 0; j < agendaSections[i].questions.length; j++) {
      html += '<div class="gp-agenda-question">' + esc(agendaSections[i].questions[j]) + '</div>';
    }
  }

  html += '</div>';
  panel.innerHTML = html;

  // Store for clipboard
  panel._agendaText = buildAgendaPlainText(dealName, dateStr, agendaSections);
}

function buildAgendaPlainText(dealName, dateStr, sections) {
  var text = 'GP Call Agenda \u2014 ' + dealName + '\n';
  text += 'Generated ' + dateStr + '\n\n';
  for (var i = 0; i < sections.length; i++) {
    text += sections[i].title + ':\n';
    for (var j = 0; j < sections[i].questions.length; j++) {
      text += '\u25A1 ' + sections[i].questions[j] + '\n';
    }
    text += '\n';
  }
  return text;
}

function copyGPAgenda(dealId) {
  var panel = document.getElementById('gpAgendaPanel');
  if (!panel || !panel._agendaText) return;

  navigator.clipboard.writeText(panel._agendaText).then(function() {
    var btn = panel.querySelector('.gp-agenda-copy');
    if (btn) {
      var orig = btn.innerHTML;
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Copied!';
      setTimeout(function() { btn.innerHTML = orig; }, 2000);
    }
  });
}

  var text = encodeURIComponent('Check out this deal on GYC Dealflow: ' + dealName + ' - ' + url);
  window.open('sms:?&body=' + text);
  var dd = document.getElementById('shareDropdown');
  if (dd) dd.classList.remove('active');
}

// ========== CO-INVESTMENT INVITE LINK ==========
function shareInviteLink(dealId, dealName) {
  if (!requireAuth('share this deal with a co-investor')) return;
  var dd = document.getElementById('shareDropdown');
  if (dd) dd.classList.remove('active');

  // Generate invite link via API
  var user = getUser();
  fetch('/api/invite', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (user && user.token) },
    body: JSON.stringify({ dealId: dealId })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (!data.success || !data.code) {
      // Fallback: use direct link with user ref
      showInviteModal(dealId, dealName, null);
      return;
    }
    showInviteModal(dealId, dealName, data.code);
  }).catch(function() {
    // Fallback: show modal with direct link
    showInviteModal(dealId, dealName, null);
  });
}

function showInviteModal(dealId, dealName, inviteCode) {
  var existing = document.getElementById('inviteModal');
  if (existing) existing.remove();

  var user = getUser();
  var userName = user ? (user.name || user.firstName || user.email.split('@')[0]) : 'Someone';
  var baseUrl = window.location.origin + '/deal.html?id=' + dealId;
  var inviteUrl = inviteCode ? baseUrl + '&inv=' + inviteCode : baseUrl;

  var overlay = document.createElement('div');
  overlay.id = 'inviteModal';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);animation:fadeIn 0.2s ease;';
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };

  var emailSubject = encodeURIComponent(userName + ' shared a deal with you: ' + dealName);
  var emailBody = encodeURIComponent(userName + ' thinks you might be interested in this deal:\n\n' + dealName + '\n\n' + inviteUrl + '\n\nView the full deal details, pitch deck, and due diligence on GYC Dealflow.');
  var smsBody = encodeURIComponent(userName + ' shared a deal with you on GYC: ' + dealName + ' - ' + inviteUrl);

  overlay.innerHTML = '<div style="background:var(--bg-card,#fff);border-radius:16px;padding:32px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);animation:slideUp 0.25s ease;">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">'
    + '<div style="font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--text-dark);">Invite a Co-Investor</div>'
    + '<button onclick="document.getElementById(\'inviteModal\').remove()" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:20px;line-height:1;">&times;</button>'
    + '</div>'
    + '<div style="font-family:var(--font-body);font-size:13px;color:var(--text-secondary);margin-bottom:20px;line-height:1.5;">Share a personal invite link for <strong style="color:var(--text-dark);">' + (dealName || 'this deal') + '</strong>. Your friend will see the deal and can sign up to save it.</div>'
    + '<div style="display:flex;gap:8px;margin-bottom:16px;">'
    + '<input id="inviteLinkInput" type="text" value="' + inviteUrl + '" readonly style="flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-family:var(--font-ui);font-size:12px;color:var(--text-dark);background:var(--bg-page,#f5f5f5);min-width:0;" onclick="this.select()" />'
    + '<button onclick="copyInviteLink()" style="flex-shrink:0;padding:10px 16px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-family:var(--font-ui);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;">Copy Link</button>'
    + '</div>'
    + '<div style="display:flex;gap:8px;">'
    + '<a href="mailto:?subject=' + emailSubject + '&body=' + emailBody + '" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border:1px solid var(--border);border-radius:8px;font-family:var(--font-ui);font-size:12px;font-weight:600;color:var(--text-secondary);text-decoration:none;transition:background 0.15s;" onmouseover="this.style.background=\'var(--bg-page)\'" onmouseout="this.style.background=\'transparent\'">'
    + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>'
    + 'Email</a>'
    + '<a href="sms:?&body=' + smsBody + '" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border:1px solid var(--border);border-radius:8px;font-family:var(--font-ui);font-size:12px;font-weight:600;color:var(--text-secondary);text-decoration:none;transition:background 0.15s;" onmouseover="this.style.background=\'var(--bg-page)\'" onmouseout="this.style.background=\'transparent\'">'
    + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'
    + 'Text</a>'
    + '</div>'
    + '</div>';
  document.body.appendChild(overlay);
}

function copyInviteLink() {
  var input = document.getElementById('inviteLinkInput');
  if (!input) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(input.value).then(function() { showShareToast('Invite link copied!'); });
  } else {
    input.select();
    document.execCommand('copy');
    showShareToast('Invite link copied!');
  }
}

// ========== CLAIM THIS DEAL (GP) ==========
function claimThisDeal(dealId, dealName, companyName) {
  if (!requireAuth('claim this deal')) return;

  var existing = document.getElementById('claimModal');
  if (existing) existing.remove();

  var user = getUser();
  var userName = user && user.name ? user.name : '';
  var userEmail = user && user.email ? user.email : '';
  var overlay = document.createElement('div');
  overlay.id = 'claimModal';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);animation:fadeIn 0.2s ease;';
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };

  overlay.innerHTML = '<div style="background:var(--bg-card,#fff);border-radius:16px;padding:32px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);animation:slideUp 0.25s ease;">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">'
    + '<div style="font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--text-dark);">Claim This Deal</div>'
    + '<button onclick="document.getElementById(\'claimModal\').remove()" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:20px;line-height:1;">&times;</button>'
    + '</div>'
    + '<div style="font-family:var(--font-body);font-size:13px;color:var(--text-secondary);margin-bottom:20px;line-height:1.5;">Claim <strong style="color:var(--text-dark);">' + (dealName || 'this deal') + '</strong> to manage your deal listing, see investor interest, and respond to questions.</div>'
    + '<div style="background:var(--bg-page,#f5f5f5);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:20px;">'
    + '<div style="font-family:var(--font-ui);font-size:13px;font-weight:700;color:var(--text-dark);margin-bottom:2px;">' + userName + '</div>'
    + '<div style="font-family:var(--font-body);font-size:12px;color:var(--text-muted);">' + userEmail + '</div>'
    + (companyName ? '<div style="font-family:var(--font-body);font-size:12px;color:var(--text-muted);margin-top:2px;">' + companyName + '</div>' : '')
    + '</div>'
    + '<form id="claimForm" onsubmit="submitClaim(event, \'' + dealId + '\')">'
    + '<input type="hidden" name="claimName" value="' + userName + '" />'
    + '<input type="hidden" name="claimEmail" value="' + userEmail + '" />'
    + '<input type="hidden" name="claimCompany" value="' + (companyName || '') + '" />'
    + '<div style="margin-bottom:20px;"><label style="display:block;font-family:var(--font-ui);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:4px;">Your Role</label>'
    + '<select name="claimRole" required style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-family:var(--font-body);font-size:13px;color:var(--text-dark);background:var(--bg-page,#f5f5f5);box-sizing:border-box;">'
    + '<option value="">Select your role...</option><option value="founder">Founder / CEO</option><option value="ir">IR / Investor Relations</option><option value="partner">Managing Partner</option><option value="authorized">Authorized Representative</option></select></div>'
    + '<button type="submit" id="claimSubmitBtn" style="width:100%;padding:14px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-family:var(--font-ui);font-size:14px;font-weight:700;cursor:pointer;transition:background 0.15s;" onmouseover="this.style.background=\'#1d4ed8\'" onmouseout="this.style.background=\'#2563eb\'">Submit Claim</button>'
    + '</form></div>';
  document.body.appendChild(overlay);
}

function submitClaim(e, dealId) {
  e.preventDefault();
  var form = document.getElementById('claimForm');
  var btn = document.getElementById('claimSubmitBtn');
  btn.textContent = 'Submitting...';
  btn.disabled = true;

  var user = getUser();
  var data = {
    dealId: dealId,
    name: form.claimName.value,
    email: form.claimEmail.value,
    company: form.claimCompany.value,
    role: form.claimRole.value
  };

  fetch('/api/deal-claim', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (user && user.token) },
    body: JSON.stringify(data)
  }).then(function(r) { return r.json(); }).then(function(res) {
    document.getElementById('claimModal').remove();
    // Replace claim banner with success message
    var banner = document.getElementById('claimDealBanner');
    if (banner) {
      banner.style.background = 'linear-gradient(135deg,rgba(81,190,123,0.06),rgba(81,190,123,0.02))';
      banner.style.borderColor = 'rgba(81,190,123,0.2)';
      banner.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#51BE7B" stroke-width="2" width="20" height="20"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
        + '<div style="font-family:var(--font-ui);font-size:13px;font-weight:700;color:var(--text-dark);">Claim submitted! We\'ll review and get back to you within 24 hours.</div>';
    }
    showShareToast('Claim submitted successfully');
  }).catch(function() {
    btn.textContent = 'Submit Claim';
    btn.disabled = false;
    showShareToast('Error submitting claim. Please try again.');
  });
}

</script>
