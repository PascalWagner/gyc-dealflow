<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deal Detail - GYC Dealflow</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }



:root {

  --primary: #51BE7B;

  --primary-hover: #45A86C;

  --primary-light: #32C583;

  --bg-cream: #FAF9F5;

  --bg-card: #FFFFFF;

  --bg-sidebar: #0A1E21;

  --bg-sidebar-hover: #14333A;

  --bg-sidebar-active: #1F5159;

  --text-dark: #141413;

  --text-secondary: #607179;

  --text-muted: #8A9AA0;

  --text-sidebar: rgba(255,255,255,0.55);

  --text-sidebar-active: #FFFFFF;

  --border: #DDE5E8;

  --border-light: #EDF1F2;

  --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);

  --shadow-card-hover: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);

  --radius: 12px;

  --radius-sm: 8px;

  --sidebar-width: 240px;

  --green: #51BE7B;

  --green-bg: #E7F5F0;

  --orange: #CF7A30;

  --orange-bg: #FFF3E6;

  --red: #D04040;

  --blue: #2563EB;

  --blue-bg: #EFF6FF;

  --teal-deep: #1F5159;

  --teal-midnight: #0A1E21;

  --accent-green: #40E47F;

  --mint-bg: #E7F5F0;

  --bg-page: #FAF9F5;

  --off-white: #FAF9F5;

  --charcoal: #141413;

  --slate: #607179;

  --transition: 0.2s ease;

  --font-headline: 'DM Serif Display', Georgia, serif;

  --font-ui: 'Plus Jakarta Sans', -apple-system, sans-serif;

  --font-body: 'Source Sans 3', 'Source Sans Pro', sans-serif;

}



body {

  font-family: var(--font-body);

  background: var(--bg-cream);

  color: var(--text-dark);

  line-height: 1.5;

  overflow-x: hidden;

  -webkit-font-smoothing: antialiased;

}



/* ====== SIDEBAR ====== */

.sidebar {

  position: fixed;

  left: 0; top: 0; bottom: 0;

  width: var(--sidebar-width);

  background: var(--bg-sidebar);

  display: flex;

  flex-direction: column;

  z-index: 100;

  transition: transform 0.3s ease;

}



.sidebar-logo {

  padding: 20px 24px;

  display: flex;

  align-items: center;

  gap: 12px;

  border-bottom: 1px solid rgba(255,255,255,0.06);

}



.sidebar-logo-icon {

  width: 36px; height: 36px;

  background: var(--primary);

  border-radius: 8px;

  display: flex;

  align-items: center;

  justify-content: center;

  font-family: var(--font-ui);

  font-weight: 700;

  color: #fff;

  font-size: 12px;

  letter-spacing: -0.5px;

}



.sidebar-logo-text {

  font-family: var(--font-headline);

  font-size: 18px;

  font-weight: 400;

  color: #fff;

  letter-spacing: -0.3px;

}



.sidebar-nav {

  flex: 1;

  padding: 12px 0;

  overflow-y: auto;

}



.nav-back {

  display: flex;

  align-items: center;

  gap: 8px;

  padding: 12px 24px;

  color: var(--accent-green);

  font-family: var(--font-ui);

  font-size: 12px;

  font-weight: 600;

  text-decoration: none;

  transition: all var(--transition);

  border-bottom: 1px solid rgba(255,255,255,0.06);

  margin-bottom: 4px;

}

.nav-back:hover { background: var(--bg-sidebar-hover); color: #fff; }

.nav-back svg { width: 16px; height: 16px; }



.nav-section-label {

  padding: 16px 24px 8px;

  font-family: var(--font-ui);

  font-size: 10px;

  font-weight: 600;

  text-transform: uppercase;

  letter-spacing: 1.5px;

  color: rgba(255,255,255,0.3);

}



.nav-item {

  display: flex;

  align-items: center;

  gap: 12px;

  padding: 10px 24px;

  color: var(--text-sidebar);

  cursor: pointer;

  transition: all var(--transition);

  font-family: var(--font-ui);

  font-size: 13px;

  font-weight: 500;

  position: relative;

  text-decoration: none;

}



.nav-item:hover { background: var(--bg-sidebar-hover); color: #fff; }

.nav-item.active {

  background: var(--bg-sidebar-active);

  color: var(--text-sidebar-active);

}

.nav-item.active::before {

  content: '';

  position: absolute;

  left: 0; top: 4px; bottom: 4px;

  width: 3px;

  background: var(--primary);

  border-radius: 0 2px 2px 0;

}



.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; }

.nav-item.active svg, .nav-item:hover svg { opacity: 1; }

.nav-item-promo {

  background: linear-gradient(135deg, rgba(81,190,123,0.15), rgba(81,190,123,0.05)) !important;

  border: 1px solid rgba(81,190,123,0.3);

  border-radius: 8px !important;

  margin: 0 8px 8px 8px;

  color: #51BE7B !important;

  font-weight: 700 !important;

}

.nav-item-promo svg { opacity: 1 !important; stroke: #51BE7B !important; }

.nav-item-promo:hover { background: linear-gradient(135deg, rgba(81,190,123,0.25), rgba(81,190,123,0.1)) !important; color: #fff !important; }

.nav-item-promo:hover svg { stroke: #fff !important; }



.nav-badge {

  margin-left: auto;

  background: var(--primary);

  color: #fff;

  font-size: 11px;

  font-weight: 600;

  padding: 2px 8px;

  border-radius: 10px;

  min-width: 20px;

  text-align: center;

}



.sidebar-user {

  padding: 16px 24px;

  border-top: 1px solid rgba(255,255,255,0.06);

  display: flex;

  align-items: center;

  gap: 10px;

}



.sidebar-user-avatar {

  width: 34px; height: 34px;

  border-radius: 50%;

  background: var(--teal-deep);

  display: flex;

  align-items: center;

  justify-content: center;

  color: var(--accent-green);

  font-family: var(--font-ui);

  font-weight: 700;

  font-size: 12px;

  flex-shrink: 0;

}



.sidebar-user-info { flex: 1; min-width: 0; }

.sidebar-user-name {

  font-family: var(--font-ui);

  font-size: 13px;

  font-weight: 600;

  color: #fff;

  white-space: nowrap;

  overflow: hidden;

  text-overflow: ellipsis;

}

.sidebar-user-tier {

  font-family: var(--font-ui);

  font-size: 10px;

  font-weight: 600;

  color: var(--accent-green);

  text-transform: uppercase;

  letter-spacing: 0.5px;

}



.sidebar-logout {

  background: none;

  border: none;

  color: rgba(255,255,255,0.3);

  cursor: pointer;

  padding: 4px;

  transition: color 0.2s;

}

.sidebar-logout:hover { color: #fff; }

.sidebar-logout svg { width: 16px; height: 16px; }



.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.theme-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  color: var(--text-sidebar);
  font-size: 13px;
  font-weight: 500;
  transition: color var(--transition);
}
.theme-toggle:hover { color: #fff; }
.toggle-track {
  width: 40px; height: 22px;
  background: #444;
  border-radius: 11px;
  position: relative;
  transition: background var(--transition);
}
.toggle-track.on { background: var(--teal-deep); }
.toggle-thumb {
  width: 18px; height: 18px;
  background: #fff;
  border-radius: 50%;
  position: absolute;
  top: 2px; left: 2px;
  transition: transform var(--transition);
}
.toggle-track.on .toggle-thumb { transform: translateX(18px); }

/* ====== MAIN CONTENT ====== */

.main {

  margin-left: var(--sidebar-width);

  min-height: 100vh;

  transition: margin-left 0.3s ease;

}



/* Mobile menu button */

.mobile-menu-btn {

  display: none;

  background: none;

  border: none;

  cursor: pointer;

  color: var(--text-dark);

  padding: 4px;

}

.mobile-menu-btn svg { width: 24px; height: 24px; }



.mobile-topbar {

  display: none;

  position: sticky;

  top: 0;

  height: 56px;

  background: var(--bg-cream);

  border-bottom: 1px solid var(--border);

  align-items: center;

  padding: 0 20px;

  gap: 12px;

  z-index: 50;

}



.mobile-topbar-title {

  font-family: var(--font-ui);

  font-size: 14px;

  font-weight: 700;

  color: var(--text-dark);

  flex: 1;

  white-space: nowrap;

  overflow: hidden;

  text-overflow: ellipsis;

}



.sidebar-overlay {

  display: none;

  position: fixed;

  inset: 0;

  background: rgba(0,0,0,0.5);

  z-index: 99;

}



/* ====== CONTENT AREA ====== */

.content-wrap {

  max-width: 1200px;

  padding: 32px 40px 64px;

  margin: 0 auto;

}



/* ====== LOADING SKELETON ====== */

.skeleton {

  position: relative;

  overflow: hidden;

  background: var(--border-light);

  border-radius: var(--radius-sm);

}

.skeleton::after {

  content: '';

  position: absolute;

  inset: 0;

  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.6) 50%, transparent 100%);

  animation: shimmer 1.5s infinite;

}

@keyframes shimmer {

  0% { transform: translateX(-100%); }

  100% { transform: translateX(100%); }

}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.skeleton-header { height: 180px; margin-bottom: 24px; }

.skeleton-stats { height: 80px; margin-bottom: 24px; }

.skeleton-card { height: 200px; margin-bottom: 20px; }



.loading-wrap { display: block; }

.loaded-wrap { display: none; }

.page-loaded .loading-wrap { display: none; }

.page-loaded .loaded-wrap { display: block; }



/* ====== BREADCRUMB ====== */

.breadcrumb {

  display: flex;

  align-items: center;

  gap: 8px;

  margin-bottom: 20px;

  font-family: var(--font-ui);

  font-size: 13px;

  font-weight: 500;

  color: var(--text-muted);

}

.breadcrumb a {

  color: var(--primary);

  text-decoration: none;

  transition: color var(--transition);

}

.breadcrumb a:hover { color: var(--primary-hover); }

.breadcrumb svg { width: 14px; height: 14px; flex-shrink: 0; }



/* ====== DEAL HEADER ====== */

.deal-header {
  background: linear-gradient(145deg, #1a1f2e 0%, #252b3b 100%);
  border-radius: var(--radius);
  padding: 36px 40px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.deal-header.hero-lending {
  background: linear-gradient(145deg, #1a2433 0%, #1e2d3d 100%);
}
.deal-header.hero-equity {
  background: linear-gradient(145deg, #1a1f2e 0%, #252b3b 100%);
}
.deal-header::after { display: none; }
.deal-header.hero-lending::before { display: none; }
.deal-header.hero-lending::after { display: none; }

/* Hero type icon */
.hero-type-icon {
  position: absolute;
  bottom: 20px;
  right: 24px;
  opacity: 0.06;
  z-index: 0;
}
.hero-type-icon svg {
  width: 120px;
  height: 120px;
  stroke: #fff;
  stroke-width: 1;
  fill: none;
}



.deal-header-inner {

  position: relative;

  z-index: 1;

  display: flex;
  gap: 32px;
  align-items: center;
  justify-content: space-between;

}
.hero-left { flex: 1; min-width: 0; }
.hero-right {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 8px;
  text-align: center;
}
.hero-deck-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 28px;
  background: var(--accent-green);
  color: #0a1628;
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 700;
  border-radius: var(--radius-sm);
  text-decoration: none;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  white-space: nowrap;
}
.hero-deck-btn:hover { background: #34d399; transform: translateY(-1px); }
.hero-deck-btn.hero-deck-locked {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.5);
  cursor: default;
  border: 1px solid rgba(255,255,255,0.12);
}
.hero-deck-btn.hero-deck-locked[onclick] { cursor: pointer; }
.hero-deck-btn.hero-deck-locked[onclick]:hover { background: rgba(255,255,255,0.14); }
.hero-share-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0;
  background: none;
  color: rgba(255,255,255,0.5);
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: color 0.15s;
  white-space: nowrap;
}
.hero-share-btn:hover { color: rgba(255,255,255,0.85); }
.hero-share-btn svg { opacity: 0.7; }
.hero-share-btn:hover svg { opacity: 1; }
.share-dropdown {
  position: absolute;
  bottom: 100%;
  right: 0;
  margin-bottom: 8px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  padding: 6px 0;
  min-width: 200px;
  z-index: 50;
  display: none;
}
.share-dropdown.active { display: block; }
.share-dropdown-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dark);
  cursor: pointer;
  transition: background 0.1s;
  text-decoration: none;
  border: none;
  background: none;
  width: 100%;
}
.share-dropdown-item:hover { background: var(--bg-cream); }
.share-dropdown-item svg { width: 16px; height: 16px; color: var(--text-secondary); flex-shrink: 0; }
.share-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg-sidebar);
  color: #fff;
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  display: flex;
  align-items: center;
  gap: 8px;
}
.share-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.hero-operator-photo {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  background: rgba(255,255,255,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-ui);
  font-weight: 800;
  color: rgba(255,255,255,0.9);
  font-size: 26px;
  letter-spacing: -0.5px;
  border: 2px solid rgba(255,255,255,0.15);
}
.hero-operator-photo img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}
.hero-operator-name {
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 700;
  color: #fff;
}
.hero-operator-title {
  font-family: var(--font-ui);
  font-size: 11px;
  color: rgba(255,255,255,0.55);
}
.hero-metrics {
  display: flex;
  gap: 24px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.hero-metric {
  display: flex;
  flex-direction: column;
}
.hero-metric-value {
  font-family: var(--font-ui);
  font-size: 22px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.5px;
  line-height: 1.1;
}
.hero-metric-value.highlight { color: var(--accent-green); }
.hero-metric-label {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
}

@media (max-width: 900px) {
  .deal-header-inner { flex-direction: column; align-items: flex-start; }
  .hero-right { flex-direction: row; align-items: center; gap: 8px; text-align: left; flex-wrap: wrap; }
  .hero-right .hero-deck-btn { padding: 10px 16px; font-size: 13px; gap: 6px; }
  .hero-right .hero-deck-btn svg { width: 16px; height: 16px; }
  .hero-right .hero-share-btn { display: none; }
  .hero-right > div[id="shareWrapper"] { display: none; }
  .hero-operator-photo { width: 48px; height: 48px; font-size: 18px; }
  .hero-metrics { gap: 12px 16px; }
  .hero-metric-value { font-size: 18px; }
  .hero-type-icon { width: 60px !important; height: 60px !important; opacity: 0.15 !important; }
  .deal-page-content > div[style*="grid-template-columns: 2fr 1fr"],
  .deal-page-content > div[style*="grid-template-columns:2fr 1fr"] {
    grid-template-columns: 1fr !important;
  }
}
/* ====== MOBILE: Stack all inline 2-col grids ====== */
@media (max-width: 768px) {
  /* Assembly-level grids: deal terms+operator, SEC+buybox */
  .deal-page-content div[style*="grid-template-columns:2fr 1fr"],
  .deal-page-content div[style*="grid-template-columns: 2fr 1fr"],
  .deal-page-content div[style*="grid-template-columns:1fr 2fr"],
  .deal-page-content div[style*="grid-template-columns: 1fr 2fr"] {
    grid-template-columns: 1fr !important;
  }
  /* All 1fr 1fr grids inside sections (thesis, SEC metrics, case study, stress test) */
  .deal-page-content div[style*="grid-template-columns:1fr 1fr"],
  .deal-page-content div[style*="grid-template-columns: 1fr 1fr"] {
    grid-template-columns: 1fr !important;
  }
  /* 3-column metric grids */
  .deal-page-content div[style*="grid-template-columns:repeat(3"],
  .deal-page-content div[style*="grid-template-columns: repeat(3"] {
    grid-template-columns: 1fr 1fr !important;
  }
  /* Buy box criteria: 2 columns on mobile */
  .buybox-criteria-grid {
    grid-template-columns: 1fr 1fr !important;
  }
  /* Cash flow table: horizontal scroll */
  .cf-table { font-size: 11px; }
  .cf-table th, .cf-table td { padding: 8px 8px; white-space: nowrap; }
  .cf-table .cf-summary-row td { white-space: normal; }
  /* Overlay padding on mobile */
  .stress-test-coming-soon > .stress-test-overlay { padding: 20px 24px !important; }
  /* Fund comparison table scroll */
  .deal-page-content div[style*="overflow-x:auto"] table[style*="min-width:700px"] {
    min-width: 500px !important;
    font-size: 11px;
  }
  /* Hero summary max-width */
  .deal-page-content div[style*="max-width: 560px"],
  .deal-page-content div[style*="max-width:560px"] {
    max-width: 100% !important;
  }
  /* Journey bar: shrink steps */
  .journey-bar { padding: 10px 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .journey-step { font-size: 9px; padding: 3px 4px; }
  .journey-step .step-dot { width: 24px; height: 24px; font-size: 11px; }
  .journey-connector { min-width: 8px; max-width: 20px; }
  /* Cash flow table: scrollable wrapper */
  .section-body > div[id*="_table"] { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  /* Peer comparison cards */
  .deal-page-content div[style*="minmax(155px"] { gap: 8px !important; }
  /* Tags in hero */
  .deal-tags { flex-wrap: wrap; gap: 6px !important; }
  .deal-tag { font-size: 11px !important; padding: 3px 10px !important; }
  /* Office hours CTA */
  .deal-page-content div[style*="display:flex"][style*="justify-content:space-between"] {
    flex-direction: column !important;
    gap: 12px !important;
    align-items: flex-start !important;
  }
}
@media (max-width: 480px) {
  .deal-page-content div[style*="grid-template-columns:repeat(3"],
  .deal-page-content div[style*="grid-template-columns: repeat(3"] {
    grid-template-columns: 1fr !important;
  }
  .metrics-strip { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
  .deal-name { font-size: 20px !important; }
  .hero-metrics { flex-wrap: wrap !important; }
  .cf-table { font-size: 10px; }
  .cf-table th, .cf-table td { padding: 6px 6px; }
}

.deal-name {
  font-family: var(--font-headline);
  font-size: 32px;
  color: #fff;
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin-bottom: 8px;
}



.deal-company {
  font-family: var(--font-ui);
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 16px;
  color: rgba(255,255,255,0.7);
}
.deal-company a {
  color: var(--accent-green);
  text-decoration: none;
  transition: color var(--transition);
}
.deal-company a:hover { color: #fff; text-decoration: underline; }



.deal-badges {

  display: flex;

  gap: 8px;

  flex-wrap: wrap;

}



.deal-badge {

  display: inline-flex;

  align-items: center;

  padding: 4px 12px;

  border-radius: 20px;

  font-family: var(--font-ui);

  font-size: 12px;

  font-weight: 600;

  letter-spacing: 0.3px;

}

.deal-badge.asset-class {

  background: rgba(81,190,123,0.15);

  color: var(--accent-green);

}

.deal-badge.deal-type {
  background: rgba(37,99,235,0.15);
  color: #93C5FD;
}

.deal-badge.status-open {

  background: rgba(81,190,123,0.15);

  color: var(--accent-green);

}

.deal-badge.status-evergreen {
  background: rgba(37,99,235,0.15);
  color: #93C5FD;
}
.deal-badge.status-closed {
  background: rgba(208,64,64,0.15);
  color: #FCA5A5;
}



/* ====== JOURNEY BAR ====== */

.journey-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin-bottom: 20px;
  padding: 14px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.journey-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: default;
  padding: 4px 8px;
  border-radius: 12px;
  transition: all 0.2s;
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  white-space: nowrap;
  text-align: center;
}
.journey-step:hover {
  background: var(--bg-cream);
  color: var(--text-dark);
}
.journey-step .step-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  background: var(--bg-page);
  transition: all 0.2s;
  flex-shrink: 0;
}
.journey-step.active .step-dot {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}
.journey-step.active {
  color: var(--primary);
  background: rgba(81,190,123,0.08);
}
.journey-step.completed .step-dot {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}
.journey-step.completed {
  color: var(--text-dark);
}
.journey-connector {
  flex: 1;
  min-width: 12px;
  max-width: 40px;
  height: 2px;
  background: var(--border);
  align-self: center;
  margin-top: -16px;
}
.journey-connector.done {
  background: var(--primary);
}
.journey-connector.passed {
  background: #D04040;
}
.journey-step.passed .step-dot {
  background: #D04040;
  border-color: #D04040;
  color: #fff;
}
.journey-step.passed {
  color: #D04040;
}
.journey-step:not(.active):not(.completed):not(.passed):hover .step-dot {
  border-color: var(--primary);
  color: var(--primary);
}
.journey-step:not(.active):not(.completed):not(.passed) .step-dot[onclick] {
  cursor: pointer;
}
.journey-step[data-stage="passed"]:not(.passed):hover .step-dot {
  border-color: #D04040;
  background: rgba(208,64,64,0.08);
  color: #D04040;
}
.journey-step[data-stage="passed"]:not(.passed):hover {
  color: #D04040;
}

/* ====== DATA COMPLETENESS ====== */

.data-completeness {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 24px;
  font-family: var(--font-ui);
}
.data-completeness-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-dark);
  white-space: nowrap;
}
.data-completeness-bar {
  flex: 1;
  height: 6px;
  background: var(--border-light);
  border-radius: 3px;
  overflow: hidden;
}
.data-completeness-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}
.data-completeness-fill.high { background: var(--primary); }
.data-completeness-fill.medium { background: #f59e0b; }
.data-completeness-fill.low { background: #ef4444; }
.data-completeness-pct {
  font-size: 14px;
  font-weight: 800;
  color: var(--text-dark);
  min-width: 36px;
  text-align: right;
}
.data-completeness-hint {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* ====== STICKY ACTION BAR ====== */

.sticky-action-bar {
  position: fixed;
  bottom: 0;
  left: var(--sidebar-width, 240px);
  right: 0;
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  padding: 12px 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
}
.sticky-action-bar .btn-pass {
  padding: 10px 20px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sticky-action-bar .btn-pass:hover {
  border-color: #ef4444;
  color: #ef4444;
}
.sticky-action-bar .btn-stage-select {
  padding: 10px 20px;
  background: var(--bg-page);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dark);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sticky-action-bar .btn-advance {
  padding: 10px 24px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
}
.sticky-action-bar .btn-advance:hover {
  background: #3da86a;
  transform: translateY(-1px);
}
.sticky-action-bar .stage-label {
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-ui);
}
/* Add bottom padding to page content so it's not hidden behind sticky bar */
.deal-page-content {
  padding-bottom: 80px;
}

@media (max-width: 768px) {
  .sticky-action-bar {
    left: 0;
    padding: 10px 16px;
  }
  .data-completeness-hint { display: none; }
  .metrics-strip {
    grid-template-columns: repeat(2, 1fr) !important;
  }
}

/* ====== KEY METRICS STRIP ====== */

.metrics-strip {

  display: grid;

  grid-template-columns: repeat(6, 1fr);

  gap: 12px;

  margin-bottom: 24px;

}



.metric-card {

  background: var(--bg-card);

  border: 1px solid var(--border);

  border-radius: var(--radius);

  padding: 16px 18px;

  text-align: center;

  box-shadow: var(--shadow-card);

}



.metric-label {

  font-family: var(--font-ui);

  font-size: 11px;

  font-weight: 600;

  text-transform: uppercase;

  letter-spacing: 0.8px;

  color: var(--text-muted);

  margin-bottom: 6px;

}



.metric-value {

  font-family: var(--font-ui);

  font-size: 20px;

  font-weight: 800;

  color: var(--text-dark);

  letter-spacing: -0.5px;

}

.metric-value.highlight { color: var(--primary); }



/* ====== SECTIONS ====== */

.section {

  background: var(--bg-card);

  border: 1px solid var(--border);

  border-radius: var(--radius);

  margin-bottom: 20px;

  box-shadow: var(--shadow-card);

  overflow: hidden;

}



.section-header {

  padding: 18px 24px;

  border-bottom: 1px solid var(--border-light);

  display: flex;

  align-items: center;

  gap: 10px;

}

.section-header svg { width: 18px; height: 18px; color: var(--primary); flex-shrink: 0; }



.section-title {

  font-family: var(--font-ui);

  font-size: 15px;

  font-weight: 700;

  color: var(--text-dark);

  letter-spacing: -0.2px;

}



.section-body {

  padding: 24px;

}



/* ====== CASH FLOW PROJECTION ====== */
.cf-toggle { display: flex; gap: 0; margin-bottom: 16px; }
.cf-toggle button {
  padding: 7px 16px; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  border: 1px solid var(--border); background: var(--bg-main); color: var(--text-secondary);
  cursor: pointer; transition: all 0.15s;
}
.cf-toggle button:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
.cf-toggle button:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; border-left: 0; }
.cf-toggle button.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.cf-table { width: 100%; border-collapse: collapse; font-family: var(--font-ui); font-size: 13px; }
.cf-table th { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); padding: 8px 12px; text-align: right; border-bottom: 1px solid var(--border-light); }
.cf-table th:first-child { text-align: left; }
.cf-table td { padding: 10px 12px; text-align: right; color: var(--text-dark); border-bottom: 1px solid var(--border-light); }
.cf-table td:first-child { text-align: left; font-weight: 600; color: var(--text-secondary); }
.cf-table tr:last-child td { border-bottom: none; font-weight: 700; }
.cf-table .cf-highlight { color: var(--primary); font-weight: 700; }
.cf-table .cf-total-row td { border-top: 2px solid var(--border); background: rgba(81,190,123,0.04); font-weight: 700; }
.cf-table .cf-summary-row td { border-top: 2px solid var(--border); font-weight: normal; }

.cf-chart-wrap { position: relative; }
.cf-chart-grid { display: flex; align-items: flex-end; gap: 4px; padding: 0 8px; justify-content: space-around; }
.cf-bar-group { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
.cf-bar-container { display: flex; align-items: flex-end; gap: 3px; height: 120px; width: 100%; justify-content: center; }
.cf-bar { width: 18px; border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.3s; }
.cf-bar-dist { background: var(--primary); }
.cf-bar-cap { background: rgba(81,190,123,0.25); }
.cf-bar-label { font-family: var(--font-ui); font-size: 10px; color: var(--text-muted); }
.cf-bar-value { font-family: var(--font-ui); font-size: 10px; font-weight: 700; color: var(--text-dark); white-space: nowrap; }
.cf-legend { display: flex; gap: 16px; justify-content: center; margin-top: 12px; }
.cf-legend-item { display: flex; align-items: center; gap: 5px; font-family: var(--font-ui); font-size: 11px; color: var(--text-secondary); }
.cf-legend-dot { width: 10px; height: 10px; border-radius: 2px; }

.cf-summary { display: flex; gap: 24px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-light); flex-wrap: wrap; }
.cf-summary-item { display: flex; flex-direction: column; }
.cf-summary-value { font-family: var(--font-ui); font-size: 18px; font-weight: 800; color: var(--text-dark); letter-spacing: -0.5px; }
.cf-summary-value.green { color: var(--primary); }
.cf-summary-label { font-family: var(--font-ui); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-top: 2px; }

/* ====== OVERVIEW ====== */

.overview-text {

  font-family: var(--font-body);

  font-size: 15px;

  line-height: 1.7;

  color: var(--text-secondary);

}



/* ====== DETAILS GRID ====== */

.details-grid {

  display: grid;

  grid-template-columns: repeat(4, 1fr);

  gap: 20px;

}



.detail-item {}

.detail-item-wide {
  grid-column: 1 / -1;
}



.detail-label {

  font-family: var(--font-ui);

  font-size: 11px;

  font-weight: 600;

  text-transform: uppercase;

  letter-spacing: 0.8px;

  color: var(--text-muted);

  margin-bottom: 4px;

}



.detail-value {

  font-family: var(--font-ui);

  font-size: 14px;

  font-weight: 600;

  color: var(--text-dark);

}



/* ====== DEAL SUMMARY ====== */

.summary-row {

  display: flex;

  gap: 12px;

  margin-bottom: 12px;

}

.summary-label {

  font-family: var(--font-ui);

  font-size: 13px;

  font-weight: 600;

  color: var(--text-muted);

  min-width: 140px;

  flex-shrink: 0;

}

.summary-value {

  font-family: var(--font-body);

  font-size: 14px;

  color: var(--text-dark);

}



.fees-list {

  list-style: none;

  padding: 0;

}

.fees-list li {

  font-family: var(--font-body);

  font-size: 14px;

  color: var(--text-dark);

  padding: 4px 0;

  padding-left: 16px;

  position: relative;

}

.fees-list li::before {

  content: '';

  position: absolute;

  left: 0;

  top: 11px;

  width: 6px;

  height: 6px;

  border-radius: 50%;

  background: var(--primary);

}



/* ====== GEOGRAPHY / MAP ====== */

.map-container {

  height: 340px;

  border-radius: var(--radius-sm);

  overflow: hidden;

  margin-top: 16px;

  border: 1px solid var(--border);

}



.geo-info {

  display: flex;

  gap: 32px;

  flex-wrap: wrap;

  margin-bottom: 8px;

}

.geo-item {}

.geo-label {

  font-family: var(--font-ui);

  font-size: 11px;

  font-weight: 600;

  text-transform: uppercase;

  letter-spacing: 0.8px;

  color: var(--text-muted);

  margin-bottom: 4px;

}

.geo-value {

  font-family: var(--font-ui);

  font-size: 14px;

  font-weight: 600;

  color: var(--text-dark);

}



/* ====== SPONSOR SECTION ====== */

.sponsor-card {

  display: flex;

  align-items: center;

  gap: 16px;

}



.sponsor-avatar {

  width: 56px; height: 56px;

  border-radius: 50%;

  background: var(--primary);

  display: flex;

  align-items: center;

  justify-content: center;

  font-family: var(--font-ui);

  font-weight: 800;

  color: #fff;

  font-size: 18px;

  flex-shrink: 0;

  letter-spacing: -0.5px;

}



.sponsor-info {}

.sponsor-ceo-name {

  font-family: var(--font-ui);

  font-size: 15px;

  font-weight: 700;

  color: var(--text-dark);

  margin-bottom: 2px;

}

.sponsor-company-link {

  font-family: var(--font-ui);

  font-size: 13px;

  font-weight: 500;

  color: var(--primary);

  text-decoration: none;

  transition: color var(--transition);

}

.sponsor-company-link:hover { color: var(--primary-hover); text-decoration: underline; }

/* ====== OPERATOR PROFILE ====== */
.operator-profile {
  display: flex;
  gap: 24px;
  align-items: flex-start;
}
.operator-photo {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--teal-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-ui);
  font-weight: 800;
  color: #fff;
  font-size: 28px;
  letter-spacing: -0.5px;
}
.operator-details { flex: 1; min-width: 0; }
.operator-name {
  font-family: var(--font-ui);
  font-size: 18px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 2px;
}
.operator-title {
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}
.operator-bio {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-secondary);
  margin-bottom: 16px;
}
.operator-stats {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.operator-stat {
  text-align: center;
}
.operator-stat-value {
  font-family: var(--font-ui);
  font-size: 20px;
  font-weight: 800;
  color: var(--text-dark);
}
.operator-stat-label {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-top: 2px;
}
.operator-links {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.operator-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  text-decoration: none;
  transition: all var(--transition);
}
.operator-link:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: rgba(81,190,123,0.04);
}
.operator-link svg { width: 14px; height: 14px; }

/* ====== OPERATOR OTHER DEALS ====== */
.operator-deals-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}
.operator-deal-card {
  display: block;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  text-decoration: none;
  transition: box-shadow 0.2s;
}
.operator-deal-card:hover {
  box-shadow: var(--shadow-card-hover);
}
.operator-deal-name {
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 4px;
}
.operator-deal-meta {
  font-family: var(--font-ui);
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.operator-deal-stats {
  display: flex;
  gap: 16px;
  align-items: center;
}
.operator-deal-stat {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text-secondary);
}
.operator-deal-stat strong {
  font-size: 15px;
  font-weight: 800;
  color: var(--text-dark);
}

@media (max-width: 768px) {
  .operator-profile { flex-direction: column; align-items: center; text-align: center; }
  .operator-stats { justify-content: center; }
  .operator-links { justify-content: center; }
  .operator-deals-grid { grid-template-columns: 1fr; }
}

/* ====== ACTION BUTTONS ====== */

.action-buttons {

  display: flex;

  gap: 12px;

  flex-wrap: wrap;

}



.btn-action {

  display: inline-flex;

  align-items: center;

  gap: 8px;

  padding: 12px 24px;

  border-radius: var(--radius-sm);

  font-family: var(--font-ui);

  font-size: 14px;

  font-weight: 600;

  cursor: pointer;

  border: none;

  transition: all var(--transition);

  text-decoration: none;

}

.btn-action svg { width: 16px; height: 16px; }



.btn-primary {

  background: var(--primary);

  color: #fff;

}

.btn-primary:hover { background: var(--primary-hover); }



.btn-secondary {

  background: var(--bg-card);

  color: var(--text-dark);

  border: 1px solid var(--border);

}

.btn-secondary:hover {

  background: var(--bg-cream);

  border-color: var(--primary);

  color: var(--primary);

}

.btn-link {
  background: none;
  border: none;
  color: var(--primary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  padding: 6px 12px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  text-decoration: underline;
  text-underline-offset: 2px;
}
.btn-link:hover {
  color: var(--text-dark);
}

.offering-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
}
.offering-available {
  color: var(--primary);
}
.offering-missing {
  color: var(--text-muted);
}

/* ====== INTRO CONFIRMATION MODAL ====== */

.intro-confirm-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 1100;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.25s ease;
  padding: 20px;
}
.intro-confirm-overlay.visible { opacity: 1; }
.intro-confirm-overlay.visible .intro-confirm-modal {
  transform: translateY(0);
  opacity: 1;
}
.intro-confirm-modal {
  background: #fff;
  border-radius: 20px;
  max-width: 440px;
  width: 100%;
  box-shadow: 0 24px 80px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.05);
  overflow: hidden;
  transform: translateY(12px);
  opacity: 0;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
.intro-confirm-close {
  position: absolute;
  top: 16px; right: 16px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 20px;
  line-height: 1;
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}
.intro-confirm-close:hover { background: rgba(0,0,0,0.05); }
@media (max-width: 480px) {
  .intro-confirm-overlay { padding: 12px; }
  .intro-confirm-modal { max-width: 100%; border-radius: 16px; }
}

/* ====== DECK SUBMIT MODAL ====== */

.deck-modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
}
.deck-modal-overlay.visible {
  opacity: 1;
}
.deck-modal {
  background: var(--bg-card);
  border-radius: var(--radius-md);
  padding: 32px;
  max-width: 560px;
  width: 92%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.deck-modal h3 {
  font-family: var(--font-ui);
  font-size: 18px;
  font-weight: 700;
  color: var(--text-dark);
  margin: 0 0 8px 0;
}
.deck-modal p {
  font-size: 14px;
  color: var(--text-muted);
  margin: 0 0 20px 0;
  line-height: 1.5;
}
.deck-modal label {
  display: block;
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.deck-modal input,
.deck-modal textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-size: 14px;
  margin-bottom: 16px;
  background: var(--bg-page);
  color: var(--text-dark);
  box-sizing: border-box;
}
.deck-modal textarea {
  height: 80px;
  resize: vertical;
}
.deck-modal input:focus,
.deck-modal textarea:focus {
  outline: none;
  border-color: var(--primary);
}
.deck-modal-actions {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}
.deck-modal .btn-cancel {
  background: none;
  border: 1px solid var(--border);
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: 14px;
  color: var(--text-muted);
}
.deck-modal .btn-submit {
  background: var(--primary);
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 600;
}
.deck-modal .btn-submit:disabled {
  opacity: 0.5;
  cursor: default;
}
.deck-modal-success {
  text-align: center;
  padding: 20px 0;
}
.deck-modal-success svg {
  color: var(--primary);
  margin-bottom: 12px;
}
.deck-modal-success p {
  font-size: 15px;
  color: var(--text-dark);
  font-weight: 600;
}

/* ====== ENRICHMENT WIZARD ====== */
.enrich-wizard { text-align: left; }
.enrich-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
}
.enrich-field:last-child { border-bottom: none !important; }
.enrich-field input:focus, .enrich-field textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(81,190,123,0.1);
}

/* ====== SHARE CLASS TABLE ====== */

.share-class-table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 0 -4px;
}
.share-class-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-ui);
  font-size: 14px;
  min-width: 400px;
}
.share-class-table th {
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--primary);
  padding: 12px 16px;
  border-bottom: 2px solid var(--border);
}
.share-class-table th:first-child {
  text-align: left;
  color: var(--text-muted);
  font-weight: 600;
}
.share-class-table td {
  text-align: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border-light);
  color: var(--text-dark);
}
.share-class-table td:first-child {
  text-align: left;
  color: var(--text-muted);
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.share-class-table tr:last-child td {
  border-bottom: none;
}
.share-class-table td .value-highlight {
  font-weight: 700;
  color: var(--primary);
}
.share-class-table th.sc-active {
  background: rgba(81,190,123,0.08);
  border-bottom-color: var(--primary);
}
.share-class-table td.sc-active {
  background: rgba(81,190,123,0.04);
}

/* Share class toggle pills */
.sc-toggle-bar {
  display: inline-flex;
  gap: 0;
  background: var(--bg-main);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3px;
}
.sc-toggle-pill {
  padding: 6px 16px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.2s;
  white-space: nowrap;
}
.sc-toggle-pill:hover {
  color: var(--text-dark);
}
.sc-toggle-pill.active {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 1px 3px rgba(81,190,123,0.3);
}



/* ====== SUPPORTING MATERIALS ====== */

.materials-grid {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.material-tile {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-light);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dark);
  text-decoration: none;
  transition: background var(--transition);
}
.material-tile:last-child { border-bottom: none; }
.material-tile:hover {
  background: var(--bg-cream);
  color: var(--primary);
}
.material-tile svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  color: var(--text-muted);
}
.materials-missing {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 12px;
}
.materials-missing button {
  background: none;
  border: none;
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 2px;
  padding: 0;
}

/* ====== DD CHECKLIST ====== */

.dd-checklist-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.dd-checklist-subtitle {
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-ui);
}
.dd-accordion {
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.dd-accordion-section + .dd-accordion-section {
  border-top: 1px solid var(--border-light);
}
.dd-accordion-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  background: var(--bg-page);
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
.dd-accordion-header:hover {
  background: var(--bg-cream);
}
.dd-accordion-title {
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 700;
  color: var(--text-dark);
  display: flex;
  align-items: center;
  gap: 8px;
}
.dd-accordion-title svg {
  width: 14px;
  height: 14px;
  transition: transform 0.2s;
  color: var(--text-muted);
}
.dd-accordion-section.open .dd-accordion-title svg {
  transform: rotate(90deg);
}
.dd-accordion-progress {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  background: var(--bg-card);
  padding: 3px 10px;
  border-radius: 10px;
  border: 1px solid var(--border-light);
}
.dd-accordion-body {
  display: none;
  padding: 0 18px 18px;
  background: var(--bg-card);
}
.dd-accordion-section.open .dd-accordion-body {
  display: block;
}
.dd-question {
  padding: 12px 0;
  border-bottom: 1px solid var(--border-light);
}
.dd-question:last-child {
  border-bottom: none;
}
.dd-question-text {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dark);
  margin-bottom: 6px;
  line-height: 1.4;
}
.dd-answer {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.dd-answer-icon {
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  margin-top: 1px;
}
.dd-answer-icon.auto {
  color: var(--primary);
}
.dd-answer-icon.user {
  color: #3b82f6;
}
.dd-answer-icon.empty {
  color: var(--text-muted);
}
.dd-answer-text {
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--text-dark);
  flex: 1;
}
.dd-answer-badge {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
}
.dd-answer-badge.auto {
  background: rgba(81,190,123,0.12);
  color: var(--primary);
}
.dd-answer-badge.user {
  background: rgba(59,130,246,0.12);
  color: #3b82f6;
}
.dd-answer-badge.community {
  background: rgba(168,85,247,0.12);
  color: #a855f7;
}
.dd-answer-input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-size: 13px;
  background: var(--bg-page);
  color: var(--text-dark);
  box-sizing: border-box;
}
.dd-answer-input:focus {
  outline: none;
  border-color: var(--primary);
}

/* Third party perspectives */
.dd-perspectives {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid var(--border-light);
}
.dd-perspectives-title {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.dd-perspective-links {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
/* ====== ACADEMY GATE CTA ====== */
.academy-gate-inline {
  background: linear-gradient(135deg, #eff6ff, #f0fdf4);
  border: 2px solid rgba(59,130,246,0.2);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  margin: 8px 0;
}
.academy-gate-inline .gate-icon {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, #3b82f6, #4ade80);
  border-radius: 12px;
  margin: 0 auto 12px;
  display: flex; align-items: center; justify-content: center;
}
.academy-gate-inline .gate-title {
  font-family: var(--font-ui);
  font-size: 15px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 6px;
}
.academy-gate-inline .gate-sub {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 14px;
  line-height: 1.5;
  max-width: 420px;
  margin-left: auto;
  margin-right: auto;
}
.academy-gate-inline .gate-btn {
  display: inline-block;
  padding: 10px 24px;
  background: #3b82f6;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  text-decoration: none;
}
.academy-gate-inline .gate-btn:hover { background: #2563eb; }
.academy-gate-inline .gate-features {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-top: 14px;
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text-muted);
}
.academy-gate-inline .gate-features span {
  display: flex; align-items: center; gap: 4px;
}
.material-tile-locked {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: rgba(0,0,0,0.02);
  border-bottom: 1px solid var(--border-light);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: default;
  position: relative;
}
.material-tile-locked:last-child { border-bottom: none; }
.material-tile-locked .lock-badge {
  margin-left: auto;
  padding: 2px 8px;
  background: linear-gradient(135deg, #3b82f6, #4ade80);
  border-radius: 10px;
  font-size: 9px;
  font-weight: 700;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.dd-section-locked {
  position: relative;
  overflow: hidden;
  max-height: 120px;
}
.dd-section-locked::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 80px;
  background: linear-gradient(transparent, var(--bg-card));
  pointer-events: none;
}

/* ====== HERO SOCIAL PROOF ====== */
.hero-social-proof {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 16px;
  font-family: var(--font-ui);
  font-size: 13px;
  color: rgba(255,255,255,0.7);
}
.hero-social-proof .sp-avatars {
  display: flex;
  flex-shrink: 0;
}
.hero-social-proof .sp-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 2px solid #252b3b;
  background: linear-gradient(135deg, #51BE7B 0%, #2d8a54 100%);
  color: #fff;
  font-size: 10px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-left: -8px;
  position: relative;
  overflow: hidden;
}
.hero-social-proof .sp-avatar:first-child {
  margin-left: 0;
}
.hero-social-proof .sp-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}
.hero-social-proof .sp-avatar.sp-count {
  background: rgba(255,255,255,0.15);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.hero-social-proof .sp-text {
  line-height: 1.4;
}
.hero-social-proof .sp-text strong {
  color: #fff;
  font-weight: 700;
}
.hero-social-proof .sp-text .sp-dim {
  color: rgba(255,255,255,0.55);
}

/* ====== GP INSIGHTS PANEL ====== */
.gp-insights-panel {
  border: 1px solid rgba(59,130,246,0.25);
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(59,130,246,0.02) 100%);
}
.gp-insights-panel .section-header {
  border-bottom-color: rgba(59,130,246,0.15);
}

/* ====== SOCIAL PROOF (named investors row) ====== */
/* No longer used — named investors are integrated into hero-social-proof */

/* ====== RETURNS CHART ====== */

.returns-chart-section {
  margin-bottom: 24px;
}
.returns-chart-container {
  position: relative;
  height: 200px;
  background: linear-gradient(135deg, #0A1E21 0%, #1F5159 100%);
  border-radius: var(--radius);
  padding: 16px;
}
.returns-chart-legend {
  display: flex;
  gap: 16px;
  justify-content: center;
  padding: 10px 0 0;
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text-muted);
}
.returns-chart-legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}
.returns-chart-legend-line {
  display: inline-block;
  width: 16px;
  height: 3px;
  border-radius: 2px;
}
.returns-chart-legend-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

/* ====== MOBILE IMPROVEMENTS ====== */

@media (max-width: 768px) {
  .journey-bar {
    padding: 12px 16px;
    gap: 0;
    justify-content: space-between;
    overflow: visible;
  }
  .journey-step {
    padding: 4px;
    font-size: 9px;
    flex-direction: column;
    text-align: center;
    gap: 4px;
  }
  .journey-step .step-dot {
    width: 32px;
    height: 32px;
    font-size: 12px;
  }
  .journey-connector {
    width: 20px;
    min-width: 12px;
    flex: 1;
  }
  .data-completeness {
    padding: 10px 14px;
    gap: 10px;
  }
  .data-completeness-label { font-size: 11px; }
  .data-completeness-hint { display: none; }
  .sticky-action-bar {
    left: 0;
    padding: 10px 16px;
    gap: 8px;
  }
  .sticky-action-bar .btn-pass,
  .sticky-action-bar .btn-advance {
    padding: 8px 14px;
    font-size: 12px;
  }
  .sticky-action-bar .stage-label {
    font-size: 11px;
  }
  .share-class-table th,
  .share-class-table td {
    padding: 8px 10px;
    font-size: 12px;
  }
  .materials-grid {
    gap: 0;
  }
  .material-tile {
    padding: 8px 12px;
    font-size: 12px;
  }
  .dd-accordion-header {
    padding: 12px 14px;
  }
  .dd-accordion-body {
    padding: 0 14px 14px;
  }
  .dd-question-text {
    font-size: 12px;
  }
  .dd-answer-text {
    font-size: 12px;
  }
  .returns-chart-container {
    height: 160px;
    padding: 12px;
  }
  .deal-page-content {
    padding-bottom: 70px;
  }
  .hero-type-icon svg {
    width: 80px;
    height: 80px;
  }
  /* LP Network: community section inherits grid stacking from sec-econ-grid */
}

@media (max-width: 480px) {
  .journey-bar {
    padding: 10px 8px;
  }
  .journey-step {
    padding: 2px;
    font-size: 8px;
  }
  .journey-step .step-dot {
    width: 28px;
    height: 28px;
    font-size: 11px;
  }
  .journey-connector { width: 8px; min-width: 8px; }
  .hero-social-proof { font-size: 12px; gap: 10px; }
  .hero-social-proof .sp-avatar { width: 26px; height: 26px; font-size: 9px; }
  .dd-perspective-links {
    flex-direction: column;
  }
  .btn-link { font-size: 11px; }
}

/* ====== NOT FOUND ====== */

.not-found {

  text-align: center;

  padding: 80px 20px;

}

.not-found h2 {

  font-family: var(--font-headline);

  font-size: 28px;

  color: var(--text-dark);

  margin-bottom: 12px;

}

.not-found p {

  font-family: var(--font-body);

  font-size: 16px;

  color: var(--text-secondary);

  margin-bottom: 24px;

}

.not-found a {

  display: inline-flex;

  align-items: center;

  gap: 8px;

  color: var(--primary);

  font-family: var(--font-ui);

  font-size: 14px;

  font-weight: 600;

  text-decoration: none;

}

.not-found a:hover { text-decoration: underline; }



/* ====== RESPONSIVE ====== */

@media (max-width: 1024px) {

  .metrics-strip {

    grid-template-columns: repeat(3, 1fr);

  }

  .details-grid {

    grid-template-columns: repeat(3, 1fr);

  }

}



@media (max-width: 768px) {

  .sidebar {

    transform: translateX(-100%);

  }

  .sidebar.open {

    transform: translateX(0);

  }

  .sidebar-overlay.open {

    display: block;

  }

  .mobile-topbar {

    display: flex;

  }

  .main {

    margin-left: 0;

  }

  .content-wrap {

    padding: 20px 16px 48px;

  }

  .deal-header {

    padding: 24px 20px;

  }

  .deal-name { font-size: 24px; }

  .metrics-strip {

    grid-template-columns: repeat(2, 1fr);

  }

  .details-grid {

    grid-template-columns: repeat(2, 1fr);

  }

  .section-body {

    padding: 20px 18px;

  }

  .section-header {

    padding: 16px 18px;

  }

  .summary-row {

    flex-direction: column;

    gap: 4px;

  }

  .summary-label {

    min-width: 0;

  }

}



@media (max-width: 480px) {

  .metrics-strip {

    grid-template-columns: 1fr 1fr;

  }

  .details-grid {

    grid-template-columns: 1fr;

  }

  .action-buttons {

    flex-direction: column;

  }

  .btn-action {

    justify-content: center;

    width: 100%;

  }

  .geo-info {

    flex-direction: column;

    gap: 12px;

  }

}

/* ====== STRESS TEST SECTION ====== */
.stress-test-section { padding: 24px; position: relative; }
.stress-test-coming-soon { position: relative; }
.stress-test-coming-soon > .stress-test-content { opacity: 0.3; pointer-events: none; user-select: none; filter: grayscale(0.5); }
.stress-test-coming-soon > .stress-test-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; text-align: center; padding: 32px 48px; background: rgba(255,255,255,0.92); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
.stress-test-coming-soon > .stress-test-overlay .coming-soon-title { font-family: var(--font-ui); font-size: 20px; font-weight: 800; color: var(--text-dark); margin-bottom: 6px; }
.stress-test-coming-soon > .stress-test-overlay .coming-soon-sub { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.stress-test-grid {

// ========== FORMATTERS ==========

function fmt(val, type) {

  if (val === undefined || val === null || val === '') return '---';

  if (type === 'pct') return (val * 100).toFixed(1) + '%';

  if (type === 'pct0') return (val * 100).toFixed(0) + '%';

  if (type === 'money') {

    if (val === 0) return '$0';

    if (val >= 1000000) return '$' + (val / 1000000).toFixed(1) + 'M';

    if (val >= 1000) return '$' + (val / 1000).toFixed(0) + 'K';

    return '$' + val.toLocaleString();

  }

  if (type === 'multiple') return val.toFixed(2) + 'x';

  return val;

}



function getInitials(name) {

  if (!name) return '??';

  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 3);

}



function statusBadgeClass(status) {

  if (status === 'Open to invest') return 'status-open';

  if (status === 'Evergreen') return 'status-evergreen';

  return 'status-closed';

}

function isCreditFund(deal) {
  var ac = (deal.assetClass || '').toLowerCase();
  var st = (deal.strategy || '').toLowerCase();
  var inst = (deal.instrument || '').toLowerCase();
  var name = (deal.investmentName || '').toLowerCase();
  if (inst === 'debt') return true;
  if (st === 'lending') return true;
  if (ac === 'lending') return true;
  if (ac.indexOf('credit') >= 0 || ac.indexOf('debt') >= 0) return true;
  if (name.indexOf('debt fund') >= 0 || name.indexOf('credit fund') >= 0 || name.indexOf('income fund') >= 0) {
    if (st === 'lending' || inst === 'debt' || inst === 'preferred equity' || deal.debtPosition) return true;
  }
  return false;
}

function getDealCompleteness(d) {
  var filled = 0;
  for (var i = 0; i < _completenessKeys.length; i++) {
    var v = d[_completenessKeys[i]];
    if (v !== null && v !== undefined && v !== '' && v !== 0 && !(Array.isArray(v) && v.length === 0)) filled++;
  }
  return Math.round((filled / _completenessKeys.length) * 100);
}
function isDealLowQuality(d) { return getDealCompleteness(d) < 50; }

// Background check cache for DD auto-population
var _bgCheckCache = null;

function getAutoValue(deal, field, format) {
  // Handle background check auto-fields
  if (field && field.indexOf('bgCheck_') === 0) {
    if (!_bgCheckCache) return null;
    var bgKey = field.replace('bgCheck_', '');
    switch (bgKey) {
      case 'overall':
        var os = _bgCheckCache.overall_status;
        if (os === 'clear') return 'All clear — no flags across 5 public databases';
        if (os === 'flagged') return 'FLAGS FOUND — review background report';
        if (os === 'needs_review') return 'Items to review — see background report';
        return null;
      case 'sec':
        var sc = _bgCheckCache.sec_filings_count || 0;
        return sc > 0 ? sc + ' SEC Form D filing(s) found' : 'No Form D filings found';
      case 'finra':
        if (!_bgCheckCache.finra_found) return 'Not registered with FINRA (common for real estate sponsors)';
        return _bgCheckCache.finra_disclosures > 0
          ? _bgCheckCache.finra_disclosures + ' disclosure event(s) — review recommended'
          : 'Registered, no disclosures';
      case 'iapd':
        if (!_bgCheckCache.iapd_found) return 'Not registered as investment adviser';
        return _bgCheckCache.iapd_disclosures > 0
          ? _bgCheckCache.iapd_disclosures + ' disclosure(s) found'
          : 'Registered adviser, clean record';
      case 'ofac':
        return _bgCheckCache.ofac_found ? 'POTENTIAL MATCH — verify identity immediately' : 'Clear — no sanctions matches';
      case 'court':
        var cc = _bgCheckCache.court_cases_count || 0;
        var bk = _bgCheckCache.court_bankruptcies || 0;
        if (cc === 0) return 'No federal court records found';
        return cc + ' case(s)' + (bk > 0 ? ', including ' + bk + ' bankruptcy' : '');
      case 'litigation':
        var lc = _bgCheckCache.court_cases_count || 0;
        return lc > 0 ? lc + ' federal court case(s) found — review details' : 'No federal litigation found';
      default:
        return null;
    }
  }

  var val = deal[field];
  if (val === undefined || val === null || val === '' || val === 0) return null;
  if (format === 'pct') return (val * 100).toFixed(1) + '%';
  if (format === 'money') return fmt(val, 'money');
  if (format === 'multiple') return val.toFixed(2) + 'x';
  if (format === 'years') return formatHoldPeriod(val);
  return String(val);
}

function loadDDAnswers(dealId) {
  try {
    return JSON.parse(localStorage.getItem('gycDDChecklist_' + dealId) || '{}');
  } catch(e) { return {}; }
}


function saveDDAnswer(dealId, key, value) {
  if (!requireAuth('save your due diligence answers')) return;
  var answers = loadDDAnswers(dealId);
  if (value) {
    answers[key] = value;
  } else {
    delete answers[key];
  }
  localStorage.setItem('gycDDChecklist_' + dealId, JSON.stringify(answers));
  // Update progress counts
  updateChecklistProgress();
  // Sync to Supabase in background
  try {
    var user = JSON.parse(localStorage.getItem('gycUser') || 'null');
    var headers = { 'Content-Type': 'application/json' };
    if (user && user.token) headers['Authorization'] = 'Bearer ' + user.token;
    fetch('/api/ddchecklist', {
      method: 'POST',
      headers: headers,
      body: JSON.stringify({
        dealId: dealId,
        itemIndex: key,
        itemText: '',
        checked: !!value,
        userEmail: (user && user.email) || '',
        userName: (user && user.name) || '',
        answer: value || '',
        source: 'user'
      })
    }).catch(function() {});
  } catch(e) {}
}

function updateChecklistProgress() {
  document.querySelectorAll('.dd-accordion-section').forEach(function(section) {
    var total = section.querySelectorAll('.dd-question').length;
    var answered = section.querySelectorAll('.dd-question.answered').length;
    var badge = section.querySelector('.dd-accordion-progress');
    if (badge) badge.textContent = answered + '/' + total;
  });
}

function mapStageName(stage) {
  var legacyMap = { 'new': 'browse', 'interested': 'saved', 'duediligence': 'vetting', 'portfolio': 'invested', 'ready': 'decision' };
  return legacyMap[stage] || stage;
}

function getDealStage(dealId) {
  try {
    var stages = JSON.parse(localStorage.getItem('gycDealStages') || '{}');
    return mapStageName(stages[dealId] || 'new');
  } catch(e) { return 'browse'; }
}

function setJourneyStage(dealId, stage) {
  if (!requireAuth('save this deal to your pipeline')) return;
  try {
    var stages = JSON.parse(localStorage.getItem('gycDealStages') || '{}');
    stages[dealId] = stage;
    localStorage.setItem('gycDealStages', JSON.stringify(stages));
  } catch(e) {}
  // Re-render the journey bar and sticky bar
  updateJourneyUI(dealId, stage);
  // Show intro nudge when entering decision stage
  renderIntroNudge(dealId, stage);
  // Render the deck-viewed prompt
  renderDeckViewedPrompt(dealId, stage);
  // Sync stage to Supabase in background
  syncStageToDb(dealId, stage);
}

function syncStageToDb(dealId, stage) {
  var user = null;
  try { user = JSON.parse(localStorage.getItem('gycUser') || 'null'); } catch(e) {}
  if (!user || !user.token) return;

  // Normalize stage name (no more legacy reverse-mapping needed)
  var dbStage = stage;

  fetch('/api/userdata', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + user.token
    },
    body: JSON.stringify({
      type: 'stages',
      data: {
        'Deal ID': dealId,
        'Stage': dbStage,
        'Notes': ''
      }
    })
  }).catch(function(err) { console.warn('Stage sync failed:', err.message); });

  // Also fire an event for analytics
  fetch('/api/events', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: user.email,
      event: stage === 'saved' ? 'deal_saved' : 'stage_changed',
      data: { dealId: dealId, stage: dbStage }
    })
  }).catch(function() {});
}

function loadStagesFromDb(dealId) {
  var user = null;
  try { user = JSON.parse(localStorage.getItem('gycUser') || 'null'); } catch(e) {}
  if (!user || !user.token) return;

  fetch('/api/userdata?type=stages', {
    headers: { 'Authorization': 'Bearer ' + user.token }
  })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(data) {
      if (!data || !data.records || data.records.length === 0) return;

      var localStages = {};
      try { localStages = JSON.parse(localStorage.getItem('gycDealStages') || '{}'); } catch(e) {}

      var changed = false;
      for (var i = 0; i < data.records.length; i++) {
        var rec = data.records[i];
        var rid = rec.deal_id;
        var dbStage = mapStageName(rec.stage || 'new');
        // If local doesn't have this deal or is at default, use DB value
        if (!localStages[rid] || localStages[rid] === 'new' || localStages[rid] === 'browse') {
          if (dbStage !== 'browse') {
            localStages[rid] = dbStage;
            changed = true;
          }
        }
      }

      if (changed) {
        localStorage.setItem('gycDealStages', JSON.stringify(localStages));
        // If we're on the deal page for one of these deals, update the UI
        if (dealId && localStages[dealId]) {
          updateJourneyUI(dealId, localStages[dealId]);
        }
      }
    })
    .catch(function(err) { console.warn('Stage load failed:', err.message); });
}

function updateJourneyUI(dealId, stage) {
  // Map legacy stage names to new names
  stage = mapStageName(stage);
  var stageOrder = { 'browse': 0, 'saved': 1, 'vetting': 1, 'diligence': 2, 'decision': 3, 'invested': 4 };
  var idx = stageOrder[stage] || 0;

  // Update journey bar steps
  var steps = document.querySelectorAll('.journey-step');
  var connectors = document.querySelectorAll('.journey-connector');
  var checkIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="14" height="14"><polyline points="20 6 9 17 4 12"/></svg>';
  steps.forEach(function(step, i) {
    step.classList.remove('active', 'completed');
    var dot = step.querySelector('.step-dot');
    if (i < idx) {
      step.classList.add('completed');
      dot.innerHTML = checkIcon;
    } else if (i === idx) {
      step.classList.add('active');
      dot.textContent = String(i + 1);
    } else {
      dot.textContent = String(i + 1);
    }
  });
  connectors.forEach(function(c, i) {
    c.classList.toggle('done', i < idx);
  });

  // Update sticky bar with smart contextual CTAs
  updateStickyBar(dealId, stage);
}

      }

    advHtml = passBtn + '<button class="btn-advance" id="stickyAdvanceBtn" onclick="setJourneyStage(\'' + dealId + '\', \'decision\')">Decide \u2192</button>';

  }

  stickyBar.innerHTML = advHtml;

function getRelativeTime(dateStr) {
  var diff = Date.now() - new Date(dateStr).getTime();
  var mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  var hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  var days = Math.floor(hrs / 24);
  if (days < 30) return days + 'd ago';
  var months = Math.floor(days / 30);
  return months + 'mo ago';
}

function submitDealQuestion(dealId, dealName) {
  if (!requireAuth('submit a question about this deal')) return;
  var textarea = document.getElementById('qaNewQuestion');
  if (!textarea) return;
  var question = textarea.value.trim();
  if (!question) { alert('Please enter a question.'); return; }
  var user = typeof getUser === 'function' ? getUser() : null;
  fetch('/api/deal-qa', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'ask',
      dealId: dealId,
      dealName: dealName,
      question: question,
      userEmail: user ? user.email : '',
      userName: user ? user.name : 'Anonymous'
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success) {
      textarea.value = '';
      loadDealQA(dealId);
    } else {
      alert('Failed to submit question: ' + (data.error || 'Unknown error'));
    }
  })
  .catch(function() { alert('Failed to submit question. Please try again.'); });
}

function submitDealAnswer(recordId) {
  var textarea = document.getElementById('qaAnswer_' + recordId);
  if (!textarea) return;
  var answer = textarea.value.trim();
  if (!answer) return;
  var user = typeof getUser === 'function' ? getUser() : null;
  var params = new URLSearchParams(window.location.search);
  var dealId = params.get('id');
  fetch('/api/deal-qa', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'answer',
      recordId: recordId,
      answer: answer,
      userName: user ? user.name : 'Pascal'
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success && dealId) loadDealQA(dealId);
  })
  .catch(function() {});
}

function upvoteQuestion(recordId, btn) {
  if (!requireAuth('upvote questions')) return;
  var upvoted = JSON.parse(localStorage.getItem('gycQAUpvoted') || '[]');
  if (upvoted.includes(recordId)) return;
  upvoted.push(recordId);
  localStorage.setItem('gycQAUpvoted', JSON.stringify(upvoted));
  fetch('/api/deal-qa', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'upvote', recordId: recordId })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success) {
      var countEl = btn.nextElementSibling;
      if (countEl) countEl.textContent = data.upvotes;
      btn.style.color = 'var(--primary)';
      btn.querySelector('svg').setAttribute('fill', 'var(--primary)');
      btn.style.cursor = 'default';
    }
  })
  .catch(function() {});
}

async function geocodeAndMap(locationStr, containerId) {

  try {

    const resp = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(locationStr) + '&limit=1');

    const data = await resp.json();

    if (data && data.length > 0) {

      const lat = parseFloat(data[0].lat);

      const lon = parseFloat(data[0].lon);

      const map = L.map(containerId).setView([lat, lon], 12);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

        attribution: '&copy; OpenStreetMap contributors',

        maxZoom: 18

      }).addTo(map);

      L.marker([lat, lon]).addTo(map).bindPopup(locationStr).openPopup();

    }

  } catch (e) {

    console.warn('Geocoding failed:', e);

  }

}



// ========== SHARE CLASS SWITCHER ==========
window._activeShareClassIdx = null;
window._originalDealValues = null;

function switchShareClass(idx) {
  var deal = window._currentDeal;
  if (!deal || !deal.shareClasses || deal.shareClasses.length === 0) return;

  // Save original values on first call
  if (!window._originalDealValues) {
    window._originalDealValues = {
      targetIRR: deal.targetIRR,
      preferredReturn: deal.preferredReturn,
      investmentMinimum: deal.investmentMinimum,
      holdPeriod: deal.holdPeriod,
      cashOnCash: deal.cashOnCash,
      equityMultiple: deal.equityMultiple,
      lpGpSplit: deal.lpGpSplit
    };
  }

  if (idx === null || idx === undefined) {
    // Restore original values
    var orig = window._originalDealValues;
    deal.targetIRR = orig.targetIRR;
    deal.preferredReturn = orig.preferredReturn;
    deal.investmentMinimum = orig.investmentMinimum;
    deal.holdPeriod = orig.holdPeriod;
    deal.cashOnCash = orig.cashOnCash;
    deal.equityMultiple = orig.equityMultiple;
    deal.lpGpSplit = orig.lpGpSplit;
    window._activeShareClassIdx = null;
  } else {
    var sc = deal.shareClasses[idx];
    if (!sc) return;
    // Overlay share class values (only override if share class has the value)
    if (sc.targetReturn !== null && sc.targetReturn !== undefined) deal.targetIRR = sc.targetReturn;
    if (sc.preferredReturn !== null && sc.preferredReturn !== undefined) deal.preferredReturn = sc.preferredReturn;
    if (sc.investmentMinimum !== null && sc.investmentMinimum !== undefined) deal.investmentMinimum = sc.investmentMinimum;
    if (sc.lockup !== null && sc.lockup !== undefined) deal.holdPeriod = sc.lockup;
    if (sc.cashOnCash !== null && sc.cashOnCash !== undefined) deal.cashOnCash = sc.cashOnCash;
    if (sc.lpGpSplit) deal.lpGpSplit = sc.lpGpSplit;
    window._activeShareClassIdx = idx;
  }

  // Re-render (skip data fetch, deal is already loaded)
  renderDeal();
}

    // Find the share class with the highest min investment (A-1 tier)
    var _bestIdx = 0, _bestMin = 0;
    for (var _si = 0; _si < deal.shareClasses.length; _si++) {
      if ((deal.shareClasses[_si].investmentMinimum || 0) > _bestMin) {

}



function esc(str) {

  if (str === null || str === undefined) return '';

  var div = document.createElement('div');

  div.textContent = String(str);

  return div.innerHTML;

}

function escAttr(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}



// ========== HOLD PERIOD FORMATTER ==========

function formatHoldPeriod(yrs) {
  if (!yrs && yrs !== 0) return '---';
  if (yrs === 0) return 'No Lockup';
  if (yrs < 1) {
    var days = Math.round(yrs * 365);
    if (days <= 90) return days + ' Days';
    return Math.round(yrs * 12) + ' Months';
  }
  if (yrs === 1) return '1 Year';
  if (Number.isInteger(yrs)) return yrs + ' Years';
  return yrs.toFixed(1) + ' Years';
}

// ========== RETURNS CHART (CREDIT FUNDS) ==========

function hashCode(str) {
  var hash = 0;
  for (var i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

function getCreditFundReturns(deal) {
  var years = [2022, 2023, 2024];
  var series = [];
  for (var yi = 0; yi < years.length; yi++) {
    var year = years[yi];
    var val = null;
    // Check deal object for year fields
    if (deal[String(year)] && typeof deal[String(year)] === 'number') {
      val = deal[String(year)];
    }
    // Only use real data — no fabricated fallback
    if (val !== null && typeof val === 'number' && val > 0) {
      var pctVal = val < 1 ? val * 100 : val;
      series.push({ year: year, value: parseFloat(pctVal.toFixed(1)) });
    }
  }
  return series;
}

function initDealReturnsChart(deal) {
  var canvas = document.getElementById('dealReturnsChart');
  if (!canvas || typeof Chart === 'undefined') return;
  var series = getCreditFundReturns(deal);
  if (series.length === 0) return;

  var labels = series.map(function(s) { return s.year; });
  var values = series.map(function(s) { return s.value; });
  var maxVal = Math.max.apply(null, values);

  var ctx = canvas.getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: values.map(function(v, i) {
          return i === values.length - 1 ? 'rgba(81,190,123,0.85)' : 'rgba(81,190,123,0.45)';
        }),
        borderRadius: 6,
        borderSkipped: false,
        barPercentage: 0.5,
        categoryPercentage: 0.7
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { enabled: false },
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: 'rgba(255,255,255,0.45)', font: { family: 'Plus Jakarta Sans', size: 11, weight: '600' } },
          border: { display: false }
        },
        y: {
          min: Math.max(0, Math.floor(Math.min.apply(null, values) - 2)),
          max: Math.ceil(maxVal + 3),
          grid: { color: 'rgba(255,255,255,0.08)', drawBorder: false },
          ticks: {
            color: 'rgba(255,255,255,0.35)',
            font: { family: 'Plus Jakarta Sans', size: 10 },
            callback: function(v) { return v + '%'; },
            stepSize: 2
          },
          border: { display: false }
        }
      },
      layout: { padding: { top: 30, right: 8, bottom: 0, left: 0 } },
      animation: { duration: 600 }
    },
    plugins: [{
      afterDraw: function(chart) {
        var ctx2 = chart.ctx;
        var meta = chart.getDatasetMeta(0);
        meta.data.forEach(function(bar, i) {
          var val = values[i];
          var isLatest = i === values.length - 1;
          ctx2.save();
          ctx2.font = (isLatest ? '700 12px' : '700 10px') + ' "Plus Jakarta Sans",sans-serif';
          var text = val.toFixed(1) + '%';
          var tw = ctx2.measureText(text).width;
          var px = bar.x;
          var py = bar.y - (isLatest ? 16 : 12);
          var pad = isLatest ? 8 : 6;
          ctx2.fillStyle = isLatest ? '#0A1E21' : 'rgba(10,30,33,0.7)';
          ctx2.beginPath();
          ctx2.roundRect(px - tw/2 - pad, py - (isLatest ? 10 : 8), tw + pad*2, isLatest ? 22 : 18, 4);
          ctx2.fill();
          if (isLatest) {
            ctx2.beginPath();
            ctx2.moveTo(px - 4, py + (isLatest ? 12 : 10));
            ctx2.lineTo(px, py + (isLatest ? 17 : 14));
            ctx2.lineTo(px + 4, py + (isLatest ? 12 : 10));
            ctx2.fill();
          }
          ctx2.fillStyle = '#fff';
          ctx2.textAlign = 'center';
          ctx2.textBaseline = 'middle';
          ctx2.fillText(text, px, py + 1);
          ctx2.restore();
        });
      }
    }]
  });
}

function openIntroConfirmation() {
