<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deal Detail - GYC Dealflow</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }



:root {

  --primary: #51BE7B;

  --primary-hover: #45A86C;

  --primary-light: #32C583;

  --bg-cream: #FAF9F5;

  --bg-card: #FFFFFF;

  --bg-sidebar: #0A1E21;

  --bg-sidebar-hover: #14333A;

  --bg-sidebar-active: #1F5159;

  --text-dark: #141413;

  --text-secondary: #607179;

  --text-muted: #8A9AA0;

  --text-sidebar: rgba(255,255,255,0.55);

  --text-sidebar-active: #FFFFFF;

  --border: #DDE5E8;

  --border-light: #EDF1F2;

  --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);

  --shadow-card-hover: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);

  --radius: 12px;

  --radius-sm: 8px;

  --sidebar-width: 240px;

  --green: #51BE7B;

  --green-bg: #E7F5F0;

  --orange: #CF7A30;

  --orange-bg: #FFF3E6;

  --red: #D04040;

  --blue: #2563EB;

  --blue-bg: #EFF6FF;

  --teal-deep: #1F5159;

  --teal-midnight: #0A1E21;

  --accent-green: #40E47F;

  --mint-bg: #E7F5F0;

  --bg-page: #FAF9F5;

  --off-white: #FAF9F5;

  --charcoal: #141413;

  --slate: #607179;

  --transition: 0.2s ease;

  --font-headline: 'DM Serif Display', Georgia, serif;

  --font-ui: 'Plus Jakarta Sans', -apple-system, sans-serif;

  --font-body: 'Source Sans 3', 'Source Sans Pro', sans-serif;

}



body {

  font-family: var(--font-body);

  background: var(--bg-cream);

  color: var(--text-dark);

  line-height: 1.5;

  overflow-x: hidden;

  -webkit-font-smoothing: antialiased;

}



/* ====== SIDEBAR ====== */

.sidebar {

  position: fixed;

  left: 0; top: 0; bottom: 0;

  width: var(--sidebar-width);

  background: var(--bg-sidebar);

  display: flex;

  flex-direction: column;

  z-index: 100;

  transition: transform 0.3s ease;

}



.sidebar-logo {

  padding: 20px 24px;

  display: flex;

  align-items: center;

  gap: 12px;

  border-bottom: 1px solid rgba(255,255,255,0.06);

}



.sidebar-logo-icon {

  width: 36px; height: 36px;

  background: var(--primary);

  border-radius: 8px;

  display: flex;

  align-items: center;

  justify-content: center;

  font-family: var(--font-ui);

  font-weight: 700;

  color: #fff;

  font-size: 12px;

  letter-spacing: -0.5px;

}



.sidebar-logo-text {

  font-family: var(--font-headline);

  font-size: 18px;

  font-weight: 400;

  color: #fff;

  letter-spacing: -0.3px;

}



.sidebar-nav {

  flex: 1;

  padding: 12px 0;

  overflow-y: auto;

}



.nav-back {

  display: flex;

  align-items: center;

  gap: 8px;

  padding: 12px 24px;

  color: var(--accent-green);

  font-family: var(--font-ui);

  font-size: 12px;

  font-weight: 600;

  text-decoration: none;

  transition: all var(--transition);

  border-bottom: 1px solid rgba(255,255,255,0.06);

  margin-bottom: 4px;

}

.nav-back:hover { background: var(--bg-sidebar-hover); color: #fff; }

.nav-back svg { width: 16px; height: 16px; }



.nav-section-label {

  padding: 16px 24px 8px;

  font-family: var(--font-ui);

  font-size: 10px;

  font-weight: 600;

  text-transform: uppercase;

  letter-spacing: 1.5px;

  color: rgba(255,255,255,0.3);

}



.nav-item {

  display: flex;

  align-items: center;

  gap: 12px;

  padding: 10px 24px;

  color: var(--text-sidebar);

  cursor: pointer;

  transition: all var(--transition);

  font-family: var(--font-ui);

  font-size: 13px;

  font-weight: 500;

  position: relative;

  text-decoration: none;

}



.nav-item:hover { background: var(--bg-sidebar-hover); color: #fff; }

.nav-item.active {

  background: var(--bg-sidebar-active);

  color: var(--text-sidebar-active);

}

.nav-item.active::before {

  content: '';

  position: absolute;

  left: 0; top: 4px; bottom: 4px;

  width: 3px;

  background: var(--primary);

  border-radius: 0 2px 2px 0;

}



.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; }

.nav-item.active svg, .nav-item:hover svg { opacity: 1; }

.nav-item-promo {

  background: linear-gradient(135deg, rgba(81,190,123,0.15), rgba(81,190,123,0.05)) !important;

  border: 1px solid rgba(81,190,123,0.3);

  border-radius: 8px !important;

  margin: 0 8px 8px 8px;

  color: #51BE7B !important;

  font-weight: 700 !important;

}

.nav-item-promo svg { opacity: 1 !important; stroke: #51BE7B !important; }

.nav-item-promo:hover { background: linear-gradient(135deg, rgba(81,190,123,0.25), rgba(81,190,123,0.1)) !important; color: #fff !important; }

.nav-item-promo:hover svg { stroke: #fff !important; }



.nav-badge {

  margin-left: auto;

  background: var(--primary);

  color: #fff;

  font-size: 11px;

  font-weight: 600;

  padding: 2px 8px;

  border-radius: 10px;

  min-width: 20px;

  text-align: center;

}



.sidebar-user {

  padding: 16px 24px;

  border-top: 1px solid rgba(255,255,255,0.06);

  display: flex;

  align-items: center;

  gap: 10px;

}



.sidebar-user-avatar {

  width: 34px; height: 34px;

  border-radius: 50%;

  background: var(--teal-deep);

  display: flex;

  align-items: center;

  justify-content: center;

  color: var(--accent-green);

  font-family: var(--font-ui);

  font-weight: 700;

  font-size: 12px;

  flex-shrink: 0;

}



.sidebar-user-info { flex: 1; min-width: 0; }

.sidebar-user-name {

  font-family: var(--font-ui);

  font-size: 13px;

  font-weight: 600;

  color: #fff;

  white-space: nowrap;

  overflow: hidden;

  text-overflow: ellipsis;

}

.sidebar-user-tier {

  font-family: var(--font-ui);

  font-size: 10px;

  font-weight: 600;

  color: var(--accent-green);

  text-transform: uppercase;

  letter-spacing: 0.5px;

}



.sidebar-logout {

  background: none;

  border: none;

  color: rgba(255,255,255,0.3);

  cursor: pointer;

  padding: 4px;

  transition: color 0.2s;

}

.sidebar-logout:hover { color: #fff; }

.sidebar-logout svg { width: 16px; height: 16px; }



.sidebar-footer {

  padding: 16px 24px;

  border-top: 1px solid rgba(255,255,255,0.06);

}



/* ====== MAIN CONTENT ====== */

.main {

  margin-left: var(--sidebar-width);

  min-height: 100vh;

  transition: margin-left 0.3s ease;

}



/* Mobile menu button */

.mobile-menu-btn {

  display: none;

  background: none;

  border: none;

  cursor: pointer;

  color: var(--text-dark);

  padding: 4px;

}

.mobile-menu-btn svg { width: 24px; height: 24px; }



.mobile-topbar {

  display: none;

  position: sticky;

  top: 0;

  height: 56px;

  background: var(--bg-cream);

  border-bottom: 1px solid var(--border);

  align-items: center;

  padding: 0 20px;

  gap: 12px;

  z-index: 50;

}



.mobile-topbar-title {

  font-family: var(--font-ui);

  font-size: 14px;

  font-weight: 700;

  color: var(--text-dark);

  flex: 1;

  white-space: nowrap;

  overflow: hidden;

  text-overflow: ellipsis;

}



.sidebar-overlay {

  display: none;

  position: fixed;

  inset: 0;

  background: rgba(0,0,0,0.5);

  z-index: 99;

}



/* ====== CONTENT AREA ====== */

.content-wrap {

  max-width: 1200px;

  padding: 32px 40px 64px;

  margin: 0 auto;

}



/* ====== LOADING SKELETON ====== */

.skeleton {

  position: relative;

  overflow: hidden;

  background: var(--border-light);

  border-radius: var(--radius-sm);

}

.skeleton::after {

  content: '';

  position: absolute;

  inset: 0;

  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.6) 50%, transparent 100%);

  animation: shimmer 1.5s infinite;

}

@keyframes shimmer {

  0% { transform: translateX(-100%); }

  100% { transform: translateX(100%); }

}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.skeleton-header { height: 180px; margin-bottom: 24px; }

.skeleton-stats { height: 80px; margin-bottom: 24px; }

.skeleton-card { height: 200px; margin-bottom: 20px; }



.loading-wrap { display: block; }

.loaded-wrap { display: none; }

.page-loaded .loading-wrap { display: none; }

.page-loaded .loaded-wrap { display: block; }



/* ====== BREADCRUMB ====== */

.breadcrumb {

  display: flex;

  align-items: center;

  gap: 8px;

  margin-bottom: 20px;

  font-family: var(--font-ui);

  font-size: 13px;

  font-weight: 500;

  color: var(--text-muted);

}

.breadcrumb a {

  color: var(--primary);

  text-decoration: none;

  transition: color var(--transition);

}

.breadcrumb a:hover { color: var(--primary-hover); }

.breadcrumb svg { width: 14px; height: 14px; flex-shrink: 0; }



/* ====== DEAL HEADER ====== */

.deal-header {

  background: linear-gradient(145deg, var(--teal-midnight) 0%, var(--teal-deep) 100%);

  border-radius: var(--radius);

  padding: 36px 40px;

  margin-bottom: 24px;

  position: relative;

  overflow: hidden;

}

.deal-header.hero-lending {
  background: linear-gradient(145deg, #263a4d 0%, #2a4f60 50%, #264555 100%);
}
.deal-header.hero-lending::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(90deg, rgba(81,190,123,0.03) 0px, rgba(81,190,123,0.03) 1px, transparent 1px, transparent 60px);
  pointer-events: none;
}

.deal-header.hero-equity {
  background: linear-gradient(145deg, #3a5a3e 0%, #2d4f3a 50%, #3a6045 100%);
}

.deal-header::after {

  content: '';

  position: absolute;

  top: -60%; right: -10%;

  width: 300px; height: 300px;

  background: radial-gradient(circle, rgba(81,190,123,0.1) 0%, transparent 70%);

  border-radius: 50%;

  pointer-events: none;

}

.deal-header.hero-lending::after {
  background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
}

/* Hero type icon */
.hero-type-icon {
  position: absolute;
  bottom: 20px;
  right: 24px;
  opacity: 0.06;
  z-index: 0;
}
.hero-type-icon svg {
  width: 120px;
  height: 120px;
  stroke: #fff;
  stroke-width: 1;
  fill: none;
}



.deal-header-inner {

  position: relative;

  z-index: 1;

  display: flex;
  gap: 32px;
  align-items: center;
  justify-content: space-between;

}
.hero-left { flex: 1; min-width: 0; }
.hero-right {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  text-align: center;
}
.hero-operator-photo {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  background: rgba(255,255,255,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-ui);
  font-weight: 800;
  color: rgba(255,255,255,0.9);
  font-size: 26px;
  letter-spacing: -0.5px;
  border: 2px solid rgba(255,255,255,0.15);
}
.hero-operator-photo img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}
.hero-operator-name {
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 700;
  color: #fff;
}
.hero-operator-title {
  font-family: var(--font-ui);
  font-size: 11px;
  color: rgba(255,255,255,0.55);
}
.hero-metrics {
  display: flex;
  gap: 24px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.hero-metric {
  display: flex;
  flex-direction: column;
}
.hero-metric-value {
  font-family: var(--font-ui);
  font-size: 22px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.5px;
  line-height: 1.1;
}
.hero-metric-value.highlight { color: var(--accent-green); }
.hero-metric-label {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
}

@media (max-width: 768px) {
  .deal-header-inner { flex-direction: column; align-items: flex-start; }
  .hero-right { flex-direction: row; align-items: center; gap: 12px; text-align: left; }
  .hero-operator-photo { width: 48px; height: 48px; font-size: 18px; }
  .hero-metrics { gap: 16px; }
}
@media (max-width: 900px) {
  .deal-page-content > div[style*="grid-template-columns: 2fr 1fr"],
  .deal-page-content > div[style*="grid-template-columns:2fr 1fr"] {
    display: flex !important;
    flex-direction: column !important;
  }
}

.deal-name {

  font-family: var(--font-headline);

  font-size: 32px;

  color: #fff;

  line-height: 1.2;

  letter-spacing: -0.5px;

  margin-bottom: 8px;

}



.deal-company {

  font-family: var(--font-ui);

  font-size: 15px;

  font-weight: 500;

  margin-bottom: 16px;

  color: rgba(255,255,255,0.85);

}

.deal-company a {

  color: var(--accent-green);

  text-decoration: none;

  transition: color var(--transition);

}

.deal-company a:hover { color: #fff; text-decoration: underline; }



.deal-badges {

  display: flex;

  gap: 8px;

  flex-wrap: wrap;

}



.deal-badge {

  display: inline-flex;

  align-items: center;

  padding: 4px 12px;

  border-radius: 20px;

  font-family: var(--font-ui);

  font-size: 12px;

  font-weight: 600;

  letter-spacing: 0.3px;

}

.deal-badge.asset-class {

  background: rgba(81,190,123,0.15);

  color: var(--accent-green);

}

.deal-badge.deal-type {

  background: rgba(37,99,235,0.15);

  color: #93C5FD;

}

.deal-badge.status-open {

  background: rgba(81,190,123,0.15);

  color: var(--accent-green);

}

.deal-badge.status-evergreen {

  background: rgba(37,99,235,0.15);

  color: #93C5FD;

}

.deal-badge.status-closed {

  background: rgba(208,64,64,0.15);

  color: #FCA5A5;

}



/* ====== JOURNEY BAR ====== */

.journey-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin-bottom: 24px;
  padding: 14px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.journey-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: default;
  padding: 4px 8px;
  border-radius: 12px;
  transition: all 0.2s;
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  white-space: nowrap;
  text-align: center;
}
.journey-step:hover {
  background: var(--bg-cream);
  color: var(--text-dark);
}
.journey-step .step-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  background: var(--bg-page);
  transition: all 0.2s;
  flex-shrink: 0;
}
.journey-step.active .step-dot {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}
.journey-step.active {
  color: var(--primary);
  background: rgba(81,190,123,0.08);
}
.journey-step.completed .step-dot {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}
.journey-step.completed {
  color: var(--text-dark);
}
.journey-connector {
  flex: 1;
  min-width: 12px;
  max-width: 40px;
  height: 2px;
  background: var(--border);
  align-self: center;
  margin-top: -16px;
}
.journey-connector.done {
  background: var(--primary);
}
.journey-connector.passed {
  background: #D04040;
}
.journey-step.passed .step-dot {
  background: #D04040;
  border-color: #D04040;
  color: #fff;
}
.journey-step.passed {
  color: #D04040;
}
.journey-step:not(.active):not(.completed):not(.passed):hover .step-dot {
  border-color: var(--primary);
  color: var(--primary);
}
.journey-step:not(.active):not(.completed):not(.passed) .step-dot[onclick] {
  cursor: pointer;
}
.journey-step[data-stage="passed"]:not(.passed):hover .step-dot {
  border-color: #D04040;
  background: rgba(208,64,64,0.08);
  color: #D04040;
}
.journey-step[data-stage="passed"]:not(.passed):hover {
  color: #D04040;
}

/* ====== DATA COMPLETENESS ====== */

.data-completeness {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 24px;
  font-family: var(--font-ui);
}
.data-completeness-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-dark);
  white-space: nowrap;
}
.data-completeness-bar {
  flex: 1;
  height: 6px;
  background: var(--border-light);
  border-radius: 3px;
  overflow: hidden;
}
.data-completeness-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}
.data-completeness-fill.high { background: var(--primary); }
.data-completeness-fill.medium { background: #f59e0b; }
.data-completeness-fill.low { background: #ef4444; }
.data-completeness-pct {
  font-size: 14px;
  font-weight: 800;
  color: var(--text-dark);
  min-width: 36px;
  text-align: right;
}
.data-completeness-hint {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* ====== STICKY ACTION BAR ====== */

.sticky-action-bar {
  position: fixed;
  bottom: 0;
  left: var(--sidebar-width, 240px);
  right: 0;
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  padding: 12px 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
}
.sticky-action-bar .btn-pass {
  padding: 10px 20px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sticky-action-bar .btn-pass:hover {
  border-color: #ef4444;
  color: #ef4444;
}
.sticky-action-bar .btn-stage-select {
  padding: 10px 20px;
  background: var(--bg-page);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dark);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sticky-action-bar .btn-advance {
  padding: 10px 24px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
}
.sticky-action-bar .btn-advance:hover {
  background: #3da86a;
  transform: translateY(-1px);
}
.sticky-action-bar .stage-label {
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-ui);
}
/* Add bottom padding to page content so it's not hidden behind sticky bar */
.deal-page-content {
  padding-bottom: 80px;
}

@media (max-width: 768px) {
  .sticky-action-bar {
    left: 0;
    padding: 10px 16px;
  }
  .data-completeness-hint { display: none; }
  .metrics-strip {
    grid-template-columns: repeat(2, 1fr) !important;
  }
}

/* ====== KEY METRICS STRIP ====== */

.metrics-strip {

  display: grid;

  grid-template-columns: repeat(6, 1fr);

  gap: 12px;

  margin-bottom: 24px;

}



.metric-card {

  background: var(--bg-card);

  border: 1px solid var(--border);

  border-radius: var(--radius);

  padding: 16px 18px;

  text-align: center;

  box-shadow: var(--shadow-card);

}



.metric-label {

  font-family: var(--font-ui);

  font-size: 11px;

  font-weight: 600;

  text-transform: uppercase;

  letter-spacing: 0.8px;

  color: var(--text-muted);

  margin-bottom: 6px;

}



.metric-value {

  font-family: var(--font-ui);

  font-size: 20px;

  font-weight: 800;

  color: var(--text-dark);

  letter-spacing: -0.5px;

}

.metric-value.highlight { color: var(--primary); }



/* ====== SECTIONS ====== */

.section {

  background: var(--bg-card);

  border: 1px solid var(--border);

  border-radius: var(--radius);

  margin-bottom: 20px;

  box-shadow: var(--shadow-card);

  overflow: hidden;

}



.section-header {

  padding: 18px 24px;

  border-bottom: 1px solid var(--border-light);

  display: flex;

  align-items: center;

  gap: 10px;

}

.section-header svg { width: 18px; height: 18px; color: var(--primary); flex-shrink: 0; }



.section-title {

  font-family: var(--font-ui);

  font-size: 15px;

  font-weight: 700;

  color: var(--text-dark);

  letter-spacing: -0.2px;

}



.section-body {

  padding: 24px;

}



/* ====== OVERVIEW ====== */

.overview-text {

  font-family: var(--font-body);

  font-size: 15px;

  line-height: 1.7;

  color: var(--text-secondary);

}



/* ====== DETAILS GRID ====== */

.details-grid {

  display: grid;

  grid-template-columns: repeat(4, 1fr);

  gap: 20px;

}



.detail-item {}



.detail-label {

  font-family: var(--font-ui);

  font-size: 11px;

  font-weight: 600;

  text-transform: uppercase;

  letter-spacing: 0.8px;

  color: var(--text-muted);

  margin-bottom: 4px;

}



.detail-value {

  font-family: var(--font-ui);

  font-size: 14px;

  font-weight: 600;

  color: var(--text-dark);

}



/* ====== DEAL SUMMARY ====== */

.summary-row {

  display: flex;

  gap: 12px;

  margin-bottom: 12px;

}

.summary-label {

  font-family: var(--font-ui);

  font-size: 13px;

  font-weight: 600;

  color: var(--text-muted);

  min-width: 140px;

  flex-shrink: 0;

}

.summary-value {

  font-family: var(--font-body);

  font-size: 14px;

  color: var(--text-dark);

}



.fees-list {

  list-style: none;

  padding: 0;

}

.fees-list li {

  font-family: var(--font-body);

  font-size: 14px;

  color: var(--text-dark);

  padding: 4px 0;

  padding-left: 16px;

  position: relative;

}

.fees-list li::before {

  content: '';

  position: absolute;

  left: 0;

  top: 11px;

  width: 6px;

  height: 6px;

  border-radius: 50%;

  background: var(--primary);

}



/* ====== GEOGRAPHY / MAP ====== */

.map-container {

  height: 340px;

  border-radius: var(--radius-sm);

  overflow: hidden;

  margin-top: 16px;

  border: 1px solid var(--border);

}



.geo-info {

  display: flex;

  gap: 32px;

  flex-wrap: wrap;

  margin-bottom: 8px;

}

.geo-item {}

.geo-label {

  font-family: var(--font-ui);

  font-size: 11px;

  font-weight: 600;

  text-transform: uppercase;

  letter-spacing: 0.8px;

  color: var(--text-muted);

  margin-bottom: 4px;

}

.geo-value {

  font-family: var(--font-ui);

  font-size: 14px;

  font-weight: 600;

  color: var(--text-dark);

}



/* ====== SPONSOR SECTION ====== */

.sponsor-card {

  display: flex;

  align-items: center;

  gap: 16px;

}



.sponsor-avatar {

  width: 56px; height: 56px;

  border-radius: 50%;

  background: var(--primary);

  display: flex;

  align-items: center;

  justify-content: center;

  font-family: var(--font-ui);

  font-weight: 800;

  color: #fff;

  font-size: 18px;

  flex-shrink: 0;

  letter-spacing: -0.5px;

}



.sponsor-info {}

.sponsor-ceo-name {

  font-family: var(--font-ui);

  font-size: 15px;

  font-weight: 700;

  color: var(--text-dark);

  margin-bottom: 2px;

}

.sponsor-company-link {

  font-family: var(--font-ui);

  font-size: 13px;

  font-weight: 500;

  color: var(--primary);

  text-decoration: none;

  transition: color var(--transition);

}

.sponsor-company-link:hover { color: var(--primary-hover); text-decoration: underline; }

/* ====== OPERATOR PROFILE ====== */
.operator-profile {
  display: flex;
  gap: 24px;
  align-items: flex-start;
}
.operator-photo {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--teal-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-ui);
  font-weight: 800;
  color: #fff;
  font-size: 28px;
  letter-spacing: -0.5px;
}
.operator-details { flex: 1; min-width: 0; }
.operator-name {
  font-family: var(--font-ui);
  font-size: 18px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 2px;
}
.operator-title {
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}
.operator-bio {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-secondary);
  margin-bottom: 16px;
}
.operator-stats {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.operator-stat {
  text-align: center;
}
.operator-stat-value {
  font-family: var(--font-ui);
  font-size: 20px;
  font-weight: 800;
  color: var(--text-dark);
}
.operator-stat-label {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-top: 2px;
}
.operator-links {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.operator-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  text-decoration: none;
  transition: all var(--transition);
}
.operator-link:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: rgba(81,190,123,0.04);
}
.operator-link svg { width: 14px; height: 14px; }

/* ====== OPERATOR OTHER DEALS ====== */
.operator-deals-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}
.operator-deal-card {
  display: block;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  text-decoration: none;
  transition: box-shadow 0.2s;
}
.operator-deal-card:hover {
  box-shadow: var(--shadow-card-hover);
}
.operator-deal-name {
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 4px;
}
.operator-deal-meta {
  font-family: var(--font-ui);
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.operator-deal-stats {
  display: flex;
  gap: 16px;
  align-items: center;
}
.operator-deal-stat {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text-secondary);
}
.operator-deal-stat strong {
  font-size: 15px;
  font-weight: 800;
  color: var(--text-dark);
}

@media (max-width: 768px) {
  .operator-profile { flex-direction: column; align-items: center; text-align: center; }
  .operator-stats { justify-content: center; }
  .operator-links { justify-content: center; }
  .operator-deals-grid { grid-template-columns: 1fr; }
}

/* ====== ACTION BUTTONS ====== */

.action-buttons {

  display: flex;

  gap: 12px;

  flex-wrap: wrap;

}



.btn-action {

  display: inline-flex;

  align-items: center;

  gap: 8px;

  padding: 12px 24px;

  border-radius: var(--radius-sm);

  font-family: var(--font-ui);

  font-size: 14px;

  font-weight: 600;

  cursor: pointer;

  border: none;

  transition: all var(--transition);

  text-decoration: none;

}

.btn-action svg { width: 16px; height: 16px; }



.btn-primary {

  background: var(--primary);

  color: #fff;

}

.btn-primary:hover { background: var(--primary-hover); }



.btn-secondary {

  background: var(--bg-card);

  color: var(--text-dark);

  border: 1px solid var(--border);

}

.btn-secondary:hover {

  background: var(--bg-cream);

  border-color: var(--primary);

  color: var(--primary);

}

.btn-link {
  background: none;
  border: none;
  color: var(--primary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  padding: 6px 12px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  text-decoration: underline;
  text-underline-offset: 2px;
}
.btn-link:hover {
  color: var(--text-dark);
}

.offering-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
}
.offering-available {
  color: var(--primary);
}
.offering-missing {
  color: var(--text-muted);
}

/* ====== DECK SUBMIT MODAL ====== */

.deck-modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
}
.deck-modal-overlay.visible {
  opacity: 1;
}
.deck-modal {
  background: var(--bg-card);
  border-radius: var(--radius-md);
  padding: 32px;
  max-width: 480px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.deck-modal h3 {
  font-family: var(--font-ui);
  font-size: 18px;
  font-weight: 700;
  color: var(--text-dark);
  margin: 0 0 8px 0;
}
.deck-modal p {
  font-size: 14px;
  color: var(--text-muted);
  margin: 0 0 20px 0;
  line-height: 1.5;
}
.deck-modal label {
  display: block;
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.deck-modal input,
.deck-modal textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-size: 14px;
  margin-bottom: 16px;
  background: var(--bg-page);
  color: var(--text-dark);
  box-sizing: border-box;
}
.deck-modal textarea {
  height: 80px;
  resize: vertical;
}
.deck-modal input:focus,
.deck-modal textarea:focus {
  outline: none;
  border-color: var(--primary);
}
.deck-modal-actions {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}
.deck-modal .btn-cancel {
  background: none;
  border: 1px solid var(--border);
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: 14px;
  color: var(--text-muted);
}
.deck-modal .btn-submit {
  background: var(--primary);
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 600;
}
.deck-modal .btn-submit:disabled {
  opacity: 0.5;
  cursor: default;
}
.deck-modal-success {
  text-align: center;
  padding: 20px 0;
}
.deck-modal-success svg {
  color: var(--primary);
  margin-bottom: 12px;
}
.deck-modal-success p {
  font-size: 15px;
  color: var(--text-dark);
  font-weight: 600;
}

/* ====== SHARE CLASS TABLE ====== */

.share-class-table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 0 -4px;
}
.share-class-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-ui);
  font-size: 14px;
  min-width: 400px;
}
.share-class-table th {
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--primary);
  padding: 12px 16px;
  border-bottom: 2px solid var(--border);
}
.share-class-table th:first-child {
  text-align: left;
  color: var(--text-muted);
  font-weight: 600;
}
.share-class-table td {
  text-align: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border-light);
  color: var(--text-dark);
}
.share-class-table td:first-child {
  text-align: left;
  color: var(--text-muted);
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.share-class-table tr:last-child td {
  border-bottom: none;
}
.share-class-table td .value-highlight {
  font-weight: 700;
  color: var(--primary);
}



/* ====== SUPPORTING MATERIALS ====== */

.materials-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.material-tile {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: var(--bg-page);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dark);
  text-decoration: none;
  transition: all var(--transition);
}
.material-tile:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--bg-cream);
}
.material-tile svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}
.materials-missing {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 12px;
}
.materials-missing button {
  background: none;
  border: none;
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 2px;
  padding: 0;
}

/* ====== DD CHECKLIST ====== */

.dd-checklist-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.dd-checklist-subtitle {
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-ui);
}
.dd-accordion {
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.dd-accordion-section + .dd-accordion-section {
  border-top: 1px solid var(--border-light);
}
.dd-accordion-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  background: var(--bg-page);
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
.dd-accordion-header:hover {
  background: var(--bg-cream);
}
.dd-accordion-title {
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 700;
  color: var(--text-dark);
  display: flex;
  align-items: center;
  gap: 8px;
}
.dd-accordion-title svg {
  width: 14px;
  height: 14px;
  transition: transform 0.2s;
  color: var(--text-muted);
}
.dd-accordion-section.open .dd-accordion-title svg {
  transform: rotate(90deg);
}
.dd-accordion-progress {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  background: var(--bg-card);
  padding: 3px 10px;
  border-radius: 10px;
  border: 1px solid var(--border-light);
}
.dd-accordion-body {
  display: none;
  padding: 0 18px 18px;
  background: var(--bg-card);
}
.dd-accordion-section.open .dd-accordion-body {
  display: block;
}
.dd-question {
  padding: 12px 0;
  border-bottom: 1px solid var(--border-light);
}
.dd-question:last-child {
  border-bottom: none;
}
.dd-question-text {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dark);
  margin-bottom: 6px;
  line-height: 1.4;
}
.dd-answer {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.dd-answer-icon {
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  margin-top: 1px;
}
.dd-answer-icon.auto {
  color: var(--primary);
}
.dd-answer-icon.user {
  color: #3b82f6;
}
.dd-answer-icon.empty {
  color: var(--text-muted);
}
.dd-answer-text {
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--text-dark);
  flex: 1;
}
.dd-answer-badge {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
}
.dd-answer-badge.auto {
  background: rgba(81,190,123,0.12);
  color: var(--primary);
}
.dd-answer-badge.user {
  background: rgba(59,130,246,0.12);
  color: #3b82f6;
}
.dd-answer-badge.community {
  background: rgba(168,85,247,0.12);
  color: #a855f7;
}
.dd-answer-input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-size: 13px;
  background: var(--bg-page);
  color: var(--text-dark);
  box-sizing: border-box;
}
.dd-answer-input:focus {
  outline: none;
  border-color: var(--primary);
}

/* Third party perspectives */
.dd-perspectives {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid var(--border-light);
}
.dd-perspectives-title {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.dd-perspective-links {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.dd-office-hours {
  background: var(--bg-page);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.dd-office-hours-text {
  font-family: var(--font-ui);
}
.dd-office-hours-text strong {
  font-size: 14px;
  color: var(--text-dark);
  display: block;
  margin-bottom: 2px;
}
.dd-office-hours-text span {
  font-size: 12px;
  color: var(--text-muted);
}
.dd-office-hours a {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: var(--primary);
  color: #fff;
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  white-space: nowrap;
}

/* ====== ACADEMY GATE CTA ====== */
.academy-gate-inline {
  background: linear-gradient(135deg, #eff6ff, #f0fdf4);
  border: 2px solid rgba(59,130,246,0.2);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  margin: 8px 0;
}
.academy-gate-inline .gate-icon {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, #3b82f6, #4ade80);
  border-radius: 12px;
  margin: 0 auto 12px;
  display: flex; align-items: center; justify-content: center;
}
.academy-gate-inline .gate-title {
  font-family: var(--font-ui);
  font-size: 15px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 6px;
}
.academy-gate-inline .gate-sub {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 14px;
  line-height: 1.5;
  max-width: 420px;
  margin-left: auto;
  margin-right: auto;
}
.academy-gate-inline .gate-btn {
  display: inline-block;
  padding: 10px 24px;
  background: #3b82f6;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: var(--font-ui);
  font-weight: 700;

function fmt(val, type) {

  if (val === undefined || val === null || val === '') return '---';

  if (type === 'pct') return (val * 100).toFixed(1) + '%';

  if (type === 'pct0') return (val * 100).toFixed(0) + '%';

  if (type === 'money') {

    if (val === 0) return '$0';

    if (val >= 1000000) return '$' + (val / 1000000).toFixed(1) + 'M';

    if (val >= 1000) return '$' + (val / 1000).toFixed(0) + 'K';

    return '$' + val.toLocaleString();

  }

  if (type === 'multiple') return val.toFixed(2) + 'x';

  return val;

}



function getInitials(name) {

  if (!name) return '??';

  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 3);

}



function statusBadgeClass(status) {

  if (status === 'Open to invest') return 'status-open';

  if (status === 'Evergreen') return 'status-evergreen';

  return 'status-closed';

}

function isCreditFund(deal) {
  var ac = (deal.assetClass || '').toLowerCase();
  var st = (deal.strategy || '').toLowerCase();
  var inst = (deal.instrument || '').toLowerCase();
  var name = (deal.investmentName || '').toLowerCase();
  if (inst === 'debt') return true;
  if (st === 'lending') return true;
  if (ac === 'lending') return true;
  if (ac.indexOf('credit') >= 0 || ac.indexOf('debt') >= 0) return true;
  if (name.indexOf('debt fund') >= 0 || name.indexOf('credit fund') >= 0 || name.indexOf('income fund') >= 0) {
    if (st === 'lending' || inst === 'debt' || inst === 'preferred equity' || deal.debtPosition) return true;
  }
  return false;
}

function creditBadgeLabel(deal) {
  var ac = (deal.assetClass || '').toLowerCase();
  if (ac === 'lending') return 'LENDING';
  if (ac.indexOf('credit') >= 0) return 'CREDIT';
  var st = (deal.strategy || '').toLowerCase();
  if (st === 'lending') return 'LENDING';
  return 'CREDIT';
}

function saveMemoField(dealId, field, value) {
  if (!requireAuth('save your investment notes')) return;
  var memo = {};
  try { memo = JSON.parse(localStorage.getItem('gycMemo_' + dealId) || '{}'); } catch(e) {}
  memo[field] = value;
  memo._lastSaved = new Date().toISOString();
  localStorage.setItem('gycMemo_' + dealId, JSON.stringify(memo));

  // Debounced sync to database
  clearTimeout(window._memoSyncTimer);
  window._memoSyncTimer = setTimeout(function() { syncMemoToDb(dealId); }, 1500);
}

  try { memo = JSON.parse(localStorage.getItem('gycMemo_' + dealId) || '{}'); } catch(e) {}
  var deal = DEALS.find(function(d) { return d.id === dealId; });
  var ddAnswers = loadDDAnswers(dealId);

  // Build buy box match snapshot
  var bbMatch = null;
  try {
    var bb = JSON.parse(localStorage.getItem('gycBuyBoxWizard') || 'null');
    if (bb && deal) {
      var checks = [];
      if (bb.assetClasses && bb.assetClasses.length > 0) checks.push({ label: 'Asset Class', match: bb.assetClasses.indexOf(deal.assetClass) >= 0 });
      if (bb.checkSize) checks.push({ label: 'Check Size', match: deal.investmentMinimum <= bb.checkSize });
      if (bb.minIRR) checks.push({ label: 'Target Return', match: (deal.targetIRR || 0) >= bb.minIRR });
      if (bb.strategies && bb.strategies.length > 0) checks.push({ label: 'Strategy', match: bb.strategies.indexOf(deal.strategy) >= 0 });
      if (bb.maxLockup) checks.push({ label: 'Lockup', match: (deal.holdPeriod || 0) <= bb.maxLockup });
      bbMatch = { criteria: checks, matched: checks.filter(function(c) { return c.match; }).length, total: checks.length };
    }
  } catch(e) {}

  // Build deal snapshot
  var snapshot = deal ? {
    investmentName: deal.investmentName, managementCompany: deal.managementCompany, ceo: deal.ceo,
    assetClass: deal.assetClass, dealType: deal.dealType, targetIRR: deal.targetIRR,
    preferredReturn: deal.preferredReturn, investmentMinimum: deal.investmentMinimum,
    holdPeriod: deal.holdPeriod, strategy: deal.strategy, status: deal.status
  } : {};

  fetch('/api/memo', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      dealId: dealId,
      email: user.email,
      dealName: deal ? deal.investmentName : '',
      thesis: memo.thesis || '',
      risks: memo.risks || '',
      reflection: memo.reflection || '',
      buyBoxMatch: bbMatch,
      ddAnswers: ddAnswers,
      dealSnapshot: snapshot,
      stage: typeof getDealStage === 'function' ? getDealStage(dealId) : 'ready'
    })
  }).catch(function(err) { console.warn('Memo sync failed:', err.message); });
}

// Load memo from database on page load (merge with localStorage)
function loadMemoFromDb(dealId) {
  var user = null;
  try { user = JSON.parse(localStorage.getItem('gycUser') || 'null'); } catch(e) {}
  if (!user || !user.email) return;

  fetch('/api/memo?dealId=' + encodeURIComponent(dealId) + '&email=' + encodeURIComponent(user.email))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.success || !data.memo) return;
      var dbMemo = data.memo;
      var localMemo = {};
      try { localMemo = JSON.parse(localStorage.getItem('gycMemo_' + dealId) || '{}'); } catch(e) {}

      // Merge: use most recent version (DB or local)
      var dbTime = dbMemo.updated_at ? new Date(dbMemo.updated_at).getTime() : 0;
      var localTime = localMemo._lastSaved ? new Date(localMemo._lastSaved).getTime() : 0;

      if (dbTime > localTime) {
        // DB is newer — update localStorage and re-render textareas
        localMemo.thesis = dbMemo.thesis || localMemo.thesis || '';
        localMemo.risks = dbMemo.risks || localMemo.risks || '';
        localMemo.reflection = dbMemo.reflection || localMemo.reflection || '';
        localMemo._lastSaved = dbMemo.updated_at;
        localStorage.setItem('gycMemo_' + dealId, JSON.stringify(localMemo));

        // Update textareas if they exist
        var thesisEl = document.getElementById('memoThesis');
        var risksEl = document.getElementById('memoRisks');
        var reflEl = document.getElementById('memoReflection');
        if (thesisEl && dbMemo.thesis) thesisEl.value = dbMemo.thesis;
        if (risksEl && dbMemo.risks) risksEl.value = dbMemo.risks;
        if (reflEl && dbMemo.reflection) reflEl.value = dbMemo.reflection;
      } else if (localTime > dbTime && (localMemo.thesis || localMemo.risks || localMemo.reflection)) {
        // Local is newer — push to DB
        syncMemoToDb(dealId);
      }
    })
    .catch(function(err) { console.warn('Memo load failed:', err.message); });
}

function saveDDAnswer(dealId, key, value) {
  if (!requireAuth('save your due diligence answers')) return;
  var answers = loadDDAnswers(dealId);
  if (value) {
    answers[key] = value;
  } else {
    delete answers[key];
  }
  localStorage.setItem('gycDDChecklist_' + dealId, JSON.stringify(answers));
  // Update progress counts
  updateChecklistProgress();
  // Sync to Supabase in background
  try {
    var user = JSON.parse(localStorage.getItem('gycUser') || 'null');
    var headers = { 'Content-Type': 'application/json' };
    if (user && user.token) headers['Authorization'] = 'Bearer ' + user.token;
    fetch('/api/ddchecklist', {
      method: 'POST',
      headers: headers,
      body: JSON.stringify({
        dealId: dealId,
        itemIndex: key,
        itemText: '',
        checked: !!value,
        userEmail: (user && user.email) || '',
        userName: (user && user.name) || '',
        answer: value || '',
        source: 'user'
      })
    }).catch(function() {});
  } catch(e) {}
}

function updateChecklistProgress() {
  document.querySelectorAll('.dd-accordion-section').forEach(function(section) {
    var total = section.querySelectorAll('.dd-question').length;
    var answered = section.querySelectorAll('.dd-question.answered').length;
    var badge = section.querySelector('.dd-accordion-progress');
    if (badge) badge.textContent = answered + '/' + total;
  });
}

function toggleAccordion(el) {
  var section = el.closest('.dd-accordion-section');
  section.classList.toggle('open');
}

function mapStageName(stage) {
  var legacyMap = { 'new': 'browse', 'interested': 'saved', 'duediligence': 'vetting', 'portfolio': 'invested' };
  return legacyMap[stage] || stage;
}

function getDealStage(dealId) {
  try {
    var stages = JSON.parse(localStorage.getItem('gycDealStages') || '{}');
    return mapStageName(stages[dealId] || 'new');
  } catch(e) { return 'browse'; }
}

function setJourneyStage(dealId, stage) {
  if (!requireAuth('save this deal to your pipeline')) return;
  try {
    var stages = JSON.parse(localStorage.getItem('gycDealStages') || '{}');
    stages[dealId] = stage;
    localStorage.setItem('gycDealStages', JSON.stringify(stages));
  } catch(e) {}
  // Re-render the journey bar and sticky bar
  updateJourneyUI(dealId, stage);
  // Sync stage to Supabase in background
  syncStageToDb(dealId, stage);
}

function syncStageToDb(dealId, stage) {
  var user = null;
  try { user = JSON.parse(localStorage.getItem('gycUser') || 'null'); } catch(e) {}
  if (!user || !user.token) return;

  // Map new stage names back to DB format
  var dbStageMap = { 'browse': 'new', 'saved': 'interested', 'vetting': 'duediligence', 'ready': 'ready', 'invested': 'portfolio', 'passed': 'passed' };
  var dbStage = dbStageMap[stage] || stage;

  fetch('/api/userdata', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + user.token
    },
    body: JSON.stringify({
      type: 'stages',
      data: {
        'Deal ID': dealId,
        'Stage': dbStage,
        'Notes': ''
      }
    })
  }).catch(function(err) { console.warn('Stage sync failed:', err.message); });

  // Also fire an event for analytics
  fetch('/api/events', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: user.email,
      event: stage === 'saved' ? 'deal_saved' : 'stage_changed',
      data: { dealId: dealId, stage: dbStage }
    })
  }).catch(function() {});
}

function loadStagesFromDb(dealId) {
  var user = null;
  try { user = JSON.parse(localStorage.getItem('gycUser') || 'null'); } catch(e) {}
  if (!user || !user.token) return;

  fetch('/api/userdata?type=stages', {
    headers: { 'Authorization': 'Bearer ' + user.token }
  })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(data) {
      if (!data || !data.records || data.records.length === 0) return;

      var localStages = {};
      try { localStages = JSON.parse(localStorage.getItem('gycDealStages') || '{}'); } catch(e) {}

      var changed = false;
      for (var i = 0; i < data.records.length; i++) {
        var rec = data.records[i];
        var rid = rec.deal_id;
        var dbStage = mapStageName(rec.stage || 'new');
        // If local doesn't have this deal or is at default, use DB value
        if (!localStages[rid] || localStages[rid] === 'new' || localStages[rid] === 'browse') {
          if (dbStage !== 'browse') {
            localStages[rid] = dbStage;
            changed = true;
          }
        }
      }

      if (changed) {
        localStorage.setItem('gycDealStages', JSON.stringify(localStages));
        // If we're on the deal page for one of these deals, update the UI
        if (dealId && localStages[dealId]) {
          updateJourneyUI(dealId, localStages[dealId]);
        }
      }
    })
    .catch(function(err) { console.warn('Stage load failed:', err.message); });
}

function updateJourneyUI(dealId, stage) {
  // Map legacy stage names to new names
  stage = mapStageName(stage);
  var stageOrder = { 'browse': 0, 'saved': 1, 'vetting': 2, 'ready': 3, 'invested': 4 };
  var idx = stageOrder[stage] || 0;

  // Update journey bar steps
  var steps = document.querySelectorAll('.journey-step');
  var connectors = document.querySelectorAll('.journey-connector');
  var checkIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="14" height="14"><polyline points="20 6 9 17 4 12"/></svg>';
  steps.forEach(function(step, i) {
    step.classList.remove('active', 'completed');
    var dot = step.querySelector('.step-dot');
    if (i < idx) {
      step.classList.add('completed');
      dot.innerHTML = checkIcon;
    } else if (i === idx) {
      step.classList.add('active');
      dot.textContent = String(i + 1);
    } else {
      dot.textContent = String(i + 1);
    }
  });
  connectors.forEach(function(c, i) {
    c.classList.toggle('done', i < idx);
  });

  // Update sticky bar
  var stageLabels = { 'browse': 'Browse', 'saved': 'Saved', 'vetting': 'Vetting', 'ready': 'Ready to Invest', 'invested': 'Invested', 'passed': 'Passed' };
  var nextStages = { 'browse': 'saved', 'saved': 'vetting', 'vetting': 'ready', 'ready': 'invested' };
  var nextLabels = { 'browse': 'Save Deal', 'saved': 'Start Vetting', 'vetting': 'Mark Ready to Invest', 'ready': 'Mark as Invested' };
  var labelEl = document.getElementById('stickyStageLabel');
  var advBtn = document.getElementById('stickyAdvanceBtn');
  if (labelEl) labelEl.textContent = stageLabels[stage] || 'Browse';
  if (advBtn) {
    if (nextLabels[stage]) {
      advBtn.textContent = nextLabels[stage] + ' \u2192';
      advBtn.style.display = 'flex';
      advBtn.onclick = function() { setJourneyStage(dealId, nextStages[stage]); };
    } else {
      advBtn.style.display = 'none';
    }
  }
}

function handleDDInput(input) {
  var dealId = input.getAttribute('data-deal-id');
  var key = input.getAttribute('data-key');
  var value = input.value.trim();
  saveDDAnswer(dealId, key, value);
  if (value) {
    var questionEl = input.closest('.dd-question');
    questionEl.classList.add('answered');
    var answerDiv = input.closest('.dd-answer');
    answerDiv.innerHTML = '<div class="dd-answer-icon user"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div class="dd-answer-text">' + esc(value) + '</div><span class="dd-answer-badge user">you</span>';
  }
  updateChecklistProgress();
}

      var isAdmin = user && user.isAdmin;
      var upvoted = JSON.parse(localStorage.getItem('gycQAUpvoted') || '[]');
      var html = data.questions.map(function(q) {
        var hasUpvoted = upvoted.includes(q.id);
        var timeAgo = q.askedAt ? getRelativeTime(q.askedAt) : '';

function getRelativeTime(dateStr) {
  var diff = Date.now() - new Date(dateStr).getTime();
  var mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  var hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  var days = Math.floor(hrs / 24);
  if (days < 30) return days + 'd ago';
  var months = Math.floor(days / 30);
  return months + 'mo ago';
}

function submitDealQuestion(dealId, dealName) {
  if (!requireAuth('submit a question about this deal')) return;
  var textarea = document.getElementById('qaNewQuestion');
  if (!textarea) return;
  var question = textarea.value.trim();
  if (!question) { alert('Please enter a question.'); return; }
  var user = typeof getUser === 'function' ? getUser() : null;
  fetch('/api/deal-qa', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'ask',
      dealId: dealId,
      dealName: dealName,
      question: question,
      userEmail: user ? user.email : '',
      userName: user ? user.name : 'Anonymous'
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success) {
      textarea.value = '';
      loadDealQA(dealId);
    } else {
      alert('Failed to submit question: ' + (data.error || 'Unknown error'));
    }
  })
  .catch(function() { alert('Failed to submit question. Please try again.'); });
}

function submitDealAnswer(recordId) {
  var textarea = document.getElementById('qaAnswer_' + recordId);
  if (!textarea) return;
  var answer = textarea.value.trim();
  if (!answer) return;
  var user = typeof getUser === 'function' ? getUser() : null;
  var params = new URLSearchParams(window.location.search);
  var dealId = params.get('id');
  fetch('/api/deal-qa', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'answer',
      recordId: recordId,
      answer: answer,
      userName: user ? user.name : 'Pascal'
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success && dealId) loadDealQA(dealId);
  })
  .catch(function() {});
}

function upvoteQuestion(recordId, btn) {
  if (!requireAuth('upvote questions')) return;
  var upvoted = JSON.parse(localStorage.getItem('gycQAUpvoted') || '[]');
  if (upvoted.includes(recordId)) return;
  upvoted.push(recordId);
  localStorage.setItem('gycQAUpvoted', JSON.stringify(upvoted));
  fetch('/api/deal-qa', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'upvote', recordId: recordId })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success) {
      var countEl = btn.nextElementSibling;
      if (countEl) countEl.textContent = data.upvotes;
      btn.style.color = 'var(--primary)';
      btn.querySelector('svg').setAttribute('fill', 'var(--primary)');
      btn.style.cursor = 'default';
    }
  })
  .catch(function() {});
}

// ========== GEOCODE & MAP ==========

async function geocodeAndMap(locationStr, containerId) {

  try {

    const resp = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(locationStr) + '&limit=1');

    const data = await resp.json();

    if (data && data.length > 0) {

      const lat = parseFloat(data[0].lat);

      const lon = parseFloat(data[0].lon);

      const map = L.map(containerId).setView([lat, lon], 12);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

        attribution: '&copy; OpenStreetMap contributors',

        maxZoom: 18

      }).addTo(map);

      L.marker([lat, lon]).addTo(map).bindPopup(locationStr).openPopup();

    }

  } catch (e) {

    console.warn('Geocoding failed:', e);

  }

}

  var similarHtml = '';
  (function buildSimilarDeals() {
    var allDeals = [];

    if (allDeals.length < 2) return;

    // Score each deal by similarity to current deal
    var scored = allDeals
      .filter(function(d) { return d.id !== deal.id && d.investmentName; })
      .map(function(d) {
        var score = 0;
        if (d.assetClass && d.assetClass === deal.assetClass) score += 3;
        if (d.dealType && d.dealType === deal.dealType) score += 2;
        if (d.strategy && d.strategy === deal.strategy) score += 2;
        var dealYield = deal.preferredReturn || deal.cashOnCash || deal.targetIRR || 0;
        var dYield = d.preferredReturn || d.cashOnCash || d.targetIRR || 0;
        if (dealYield > 0 && dYield > 0 && Math.abs(dealYield - dYield) < 0.03) score += 1;
        if (deal.investmentMinimum && d.investmentMinimum) {
          var ratio = d.investmentMinimum / deal.investmentMinimum;
          if (ratio >= 0.5 && ratio <= 2) score += 1;
        }
        if (d.managementCompany && d.managementCompany === deal.managementCompany) score += 2;
        return { deal: d, score: score };
      })
      .filter(function(s) { return s.score >= 3; })
      .sort(function(a, b) { return b.score - a.score; })
      .slice(0, 8);

    if (scored.length === 0) return;

    // Compute averages from peers for color coding
    var peers = scored.map(function(s) { return s.deal; });
    function pAvg(field) {
      var vals = peers.map(function(d) { return d[field]; }).filter(function(v) { return v != null && v > 0; });
      return vals.length > 0 ? vals.reduce(function(a, b) { return a + b; }, 0) / vals.length : null;
    }
    var avgIRR = pAvg('targetIRR');
    var avgPref = pAvg('preferredReturn');
    var avgEM = pAvg('equityMultiple');
    var avgMin = pAvg('investmentMinimum');
    var avgHold = pAvg('holdPeriod');
    var avgSize = pAvg('offeringSize');

    // Color cell helper: green if better, red if worse, neutral if no comparison
    // higherIsBetter: true for IRR/pref/EM, false for minimum/hold
    function cellColor(val, avg, higherIsBetter) {
      if (!val || !avg) return '';
      if (higherIsBetter) {
        if (val > avg * 1.02) return 'background:rgba(74,222,128,0.12);';
        if (val < avg * 0.98) return 'background:rgba(248,113,113,0.12);';
      } else {
        if (val < avg * 0.98) return 'background:rgba(74,222,128,0.12);';
        if (val > avg * 1.02) return 'background:rgba(248,113,113,0.12);';

    // Determine pipeline stage for each deal
    function getStageLabel(d) {

    tableHtml += '<th style="' + thStyle + '">Minimum</th>';
    tableHtml += '<th style="' + thStyle + '">Hold Period</th>';
    tableHtml += '<th style="' + thStyle + '">Offering Size</th>';
    tableHtml += '</tr></thead>';

    tableHtml += '<tbody>';
    tableHtml += '<tr style="background:rgba(81,190,123,0.06);">';
    tableHtml += '<td style="' + tdStyle + 'text-align:left;font-weight:800;color:var(--primary);"><div>' + esc(deal.investmentName) + '</div><div style="font-size:11px;font-weight:500;color:var(--text-muted);">' + esc(deal.managementCompany || '') + '</div><span style="display:inline-block;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;background:var(--primary);color:#fff;margin-top:2px;">THIS DEAL</span></td>';
    tableHtml += '<td style="' + tdStyle + cellColor(deal.targetIRR, avgIRR, true) + '">' + (deal.targetIRR ? (deal.targetIRR * 100).toFixed(1) + '%' : '—') + '</td>';
    tableHtml += '<td style="' + tdStyle + cellColor(deal.preferredReturn, avgPref, true) + '">' + (deal.preferredReturn ? (deal.preferredReturn * 100).toFixed(1) + '%' : '—') + '</td>';
    tableHtml += '<td style="' + tdStyle + cellColor(deal.equityMultiple, avgEM, true) + '">' + (deal.equityMultiple ? deal.equityMultiple.toFixed(2) + 'x' : '—') + '</td>';

    tableHtml += '<td style="' + tdStyle + '">' + (deal.offeringSize ? '$' + (deal.offeringSize >= 1000000 ? (deal.offeringSize / 1000000).toFixed(0) + 'mm' : deal.offeringSize.toLocaleString()) : '—') + '</td>';

function esc(str) {

  if (str === null || str === undefined) return '';

  var div = document.createElement('div');

  div.textContent = String(str);

  return div.innerHTML;

}

function escAttr(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}



// ========== HOLD PERIOD FORMATTER ==========

function formatHoldPeriod(yrs) {
  if (!yrs && yrs !== 0) return '---';
  if (yrs === 0) return 'No Lockup';
  if (yrs < 1) {
    var days = Math.round(yrs * 365);
    if (days <= 90) return days + ' Days';
    return Math.round(yrs * 12) + ' Months';
  }
  if (yrs === 1) return '1 Year';
  if (Number.isInteger(yrs)) return yrs + ' Years';
  return yrs.toFixed(1) + ' Years';
}

// ========== RETURNS CHART (CREDIT FUNDS) ==========

function hashCode(str) {
  var hash = 0;
  for (var i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

function getCreditFundReturns(deal) {
  var years = [2022, 2023, 2024];
  var series = [];
  for (var yi = 0; yi < years.length; yi++) {
    var year = years[yi];
    var val = null;
    // Check deal object for year fields
    if (deal[String(year)] && typeof deal[String(year)] === 'number') {
      val = deal[String(year)];
    }
    // Only use real data — no fabricated fallback
    if (val !== null && typeof val === 'number' && val > 0) {
      var pctVal = val < 1 ? val * 100 : val;
      series.push({ year: year, value: parseFloat(pctVal.toFixed(1)) });
    }
  }
  return series;
}

function initDealReturnsChart(deal) {
  var canvas = document.getElementById('dealReturnsChart');
  if (!canvas || typeof Chart === 'undefined') return;
  var series = getCreditFundReturns(deal);
  if (series.length === 0) return;

  var labels = series.map(function(s) { return s.year; });
  var values = series.map(function(s) { return s.value; });
  var maxVal = Math.max.apply(null, values);

  var ctx = canvas.getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: values.map(function(v, i) {
          return i === values.length - 1 ? 'rgba(81,190,123,0.85)' : 'rgba(81,190,123,0.45)';
        }),
        borderRadius: 6,
        borderSkipped: false,
        barPercentage: 0.5,
        categoryPercentage: 0.7
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { enabled: false },
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: 'rgba(255,255,255,0.45)', font: { family: 'Plus Jakarta Sans', size: 11, weight: '600' } },
          border: { display: false }
        },
        y: {
          min: Math.max(0, Math.floor(Math.min.apply(null, values) - 2)),
          max: Math.ceil(maxVal + 3),
          grid: { color: 'rgba(255,255,255,0.08)', drawBorder: false },
          ticks: {
            color: 'rgba(255,255,255,0.35)',
            font: { family: 'Plus Jakarta Sans', size: 10 },
            callback: function(v) { return v + '%'; },
            stepSize: 2
          },
          border: { display: false }
        }
      },
      layout: { padding: { top: 30, right: 8, bottom: 0, left: 0 } },
      animation: { duration: 600 }
    },
    plugins: [{
      afterDraw: function(chart) {
        var ctx2 = chart.ctx;
        var meta = chart.getDatasetMeta(0);
        meta.data.forEach(function(bar, i) {
          var val = values[i];
          var isLatest = i === values.length - 1;
          ctx2.save();
          ctx2.font = (isLatest ? '700 12px' : '700 10px') + ' "Plus Jakarta Sans",sans-serif';
          var text = val.toFixed(1) + '%';
          var tw = ctx2.measureText(text).width;
          var px = bar.x;
          var py = bar.y - (isLatest ? 16 : 12);
          var pad = isLatest ? 8 : 6;
          ctx2.fillStyle = isLatest ? '#0A1E21' : 'rgba(10,30,33,0.7)';
          ctx2.beginPath();
          ctx2.roundRect(px - tw/2 - pad, py - (isLatest ? 10 : 8), tw + pad*2, isLatest ? 22 : 18, 4);
          ctx2.fill();
          if (isLatest) {
            ctx2.beginPath();
            ctx2.moveTo(px - 4, py + (isLatest ? 12 : 10));
            ctx2.lineTo(px, py + (isLatest ? 17 : 14));
            ctx2.lineTo(px + 4, py + (isLatest ? 12 : 10));
            ctx2.fill();
          }
          ctx2.fillStyle = '#fff';
          ctx2.textAlign = 'center';
          ctx2.textBaseline = 'middle';
          ctx2.fillText(text, px, py + 1);
          ctx2.restore();
        });
      }
    }]
  });
}

// File upload state
var _deckFile = null;
var _deckFileBase64 = null;

function handleDeckFileSelect(input) {
  if (input.files && input.files[0]) {
    processDeckFile(input.files[0]);
  }
}

function handleDeckFileDrop(event) {
  var files = event.dataTransfer.files;
  if (files && files[0]) {
    processDeckFile(files[0]);
  }
}

function processDeckFile(file) {
  if (file.size > 25 * 1024 * 1024) {
    alert('File is too large. Maximum size is 25MB.');
    return;
  }
  _deckFile = file;
  var reader = new FileReader();
  reader.onload = function(e) {
    // Strip the data URL prefix to get pure base64
    _deckFileBase64 = e.target.result.split(',')[1];
    // Update UI
    var uploadText = document.getElementById('deckUploadText');
    var uploadArea = document.getElementById('deckUploadArea');
    if (uploadText) uploadText.innerHTML = '<span style="color:var(--primary);font-weight:700;">✓ ' + file.name + '</span><br><span style="font-size:11px;color:var(--text-muted);">' + (file.size / 1024 / 1024).toFixed(1) + ' MB — click to change</span>';
    if (uploadArea) uploadArea.style.borderColor = 'var(--primary)';
  };
  reader.readAsDataURL(file);
}

async function submitDeck(dealId, dealName) {
  var urlInput = document.getElementById('deckUrlInput');
  var notesInput = document.getElementById('deckNotesInput');
  var submitBtn = document.getElementById('deckSubmitBtn');
  var docTypeSelect = document.getElementById('deckDocType');
  var docType = docTypeSelect ? docTypeSelect.value : 'deck';
  var docLabel = docType === 'ppm' ? 'PPM' : 'Deck';

  var deckUrl = (urlInput.value || '').trim();
  var hasFile = _deckFile && _deckFileBase64;

  if (!deckUrl && !hasFile) {
    if (urlInput) urlInput.style.borderColor = '#e74c3c';
    var uploadArea = document.getElementById('deckUploadArea');
    if (uploadArea) uploadArea.style.borderColor = '#e74c3c';
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = hasFile ? 'Uploading...' : 'Submitting...';

  var userEmail = '';
  var userName = '';
  try {
    var userData = JSON.parse(localStorage.getItem('gycUser') || '{}');
    userEmail = userData.email || '';
    userName = userData.name || userData.firstName || '';
  } catch(e) {}

  try {
    if (hasFile) {
      var resp = await fetch('/api/deck-upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          dealId: dealId,
          dealName: docType === 'ppm' ? dealName + ' - PPM' : dealName,
          filedata: _deckFileBase64,
          filename: _deckFile.name,
          notes: (notesInput.value || '').trim() + (docType === 'ppm' ? ' [PPM document]' : ''),
          userEmail: userEmail,
          userName: userName,
          docType: docType
        })
      });

      if (resp.ok) {
        var data = await resp.json();
        document.getElementById('deckModalForm').style.display = 'none';
        var successMsg = document.getElementById('deckSuccessMsg');
        if (successMsg) successMsg.innerHTML = docLabel + ' uploaded successfully!' + (data.driveUrl ? '<br><a href="' + data.driveUrl + '" target="_blank" style="color:var(--primary);font-size:13px;">View file →</a>' : '');
        document.getElementById('deckModalSuccess').style.display = 'block';
      } else {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit';
        alert('Upload failed. Please try again.');
      }
    } else {
      var resp = await fetch('/api/deck-submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          dealId: dealId,
          dealName: dealName,
          deckUrl: deckUrl,
          notes: (notesInput.value || '').trim() + (docType === 'ppm' ? ' [PPM document]' : ''),
          userEmail: userEmail,
          userName: userName,
          docType: docType
        })
      });

      if (resp.ok) {
        document.getElementById('deckModalForm').style.display = 'none';
        document.getElementById('deckModalSuccess').style.display = 'block';
      } else {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit';
        alert('Something went wrong. Please try again.');
      }
    }
  } catch(e) {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit';
    alert('Network error. Please try again.');
  }

  _deckFile = null;
  _deckFileBase64 = null;
}

// Keep old function name for backward compatibility
async function submitDeckLink(dealId, dealName) {
  var urlInput = document.getElementById('deckUrlInput');
  var notesInput = document.getElementById('deckNotesInput');
  var submitBtn = document.getElementById('deckSubmitBtn');

  var deckUrl = (urlInput.value || '').trim();
  if (!deckUrl) {
    urlInput.style.borderColor = '#e74c3c';
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Submitting...';

  // Get user info from localStorage (set by auth flow)
  var userEmail = '';
  var userName = '';
  try {
    var userData = JSON.parse(localStorage.getItem('gycUser') || '{}');
    userEmail = userData.email || '';
    userName = userData.name || userData.firstName || '';
  } catch(e) {}

  try {
    var resp = await fetch('/api/deck-submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        dealId: dealId,
        dealName: dealName,
        deckUrl: deckUrl,
        notes: (notesInput.value || '').trim(),
        userEmail: userEmail,
        userName: userName
      })
