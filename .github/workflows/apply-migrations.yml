name: Apply Supabase Migrations

on:
  push:
    branches:
      - claude/apply-supabase-migration-gLc4p
    paths:
      - '.github/workflows/apply-migrations.yml'
      - 'dealflow/supabase/migrations/04*'
      - 'dealflow/supabase/migrations/05*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: nntzqyufmtypfjpusflm
    steps:
      - uses: actions/checkout@v4

      - name: Apply migrations via Management API
        working-directory: dealflow
        run: |
          REPORT="migration-report.txt"
          echo "Migration Report - $(date -u)" > $REPORT

          # Test connectivity
          HTTP_CODE=$(curl -s -o /tmp/test.json -w "%{http_code}" \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}")
          echo "API test: HTTP $HTTP_CODE" >> $REPORT
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Auth failed. Response:" >> $REPORT
            cat /tmp/test.json >> $REPORT
          else
            echo "Auth OK" >> $REPORT
          fi
          echo "" >> $REPORT

          MIGRATIONS=(
            "supabase/migrations/047_canonical_stage_privacy_contract.sql"
            "supabase/migrations/048_weekly_digest_operations.sql"
            "supabase/migrations/049_weekly_digest_idempotency_and_release_gates.sql"
            "supabase/migrations/050_weekly_digest_attempt_history.sql"
          )
          APPLIED=0
          FAILED=0

          for migration in "${MIGRATIONS[@]}"; do
            echo "--- $migration ---" >> $REPORT
            SQL=$(cat "$migration")
            BODY=$(jq -n --arg q "$SQL" '{query: $q, read_only: false}')

            HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
              -X POST \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$BODY")

            echo "HTTP: $HTTP_CODE" >> $REPORT
            cat /tmp/response.json >> $REPORT 2>/dev/null
            echo "" >> $REPORT

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              APPLIED=$((APPLIED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
          done

          echo "Applied: $APPLIED, Failed: $FAILED" >> $REPORT
          cat $REPORT

          # Push report to branch
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dealflow/migration-report.txt
          git commit -m "Migration report: $APPLIED applied, $FAILED failed" || true
          git push origin HEAD:claude/apply-supabase-migration-gLc4p || echo "Push failed"

          if [ "$FAILED" -gt 0 ] && [ "$APPLIED" -eq 0 ]; then
            exit 1
          fi

      - uses: actions/setup-node@v4
        if: success()
        with:
          node-version: 22

      - name: Verify canonical DB shape
        if: success()
        working-directory: dealflow
        run: |
          SUPABASE_SERVICE_ROLE_KEY=$(python3 -c "exec(open('scripts/classify-strategies.py').read().split('HEADERS')[0]); print(SUPABASE_KEY)")
          SUPABASE_URL=$(python3 -c "exec(open('scripts/classify-strategies.py').read().split('HEADERS')[0]); print(SUPABASE_URL)")
          export SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY
          npm ci
          node scripts/check-canonical-db-shape.mjs
