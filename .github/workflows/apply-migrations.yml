name: Apply Supabase Migrations

on:
  push:
    branches:
      - claude/apply-supabase-migration-gLc4p
    paths:
      - '.github/workflows/apply-migrations.yml'
      - 'dealflow/supabase/migrations/04*'
      - 'dealflow/supabase/migrations/05*'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Extract Supabase credentials from repo
        working-directory: dealflow
        run: |
          SUPABASE_SERVICE_ROLE_KEY=$(python3 -c "exec(open('scripts/classify-strategies.py').read().split('HEADERS')[0]); print(SUPABASE_KEY)")
          SUPABASE_URL=$(python3 -c "exec(open('scripts/classify-strategies.py').read().split('HEADERS')[0]); print(SUPABASE_URL)")
          echo "SUPABASE_URL=${SUPABASE_URL}" >> $GITHUB_ENV
          echo "::add-mask::${SUPABASE_SERVICE_ROLE_KEY}"
          echo "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}" >> $GITHUB_ENV
          echo "Extracted credentials for project: ${SUPABASE_URL}"

      - name: Apply migration SQL files
        working-directory: dealflow
        run: |
          MIGRATIONS=(
            "supabase/migrations/047_canonical_stage_privacy_contract.sql"
            "supabase/migrations/048_weekly_digest_operations.sql"
            "supabase/migrations/049_weekly_digest_idempotency_and_release_gates.sql"
            "supabase/migrations/050_weekly_digest_attempt_history.sql"
          )
          APPLIED=0
          FAILED=0

          for migration in "${MIGRATIONS[@]}"; do
            echo ""
            echo "========================================"
            echo "Migration: $migration"
            echo "========================================"
            SQL=$(cat "$migration")

            # Execute via Supabase pg-meta /pg/query endpoint
            HTTP_CODE=$(curl -s -o /tmp/pg_response.json -w "%{http_code}" \
              "${SUPABASE_URL}/pg/query" \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -d "$(jq -n --arg q "$SQL" '{query: $q}')")

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              echo "OK (HTTP $HTTP_CODE)"
              APPLIED=$((APPLIED + 1))
              continue
            fi

            echo "pg-meta returned HTTP $HTTP_CODE:"
            cat /tmp/pg_response.json 2>/dev/null || true
            echo ""

            # Fallback: /sql endpoint
            HTTP_CODE=$(curl -s -o /tmp/sql_response.json -w "%{http_code}" \
              "${SUPABASE_URL}/sql" \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -d "$(jq -n --arg q "$SQL" '{query: $q}')")

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              echo "OK via /sql (HTTP $HTTP_CODE)"
              APPLIED=$((APPLIED + 1))
              continue
            fi

            echo "/sql returned HTTP $HTTP_CODE:"
            cat /tmp/sql_response.json 2>/dev/null || true
            echo ""
            FAILED=$((FAILED + 1))
          done

          echo ""
          echo "========================================"
          echo "Results: $APPLIED applied, $FAILED failed"
          echo "========================================"
          if [ "$FAILED" -gt 0 ]; then
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify canonical DB shape
        working-directory: dealflow
        run: |
          npm ci
          node scripts/check-canonical-db-shape.mjs
