name: Apply Supabase Migrations

on:
  push:
    branches:
      - claude/apply-supabase-migration-gLc4p
    paths:
      - '.github/workflows/apply-migrations.yml'
      - 'dealflow/supabase/migrations/04*'
      - 'dealflow/supabase/migrations/05*'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: nntzqyufmtypfjpusflm
    steps:
      - uses: actions/checkout@v4

      - name: Validate token
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "ERROR: SUPABASE_ACCESS_TOKEN secret is not set." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "Token present (length: ${#SUPABASE_ACCESS_TOKEN})" >> $GITHUB_STEP_SUMMARY

      - name: Test API connectivity
        run: |
          HTTP_CODE=$(curl -s -o /tmp/test.json -w "%{http_code}" \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}")
          echo "### API Connectivity: HTTP $HTTP_CODE" >> $GITHUB_STEP_SUMMARY
          if [ "$HTTP_CODE" != "200" ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/test.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "Project access OK" >> $GITHUB_STEP_SUMMARY

      - name: Apply migrations via Management API
        working-directory: dealflow
        run: |
          MIGRATIONS=(
            "supabase/migrations/047_canonical_stage_privacy_contract.sql"
            "supabase/migrations/048_weekly_digest_operations.sql"
            "supabase/migrations/049_weekly_digest_idempotency_and_release_gates.sql"
            "supabase/migrations/050_weekly_digest_attempt_history.sql"
          )
          APPLIED=0
          FAILED=0

          echo "### Migration Results" >> $GITHUB_STEP_SUMMARY

          for migration in "${MIGRATIONS[@]}"; do
            SQL=$(cat "$migration")
            BODY=$(jq -n --arg q "$SQL" '{query: $q, read_only: false}')

            HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
              -X POST \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$BODY")

            RESPONSE=$(cat /tmp/response.json 2>/dev/null || echo "empty")

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              echo "- ✅ \`$migration\` — HTTP $HTTP_CODE" >> $GITHUB_STEP_SUMMARY
              APPLIED=$((APPLIED + 1))
            else
              echo "- ❌ \`$migration\` — HTTP $HTTP_CODE" >> $GITHUB_STEP_SUMMARY
              echo '  ```json' >> $GITHUB_STEP_SUMMARY
              echo "  $RESPONSE" >> $GITHUB_STEP_SUMMARY
              echo '  ```' >> $GITHUB_STEP_SUMMARY
              FAILED=$((FAILED + 1))
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**$APPLIED applied, $FAILED failed**" >> $GITHUB_STEP_SUMMARY

          if [ "$FAILED" -gt 0 ]; then
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify canonical DB shape
        working-directory: dealflow
        run: |
          SUPABASE_SERVICE_ROLE_KEY=$(python3 -c "exec(open('scripts/classify-strategies.py').read().split('HEADERS')[0]); print(SUPABASE_KEY)")
          SUPABASE_URL=$(python3 -c "exec(open('scripts/classify-strategies.py').read().split('HEADERS')[0]); print(SUPABASE_URL)")
          export SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY
          npm ci
          node scripts/check-canonical-db-shape.mjs 2>&1 | tee -a $GITHUB_STEP_SUMMARY
