name: Apply Supabase Migrations

on:
  push:
    branches:
      - claude/apply-supabase-migration-gLc4p
    paths:
      - '.github/workflows/apply-migrations.yml'
      - 'dealflow/supabase/migrations/04*'
      - 'dealflow/supabase/migrations/05*'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project and push migrations
        working-directory: dealflow
        run: |
          echo "Linking to Supabase project nntzqyufmtypfjpusflm..."
          supabase link --project-ref nntzqyufmtypfjpusflm

          echo ""
          echo "Checking pending migrations (dry run)..."
          supabase db push --dry-run || true

          echo ""
          echo "Applying migrations..."
          supabase db push

          echo ""
          echo "Migrations applied successfully."

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Extract Supabase credentials for verification
        working-directory: dealflow
        run: |
          SUPABASE_SERVICE_ROLE_KEY=$(python3 -c "exec(open('scripts/classify-strategies.py').read().split('HEADERS')[0]); print(SUPABASE_KEY)")
          SUPABASE_URL=$(python3 -c "exec(open('scripts/classify-strategies.py').read().split('HEADERS')[0]); print(SUPABASE_URL)")
          echo "SUPABASE_URL=${SUPABASE_URL}" >> $GITHUB_ENV
          echo "::add-mask::${SUPABASE_SERVICE_ROLE_KEY}"
          echo "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}" >> $GITHUB_ENV

      - name: Verify canonical DB shape
        working-directory: dealflow
        run: |
          npm ci
          node scripts/check-canonical-db-shape.mjs
