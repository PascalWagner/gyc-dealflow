name: Apply Supabase Migrations

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print SQL but do not apply)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: https://nntzqyufmtypfjpusflm.supabase.co
      # Service role key - already exposed in repo scripts (classify-strategies.py, etc.)
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/apply-supabase-migration-gLc4p

      - name: Execute migration SQL via Supabase pg-meta API
        working-directory: dealflow
        run: |
          MIGRATIONS=(
            "supabase/migrations/047_canonical_stage_privacy_contract.sql"
            "supabase/migrations/048_weekly_digest_operations.sql"
            "supabase/migrations/049_weekly_digest_idempotency_and_release_gates.sql"
            "supabase/migrations/050_weekly_digest_attempt_history.sql"
          )

          for migration in "${MIGRATIONS[@]}"; do
            echo "========================================"
            echo "Migration: $migration"
            echo "========================================"
            SQL=$(cat "$migration")

            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "[DRY RUN] Would apply:"
              echo "$SQL"
              echo ""
              continue
            fi

            # Try pg-meta /pg endpoint first (Supabase Studio SQL Editor endpoint)
            HTTP_CODE=$(curl -s -o /tmp/pg_response.json -w "%{http_code}" \
              "${SUPABASE_URL}/pg/query" \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -d "$(jq -n --arg q "$SQL" '{query: $q}')")

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              echo "SUCCESS (pg-meta): HTTP $HTTP_CODE"
              cat /tmp/pg_response.json | head -5
              echo ""
              continue
            fi

            echo "pg-meta returned HTTP $HTTP_CODE, trying /rest/v1/rpc/exec_sql..."
            cat /tmp/pg_response.json 2>/dev/null
            echo ""

            # Fallback: try the newer SQL-over-HTTP endpoint
            HTTP_CODE=$(curl -s -o /tmp/sql_response.json -w "%{http_code}" \
              "${SUPABASE_URL}/sql" \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -d "$(jq -n --arg q "$SQL" '{query: $q}')")

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              echo "SUCCESS (sql endpoint): HTTP $HTTP_CODE"
              cat /tmp/sql_response.json | head -5
              echo ""
              continue
            fi

            echo "sql endpoint returned HTTP $HTTP_CODE"
            cat /tmp/sql_response.json 2>/dev/null
            echo ""

            echo "ERROR: Migration $migration could not be applied via any endpoint."
            echo "Falling back to supabase CLI..."

            # Final fallback: supabase CLI with DB URL if available
            if [ -n "$SUPABASE_DB_URL" ]; then
              echo "Using supabase CLI with DB URL..."
              npx supabase db push --db-url "$SUPABASE_DB_URL"
              break
            else
              echo "FAILED: No SUPABASE_DB_URL secret available for CLI fallback."
              exit 1
            fi
          done

      - uses: actions/setup-node@v4
        if: inputs.dry_run == 'false'
        with:
          node-version: 20

      - name: Verify schema
        if: inputs.dry_run == 'false'
        working-directory: dealflow
        run: |
          npm ci
          node scripts/check-canonical-db-shape.mjs
        env:
          SUPABASE_URL: https://nntzqyufmtypfjpusflm.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
